<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>悦读 | 自动连续朗读 · 智能目录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 新版两栏布局：左侧目录 + 右侧阅读区 */
        body {
            background: #f0f2f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0.5rem;
            gap: 5px;
        }

        /* 左侧目录侧边栏 */
        .toc-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s;
            border: 1px solid #eef2f8;
            height: calc(100vh - 3rem);
            max-height: 860px;
        }

        .toc-header {
            padding: 0.2rem 1.2rem 0.2rem;
            border-bottom: 2px solid #eef2f8;
            background: #ffffff;
        }

        .toc-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f3b4c;
            letter-spacing: -0.2px;
        }

        .toc-header h3 span {
            background: #eef3fc;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #2c5a7a;
        }

        .toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 0.6rem 1rem 0.6rem;
            scrollbar-width: thin;
        }

        .toc-item {
            padding: 0.6rem 0.9rem;
            margin: 4px 0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c4f6e;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
            background: #fafcff;
            border: 1px solid transparent;
        }

        .toc-item:hover {
            background: #eef3fc;
            border-color: #cbdde9;
            transform: translateX(3px);
            color: #1f5a7e;
        }

        .toc-item.active-chapter {
            background: #62D0C4;
            border-left: 3px solid #EF4444;
            font-weight: 600;
            color: #1b4c6e;
            background: linear-gradient(90deg, #F8B1B1, #ffffff);
        }

        .no-chapter-placeholder {
            padding: 1.8rem 1rem;
            text-align: center;
            color: #9aafc2;
            font-size: 0.8rem;
        }

        /* 右侧主卡片保持原有风格 */
        .reader-card {
            flex: 1;
            min-width: 0;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 3px -12px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .reader-header {
            padding: 1rem 1rem 1rem 1rem;
            border-bottom: 1px solid #eef2f6;
        }

        .reader-header h1 {
            font-size: 1.65rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e2b3c, #2c4c6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .sub {
            font-size: 0.85rem;
            color: #7c8b9c;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* 文件选择区域（已移动至左侧目录栏上方，保留原有样式以维持一致性） */
        .import-area {
            background: #f8fafd;
            margin: 0.8rem 0.8rem 0.4rem 0.8rem;
            border-radius: 10px;
            border: 1.5px dashed #cbd5e1;
            transition: all 0.2s;
            padding: 0.2rem 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .import-area:hover {
            border-color: #5f8bb3;
            background: #fefefe;
        }

        .drag-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #2c3e4e;
            background: #ffffffd0;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .file-btn {
            background: #eef2f9;
            border: none;
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f4a6e;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .file-btn:hover {
            background: #e2e8f2;
            transform: scale(0.97);
        }

        .page-container {
            margin: 1rem 1rem 1rem 1rem;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 6px 12px -8px rgba(0,0,0,0.1);
        }

        .reading-page {
            background: #fefef7;
            border-radius: 5px;
            padding: 0.5rem 0.5rem 0.5rem 0.5rem;
            min-height: 600px;
            max-height: 600px;
            height: 600px;
            overflow-y: auto;
            font-family: 'Georgia', 'Times New Roman', '黑体', 'Segoe UI', serif;
            font-size: 1rem;
            line-height: 2;
            color: #1f2d3a;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.02);
        }

        .reading-page::-webkit-scrollbar {
            width: 8px;
            background: #eef2f6;
        }
        .reading-page::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .controls {
            padding: 1rem 1rem 1rem 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2px;
            border-top: 1px solid #ecf3f9;
            background: #ffffff;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .ctrl-btn {
            background: #f0f4fa;
            border: none;
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 40px;
            font-weight: 500;
            color: #2c5a7a;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .ctrl-btn:active {
            transform: scale(0.96);
        }

        .ctrl-btn.primary {
            background: #2c5a7a;
            color: white;
            box-shadow: 0 2px 6px rgba(44,90,122,0.2);
        }

        .ctrl-btn.primary:hover {
            background: #1f4662;
        }

        .ctrl-btn:hover {
            background: #e4ebf3;
        }

        .page-info {
            background: #f1f5f9;
            padding: 5px 5px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f4662;
        }

        .style-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            background: #fafcff;
            padding: 5px 5px;
            border-radius: 48px;
        }

        .font-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f4fa;
            padding: 4px 5px;
            border-radius: 40px;
        }

        .font-control span {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c5a7a;
        }

        .font-btn {
            background: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            color: #2c5a7a;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: 0.1s;
        }

        .font-btn:active {
            transform: scale(0.92);
        }

        .font-size-value {
            min-width: 30px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .voice-select {
            background: #f0f4fa;
            border: none;
            padding: 5px 5px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: inherit;
            color: #1f4662;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            max-width: 220px;
        }

        .status-msg {
            font-size: 0.75rem;
            color: #90a2b5;
            margin-left: auto;
        }

        .measure-tool {
            position: absolute;
            visibility: hidden;
            pointer-events: none;
            top: -9999px;
            left: -9999px;
            width: calc(100% - 4rem);
            max-width: 800px;
            font-family: 'Georgia', 'Times New Roman', '宋体', 'Segoe UI', serif;
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 1rem 1rem;
            background: transparent;
        }

        @media (max-width: 820px) {
            body {
                flex-direction: column;
                padding: 1rem;
                gap: 1rem;
            }
            .toc-sidebar {
                width: 100%;
                height: auto;
                max-height: 320px;
            }
            .toc-list {
                max-height: 180px;
            }
            .reading-page {
                height: 380px;
                min-height: 380px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .style-panel {
                justify-content: space-between;
            }
            .import-area {
                margin: 0.6rem;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.8rem 2rem 1rem;
            color: #b9c4d1;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
    </style>
</head>
<body>

<!-- 左侧目录面板：文件选择区域已移动到目录上方 -->
<div class="toc-sidebar" id="tocSidebar">
    <div class="import-area" id="dropZone">
        <button class="file-btn" id="fileSelectBtn">📁 选择文本文件</button>
        <input type="file" id="fileInput" accept=".txt, text/plain" style="display: none;" />
    </div>

    <div class="toc-header">
        <h3>📑 目录 <span id="chapterCount">0</span></h3>
    </div>
    <div class="toc-list" id="tocListContainer">
        <div class="no-chapter-placeholder">✨ 暂无章节<br></div>
    </div>
</div>

<!-- 右侧主阅读器 -->
<div class="reader-card">
    <div class="page-container">
        <div class="reading-page" id="pageContent">
            
        </div>
    </div>

    <div class="controls">
        <div class="nav-buttons">
            <button class="ctrl-btn" id="prevPageBtn" disabled>◀ 上一页</button>
            <span class="page-info" id="pageIndicator">第 0 / 0 页</span>
            <button class="ctrl-btn" id="nextPageBtn" disabled>下一页 ▶</button>
        </div>
        <div class="nav-buttons">
            <button class="ctrl-btn primary" id="speakBtn" disabled>🔊 朗读</button>
            <button class="ctrl-btn" id="pauseBtn" disabled>⏸️ 暂停</button>
            <button class="ctrl-btn" id="resumeBtn" disabled>▶️ 继续</button>
            <button class="ctrl-btn" id="stopBtn" disabled>⏹️ 停止</button>
        </div>
        
        <div class="style-panel">
            <div class="font-control">
                <button class="font-btn" id="fontDecreaseBtn" title="减小字号">A-</button>
                <span class="font-size-value" id="fontSizeDisplay">20px</span>
                <button class="font-btn" id="fontIncreaseBtn" title="增大字号">A+</button>
            </div>
            <select id="voiceSelect" class="voice-select" disabled>
                <option>加载语音列表...</option>
            </select>
            <span class="status-msg" id="ttsStatus">⚡ 就绪</span>
        </div>
        

<div class="measure-tool" id="measureDiv"></div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const pageContainer = document.getElementById('pageContent');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const speakBtn = document.getElementById('speakBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const stopBtn = document.getElementById('stopBtn');
        const ttsStatusSpan = document.getElementById('ttsStatus');
        const fileInput = document.getElementById('fileInput');
        const fileSelectBtn = document.getElementById('fileSelectBtn');
        const dropZone = document.getElementById('dropZone');
        
        const voiceSelect = document.getElementById('voiceSelect');
        const fontDecreaseBtn = document.getElementById('fontDecreaseBtn');
        const fontIncreaseBtn = document.getElementById('fontIncreaseBtn');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');

        const measureDiv = document.getElementById('measureDiv');

        // 目录相关 DOM
        const tocListContainer = document.getElementById('tocListContainer');
        const chapterCountSpan = document.getElementById('chapterCount');

        // 全局数据
        let rawText = "";
        let pages = [];
        let currentPageIdx = 0;
        let currentUtterance = null;
        let isSpeaking = false;
        let selectedVoice = null;
        
        let currentFontSize = 20;
        
        let tocItems = [];
        let pageOffsets = [];
        
        let currentBuildCancel = null;
        
        // 去除多余空行（保留单换行）
        function normalizeSpacing(text) {
            let normalized = text.replace(/\r\n?/g, '\n');
            normalized = normalized.replace(/\n{2,}/g, '\n');
            normalized = normalized.replace(/^\n+/, '').replace(/\n+$/, '');
            return normalized;
        }
        
        function setControlsEnabled(enabled) {
            const btns = [prevBtn, nextBtn, speakBtn, pauseBtn, resumeBtn, stopBtn, fileSelectBtn];
            btns.forEach(btn => { if(btn) btn.disabled = !enabled; });
            if (enabled && pages.length === 0) speakBtn.disabled = true;
            if (!enabled) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                speakBtn.disabled = true;
                pauseBtn.disabled = true;
                resumeBtn.disabled = true;
                stopBtn.disabled = true;
            } else {
                updateButtonsState();
                if (pages.length === 0) speakBtn.disabled = true;
            }
        }
        
        function showProcessingMsg(msg) {
            ttsStatusSpan.innerText = msg || '📚 正在处理文本，请稍候...';
        }
        
        // 章节提取
        function extractChaptersFromText(text) {
            const chapters = [];
            const chapterRegex = /^(?:[\s\t]*)(第[一二三四五六七八九十百千万0-9]+[章节])(?:[\s\.\、\．]*)([^\n]{0,60})?/gm;
            let match;
            while ((match = chapterRegex.exec(text)) !== null) {
                let fullTitle = match[0].trim();
                if (fullTitle.length > 80) fullTitle = fullTitle.substring(0, 78) + '…';
                const startIdx = match.index;
                if (chapters.length === 0 || chapters[chapters.length-1].startOffset !== startIdx) {
                    chapters.push({ title: fullTitle, startOffset: startIdx });
                }
            }
            if (chapters.length === 0) {
                const looseRegex = /第[一二三四五六七八九十百千万0-9]+[章节][\s\S]{0,30}?/g;
                let looseMatch;
                while ((looseMatch = looseRegex.exec(text)) !== null) {
                    let maybeTitle = looseMatch[0].trim();
                    if (maybeTitle.length > 80) maybeTitle = maybeTitle.substring(0, 78) + '…';
                    chapters.push({ title: maybeTitle, startOffset: looseMatch.index });
                    if (chapters.length >= 50) break;
                }
            }
            const unique = [];
            const seen = new Set();
            for (const ch of chapters) {
                if (!seen.has(ch.startOffset)) {
                    seen.add(ch.startOffset);
                    unique.push(ch);
                }
            }
            return unique;
        }
        
        function buildPageOffsetsFromText(originalText, pagesArray) {
            const offsets = [];
            let cursor = 0;
            for (let i = 0; i < pagesArray.length; i++) {
                const pageText = pagesArray[i];
                if (!pageText) {
                    offsets.push({ start: -1, end: -1 });
                    continue;
                }
                let startIdx = originalText.indexOf(pageText, cursor);
                if (startIdx === -1) {
                    const trimmedPage = pageText.trim();
                    if (trimmedPage.length > 0) {
                        startIdx = originalText.indexOf(trimmedPage, cursor);
                        if (startIdx !== -1) {
                            const endIdx = startIdx + trimmedPage.length;
                            offsets.push({ start: startIdx, end: endIdx });
                            cursor = endIdx;
                            continue;
                        }
                    }
                    offsets.push({ start: -1, end: -1 });
                } else {
                    const endIdx = startIdx + pageText.length;
                    offsets.push({ start: startIdx, end: endIdx });
                    cursor = endIdx;
                }
            }
            return offsets;
        }
        
        function findPageIndexByOffset(charOffset) {
            if (!pageOffsets.length || charOffset === undefined) return -1;
            for (let i = 0; i < pageOffsets.length; i++) {
                const range = pageOffsets[i];
                if (range.start !== -1 && charOffset >= range.start && charOffset < range.end) return i;
            }
            for (let i = 0; i < pageOffsets.length; i++) {
                if (pageOffsets[i].start !== -1 && charOffset >= pageOffsets[i].start) {
                    if (i + 1 === pageOffsets.length || charOffset < pageOffsets[i+1].start) return i;
                }
            }
            return -1;
        }
        
        function renderTOC() {
            if (!tocListContainer) return;
            if (!tocItems.length) {
                tocListContainer.innerHTML = '<div class="no-chapter-placeholder">📭 未检测到章节<br>请确保文本包含“第一章/第一节”等标记</div>';
                chapterCountSpan.innerText = '0';
                return;
            }
            chapterCountSpan.innerText = tocItems.length;
            const fragment = document.createDocumentFragment();
            tocItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'toc-item';
                div.textContent = item.title;
                div.setAttribute('data-offset', item.startOffset);
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    jumpToChapterByOffset(item.startOffset);
                });
                fragment.appendChild(div);
            });
            tocListContainer.innerHTML = '';
            tocListContainer.appendChild(fragment);
        }
        
        function highlightActiveChapter() {
            if (!tocItems.length || !pageOffsets.length) return;
            const currentPageStart = pageOffsets[currentPageIdx]?.start;
            if (currentPageStart === undefined || currentPageStart === -1) return;
            let activeIndex = -1;
            for (let i = 0; i < tocItems.length; i++) {
                if (tocItems[i].startOffset <= currentPageStart) activeIndex = i;
                else break;
            }
            const tocItemsDom = document.querySelectorAll('.toc-item');
            tocItemsDom.forEach((el, i) => {
                el.classList.remove('active-chapter');
                if (i === activeIndex && activeIndex !== -1) {
                    el.classList.add('active-chapter');
                    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            });
        }
        
        function jumpToChapterByOffset(offset) {
            if (!pages.length || !pageOffsets.length) {
                ttsStatusSpan.innerText = '⚠️ 页面未就绪，无法跳转';
                return;
            }
            if (isSpeaking || currentUtterance) stopTTS();
            const targetPage = findPageIndexByOffset(offset);
            if (targetPage !== -1 && targetPage !== currentPageIdx) {
                currentPageIdx = targetPage;
                displayCurrentPage();
                updateButtonsState();
                ttsStatusSpan.innerText = `📖 跳转至第 ${currentPageIdx+1} 页 · ${tocItems.find(t => t.startOffset === offset)?.title || '章节'}`;
                setTimeout(() => {
                    if (ttsStatusSpan.innerText.includes('跳转至')) ttsStatusSpan.innerText = '⚡ 就绪 · 自动连读模式';
                }, 1800);
                highlightActiveChapter();
            } else if (targetPage === currentPageIdx) {
                ttsStatusSpan.innerText = '📍 已在当前章节页面';
            } else {
                ttsStatusSpan.innerText = '⚠️ 无法定位章节页，请尝试重新加载';
            }
        }
        
        function refreshTOCAndOffsets() {
            if (!rawText || rawText.trim() === "" || !pages.length) {
                pageOffsets = [];
                renderTOC();
                highlightActiveChapter();
                return;
            }
            pageOffsets = buildPageOffsetsFromText(rawText, pages);
            renderTOC();
            highlightActiveChapter();
        }
        
        // 语音
        function populateVoiceList() {
            if (!window.speechSynthesis) return;
            const voices = window.speechSynthesis.getVoices();
            if (!voices.length) {
                voiceSelect.innerHTML = '<option>未检测到语音</option>';
                voiceSelect.disabled = true;
                return;
            }
            voiceSelect.disabled = false;
            voiceSelect.innerHTML = '';
            voices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                if (voice.lang.includes('zh')) option.textContent += ' 🇨🇳';
                voiceSelect.appendChild(option);
            });
            if (selectedVoice) {
                for (let i = 0; i < voiceSelect.options.length; i++) {
                    if (voiceSelect.options[i].value === selectedVoice.name) {
                        voiceSelect.selectedIndex = i;
                        break;
                    }
                }
            } else {
                const defaultVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Microsoft') || v.name.includes('Xiaoxiao') || v.name.includes('Zira') || v.name.includes('Yating'))) 
                                    || voices.find(v => v.lang.includes('zh'));
                if (defaultVoice) {
                    selectedVoice = defaultVoice;
                    for (let i = 0; i < voiceSelect.options.length; i++) {
                        if (voiceSelect.options[i].value === defaultVoice.name) {
                            voiceSelect.selectedIndex = i;
                            break;
                        }
                    }
                    ttsStatusSpan.innerText = '🎤 已选: ' + defaultVoice.name.split(' ').slice(0,2).join(' ');
                } else if (voices.length) {
                    selectedVoice = voices[0];
                    voiceSelect.selectedIndex = 0;
                }
            }
        }
        
        function initVoicesAndSelect() {
            if (typeof window.speechSynthesis === 'undefined') {
                ttsStatusSpan.innerText = '⚠️ 当前浏览器不支持语音合成';
                voiceSelect.disabled = true;
                return;
            }
            if (window.speechSynthesis.getVoices().length) populateVoiceList();
            window.speechSynthesis.onvoiceschanged = () => populateVoiceList();
        }
        
        function onVoiceChange() {
            const selectedName = voiceSelect.value;
            if (!selectedName) return;
            const voices = window.speechSynthesis.getVoices();
            const newVoice = voices.find(v => v.name === selectedName);
            if (newVoice) {
                selectedVoice = newVoice;
                ttsStatusSpan.innerText = `🎙️ 语音: ${newVoice.name.split(' ').slice(0,2).join(' ')}`;
                setTimeout(() => {
                    if(ttsStatusSpan.innerText.startsWith('🎙️')) ttsStatusSpan.innerText = '⚡ 就绪 · 自动连读模式';
                }, 1800);
            }
        }
        
        function applyFontSize(size) {
            size = Math.min(32, Math.max(12, size));
            if (currentFontSize === size) return;
            currentFontSize = size;
            const readingPage = document.querySelector('.reading-page');
            readingPage.style.fontSize = currentFontSize + 'px';
            fontSizeDisplay.innerText = currentFontSize + 'px';
            if (rawText && rawText.trim() !== "") rebuildPagesAsyncAndReset(true);
        }
        function increaseFont() { applyFontSize(currentFontSize + 2); }
        function decreaseFont() { applyFontSize(currentFontSize - 2); }
        
        // ---------- 核心分页函数：每页约500字，以标点符号结尾（允许450~550字）----------
        async function splitIntoPages(text, signal) {
            if (!text) return [];
            const pagesResult = [];
            let start = 0;
            const len = text.length;
            const TARGET = 500;      // 目标字数
            const MIN = 450;          // 最小字数
            const MAX = 550;          // 最大字数
            
            // 标点符号集合（包括中英文句号、感叹号、问号、分号、冒号、换行等）
            const punctuation = new Set(['。', '！', '？', '；', '：', '.', '!', '?', ';', ':', '\n']);
            
            while (start < len) {
                if (signal && signal.aborted) return [];
                let end = Math.min(start + TARGET, len);
                // 如果剩余文本不足最小字数，直接取完
                if (len - start <= MAX) {
                    pagesResult.push(text.substring(start));
                    break;
                }
                // 从 end 位置开始向后寻找合适的标点符号（优先向后，不超过 MAX）
                let foundPos = -1;
                let searchEnd = Math.min(start + MAX, len);
                for (let i = end; i <= searchEnd; i++) {
                    if (i < len && punctuation.has(text[i])) {
                        foundPos = i + 1;  // 包含标点符号本身
                        break;
                    }
                }
                if (foundPos !== -1) {
                    // 向后找到了标点
                    end = foundPos;
                } else {
                    // 向后没找到，向前寻找上一个标点（但必须保证页长 >= MIN）
                    let fallbackPos = -1;
                    let searchStart = Math.max(start + MIN, start);
                    for (let i = end - 1; i >= searchStart; i--) {
                        if (punctuation.has(text[i])) {
                            fallbackPos = i + 1;
                            break;
                        }
                    }
                    if (fallbackPos !== -1) {
                        end = fallbackPos;
                    } else {
                        // 实在找不到标点，就在 MIN 和 MAX 之间强制切分（避免无限循环）
                        if (len - start > MAX) {
                            end = start + MAX;
                        } else {
                            end = len;
                        }
                    }
                }
                // 确保不会切出空页
                if (end <= start) {
                    end = Math.min(start + MAX, len);
                    if (end <= start) break;
                }
                pagesResult.push(text.substring(start, end));
                start = end;
                if (pagesResult.length % 20 === 0) await new Promise(resolve => setTimeout(resolve, 0));
            }
            // 过滤掉可能的空字符串
            return pagesResult.filter(p => p.trim().length > 0);
        }
        
        let rebuildSequence = 0;
        async function rebuildPagesAsyncAndReset(keepPageIndex = false) {
            if (!rawText || rawText.trim() === "") {
                pages = []; currentPageIdx = 0; displayCurrentPage(); updateButtonsState(); setControlsEnabled(true);
                pageOffsets = []; renderTOC();
                return;
            }
            if (currentBuildCancel) currentBuildCancel.aborted = true;
            const thisBuildId = ++rebuildSequence;
            const cancelToken = { aborted: false };
            currentBuildCancel = cancelToken;
            setControlsEnabled(false);
            showProcessingMsg('📖 智能分页中（每页约500字，以标点结尾）...');
            let newPages = await splitIntoPages(rawText, cancelToken);
            if (cancelToken.aborted || thisBuildId !== rebuildSequence) return;
            currentBuildCancel = null;
            pages = newPages.length ? newPages : [rawText];
            if (!keepPageIndex || currentPageIdx >= pages.length) currentPageIdx = 0;
            if (currentPageIdx < 0) currentPageIdx = 0;
            displayCurrentPage();
            updateButtonsState();
            setControlsEnabled(true);
            refreshTOCAndOffsets();
            ttsStatusSpan.innerText = '📖 文本已加载，每页约500字（标点结尾），可点击朗读';
            setTimeout(() => { if (ttsStatusSpan.innerText === '📖 文本已加载，每页约500字（标点结尾），可点击朗读') ttsStatusSpan.innerText = '⚡ 就绪 · 自动连读模式'; }, 1800);
        }
        
        function displayCurrentPage() {
            if (!pages.length) { pageContainer.innerHTML = `<div style="text-align: center; padding: 3rem 1rem; color: #adb7c4;">📭 暂无内容，请导入 TXT 文件</div>`; return; }
            pageContainer.innerText = pages[currentPageIdx];
            highlightActiveChapter();
            // 滚动条自动回到顶部
            pageContainer.scrollTop = 0;
        }
        function updateButtonsState() {
            if (pages.length === 0) { prevBtn.disabled = true; nextBtn.disabled = true; speakBtn.disabled = true; pageIndicator.innerText = `第 0 / 0 页`; return; }
            speakBtn.disabled = false;
            prevBtn.disabled = (currentPageIdx === 0);
            nextBtn.disabled = (currentPageIdx === pages.length - 1);
            pageIndicator.innerText = `第 ${currentPageIdx+1} / ${pages.length} 页`;
        }
        
        // TTS 逻辑
        function stopTTS() { 
            if (window.speechSynthesis) window.speechSynthesis.cancel(); 
            isSpeaking = false; 
            currentUtterance = null; 
            ttsStatusSpan.innerText = '⏹️ 已停止'; 
            setTimeout(() => { 
                if(ttsStatusSpan.innerText === '⏹️ 已停止') ttsStatusSpan.innerText = '⚡ 就绪 · 自动连读模式'; 
            }, 1200); 
            pauseBtn.disabled = true; 
            resumeBtn.disabled = true; 
            stopBtn.disabled = true; 
            speakBtn.disabled = pages.length === 0; 
        }
        
        function speakCurrentPage() { 
            if (!pages.length) return;
            if (window.speechSynthesis && isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                currentUtterance = null;
            }
            const textToRead = pages[currentPageIdx];
            if (!textToRead || textToRead.trim() === "") {
                if (currentPageIdx + 1 < pages.length) {
                    currentPageIdx++;
                    displayCurrentPage();
                    updateButtonsState();
                    speakCurrentPage();
                }
                return;
            }
            
            const startPageIdx = currentPageIdx;
            const utterance = new SpeechSynthesisUtterance(textToRead);
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.lang = 'zh-CN';
            
            let hasStarted = false;
            
            utterance.onstart = () => { 
                hasStarted = true;
                isSpeaking = true; 
                ttsStatusSpan.innerText = '🔊 朗读中 ...'; 
                pauseBtn.disabled = false; 
                resumeBtn.disabled = true; 
                stopBtn.disabled = false; 
                speakBtn.disabled = true; 
            };
            
            utterance.onend = () => { 
                const wasSpeaking = isSpeaking;
                isSpeaking = false; 
                currentUtterance = null;
                if (hasStarted && wasSpeaking && startPageIdx === currentPageIdx && pages.length > 0) {
                    if (currentPageIdx + 1 < pages.length) {
                        currentPageIdx++;
                        displayCurrentPage();
                        updateButtonsState();
                        speakCurrentPage();
                    } else {
                        ttsStatusSpan.innerText = '✅ 全书朗读完毕';
                        pauseBtn.disabled = true;
                        resumeBtn.disabled = true;
                        stopBtn.disabled = true;
                        speakBtn.disabled = pages.length === 0;
                    }
                } else {
                    if (!hasStarted) {
                        ttsStatusSpan.innerText = '⚠️ 朗读未启动，请检查语音设置或重试';
                    }
                    pauseBtn.disabled = true;
                    resumeBtn.disabled = true;
                    stopBtn.disabled = true;
                    speakBtn.disabled = pages.length === 0;
                }
            };
            
            utterance.onerror = (event) => {
                console.warn('SpeechSynthesis error:', event);
                ttsStatusSpan.innerText = '❌ 朗读出错，请重试';
                isSpeaking = false;
                currentUtterance = null;
                pauseBtn.disabled = true;
                resumeBtn.disabled = true;
                stopBtn.disabled = true;
                speakBtn.disabled = pages.length === 0;
            };
            
            currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        }
        
        function pauseSpeaking() { 
            if (window.speechSynthesis && isSpeaking && currentUtterance) { 
                window.speechSynthesis.pause(); 
                isSpeaking = false; 
                ttsStatusSpan.innerText = '⏸️ 已暂停'; 
                pauseBtn.disabled = true; 
                resumeBtn.disabled = false; 
                stopBtn.disabled = false; 
            } 
        }
        
        function resumeSpeaking() { 
            if (window.speechSynthesis && currentUtterance) { 
                window.speechSynthesis.resume(); 
                isSpeaking = true; 
                ttsStatusSpan.innerText = '🔊 继续朗读'; 
                pauseBtn.disabled = false; 
                resumeBtn.disabled = true; 
                stopBtn.disabled = false; 
            } else if (!currentUtterance && pages.length) { 
                speakCurrentPage(); 
            } 
        }
        
        function loadTextAndReset(content) {
            const cleanedContent = normalizeSpacing(content);
            rawText = cleanedContent;
            stopTTS();
            tocItems = extractChaptersFromText(rawText);
            if (currentBuildCancel) currentBuildCancel.aborted = true;
            rebuildSequence++;
            rebuildPagesAsyncAndReset(false);
        }
        
        function readFile(file) { 
            if (!file || (!file.type.includes('text') && !file.name.endsWith('.txt'))) { 
                ttsStatusSpan.innerText = '⚠️ 请选择 .txt 文本文件'; 
                return; 
            } 
            const reader = new FileReader(); 
            reader.onload = (e) => { 
                if (e.target.result) loadTextAndReset(e.target.result); 
            }; 
            reader.onerror = () => ttsStatusSpan.innerText = '文件读取错误'; 
            reader.readAsText(file, 'UTF-8'); 
        }
        
        function initDragAndDrop() { 
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#f0f4fe'; dropZone.style.borderColor = '#5f8bb3'; }); 
            dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.background = ''; dropZone.style.borderColor = '#cbd5e1'; }); 
            dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.background = ''; dropZone.style.borderColor = '#cbd5e1'; const files = e.dataTransfer.files; if (files && files.length > 0) { const file = files[0]; if (file.type === 'text/plain' || file.name.endsWith('.txt')) readFile(file); else ttsStatusSpan.innerText = '仅支持 .txt 文本文件'; } }); 
        }
        
        let resizeTimer; 
        window.addEventListener('resize', () => { if (rawText && rawText.length) { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => rebuildPagesAsyncAndReset(true), 200); } });
        
        function bindEvents() {
            prevBtn.addEventListener('click', () => { if (pages.length && currentPageIdx > 0) { currentPageIdx--; displayCurrentPage(); updateButtonsState(); if (isSpeaking) stopTTS(); highlightActiveChapter(); } });
            nextBtn.addEventListener('click', () => { if (pages.length && currentPageIdx < pages.length - 1) { currentPageIdx++; displayCurrentPage(); updateButtonsState(); if (isSpeaking) stopTTS(); highlightActiveChapter(); } });
            speakBtn.addEventListener('click', speakCurrentPage); pauseBtn.addEventListener('click', pauseSpeaking); resumeBtn.addEventListener('click', resumeSpeaking); stopBtn.addEventListener('click', stopTTS);
            fileSelectBtn.addEventListener('click', () => fileInput.click()); fileInput.addEventListener('change', (e) => { if (e.target.files && e.target.files[0]) readFile(e.target.files[0]); fileInput.value = ''; });
            voiceSelect.addEventListener('change', onVoiceChange); fontIncreaseBtn.addEventListener('click', increaseFont); fontDecreaseBtn.addEventListener('click', decreaseFont);
        }
        
        function init() { 
            bindEvents(); 
            initDragAndDrop(); 
            initVoicesAndSelect(); 
            fontSizeDisplay.innerText = currentFontSize + 'px'; 
            document.querySelector('.reading-page').style.fontSize = currentFontSize + 'px'; 
            pages = []; 
            currentPageIdx = 0; 
            displayCurrentPage(); 
            updateButtonsState(); 
            setControlsEnabled(true); 
            renderTOC(); 
        }
        init();
    })();
</script>
