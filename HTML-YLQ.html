<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>代码预览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全屏布局，底部栏固定 */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #1e1f2c;
            font-family: 'Segoe UI', 'Fira Code', 'Cascadia Code', monospace, system-ui;
            display: flex;
            flex-direction: column;
        }

        /* 主分屏容器，占满剩余空间 */
        .split-container {
            display: flex;
            width: 100%;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========= 左侧代码区 ========= */
        .code-panel {
            width: 50%;                /* 默认 1/2 分屏 */
            background: #0a0c15;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            transition: width 0.2s ease;
            overflow: auto;
        }

        .editor-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0c15;
        }

        /* 行号容器 */
        .line-numbers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 56px;
            height: 100%;
            background: #0a0c15;
            overflow: hidden;
            pointer-events: none;
            z-index: 10;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.55;
            border-right: 1px solid #2d3748;
            box-sizing: border-box;
        }

        .line-numbers-list {
            display: flex;
            flex-direction: column;
            text-align: right;
            padding: 20px 8px 20px 0;
            color: #6c7c9e;
            background: #0a0c15;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            transition: transform 0s linear;
            will-change: transform;
            width: 100%;
            box-sizing: border-box;
        }

        .line-numbers-list div {
            white-space: nowrap;
            font-size: 14px;
            line-height: 1.55;
            min-height: 1.55em;
            padding-right: 4px;
            transition: background 0.2s, color 0.2s;
        }

        /* 高亮行号的样式 */
        .line-numbers-list div.highlight-line {
            background: #fbbf24;
            color: #0f172a;
            font-weight: bold;
            border-radius: 4px 0 0 4px;
            box-shadow: -2px 0 0 #f59e0b;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #0a0c15;
            color: #e2e8f0;
            border: none;
            padding: 20px 18px 20px 68px;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.55;
            resize: none;
            outline: none;
            white-space: pre;
            tab-size: 4;
            overflow: auto;
            caret-color: #60a5fa;
            position: relative;
            z-index: 5;
        }

        textarea:focus {
            background: #0f111a;
            box-shadow: inset 0 0 0 1px #334155;
        }

        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1e1f2c;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 6px;
        }

        .resize-handle {
            width: 2px;
            background: #3b4252;
            flex-shrink: 0;
            transition: background 0.1s;
        }

        .preview-panel {
            flex: 1;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .iframe-wrapper {
            flex: 1;
            background: white;
            position: relative;
            overflow: auto;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .code-panel.drag-over {
            background: #11131f;
            box-shadow: inset 0 0 0 3px #60a5fa, 0 0 0 2px rgba(96,165,250,0.5);
            transition: all 0.1s ease;
        }
        .code-panel.drag-over .editor-area {
            background: rgba(96,165,250,0.05);
        }

        .bottom-bar {
            flex-shrink: 0;
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid #2d3748;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 8px 16px;
            z-index: 20;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid #4b5563;
            color: #e2e8f0;
            font-size: 0.75rem;
            font-family: inherit;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .mode-btn:hover {
            background: #2d3748;
            border-color: #60a5fa;
            color: white;
        }
        .mode-btn:active {
            transform: scale(0.96);
        }
        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* 提示小浮层 */
        .inspector-toast {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: #1e293b;
            color: #facc15;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        @media (max-width: 640px) {
            .mode-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            textarea {
                padding: 12px 12px 12px 60px;
                font-size: 12px;
            }
            .line-numbers-container {
                width: 48px;
            }
            .line-numbers-list {
                padding: 12px 6px 12px 0;
            }
            .line-numbers-list div {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="split-container">
    <div class="code-panel" id="codePanel">
        <div class="editor-area" id="editorArea">
            <div class="line-numbers-container" id="lineNumbersContainer">
                <div class="line-numbers-list" id="lineNumbersList"></div>
            </div>
            <textarea id="codeEditor" spellcheck="false" placeholder="✍️ 编写 HTML 代码，或直接拖入 .html 文件 ..."></textarea>
        </div>
    </div>
    <div class="resize-handle"></div>
    <div class="preview-panel">
        <div class="iframe-wrapper">
            <iframe id="previewFrame" title="代码预览窗口" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <button class="mode-btn" data-mode="code-full">代码全屏</button>
    <button class="mode-btn" data-mode="half">1/2 分屏</button>
    <button class="mode-btn" data-mode="fifth">1/5 分屏</button>
    <button class="mode-btn" data-mode="preview-full">预览全屏</button>
</div>

<div id="inspectorToast" class="inspector-toast">🔍 已定位到代码行</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const codePanel = document.getElementById('codePanel');
        const previewPanel = document.querySelector('.preview-panel');
        const resizeHandle = document.querySelector('.resize-handle');
        const editorTextarea = document.getElementById('codeEditor');
        const previewIframe = document.getElementById('previewFrame');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const lineNumbersList = document.getElementById('lineNumbersList');
        const toastEl = document.getElementById('inspectorToast');
        
        // 显示短暂提示
        function showToast(msg) {
            if (!toastEl) return;
            toastEl.textContent = msg || '🔍 已定位到代码行';
            toastEl.style.opacity = '1';
            setTimeout(() => {
                toastEl.style.opacity = '0';
            }, 1500);
        }
        
        // 默认示例代码 (包含一些带 id/class 的元素便于测试定位)
        const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态预览 | 灵动双屏·元素探查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e9eef5 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            max-width: 700px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            padding: 2rem 2rem 2.5rem;
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(120deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .badge {
            background: #3b82f620;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #1e40af;
            font-weight: 500;
        }
        p {
            color: #334155;
            line-height: 1.6;
            margin: 1rem 0;
        }
        button {
            background: #0f172a;
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }
        .feature-grid {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        .feature {
            background: #f1f5f9;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .demo-highlight {
            transition: 0.1s;
        }
        .demo-highlight:active {
            background: #facc15;
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <div class="badge" id="featureBadge">✨ 双屏即时预览器 · 点击元素定位源码行</div>
        <h1 class="title" id="mainTitle">拖放 · 编码 · 探查</h1>
        <p class="desc-text">左侧编辑任意 HTML/CSS/JS，右侧实时呈现效果。<br>
        📁 将 <strong>.html</strong> 文件直接拖入左侧代码区，自动加载并预览。<br>
        🖱️ 点击底部按钮，自由切换四种分屏模式。<br>
        🔍 <strong style="color:#f97316;">新增功能：在预览区点击任意元素，左侧自动高亮对应代码行！</strong></p>
        <div class="feature-grid" id="featureGrid">
            <span class="feature">🎨 动态分屏</span>
            <span class="feature">⚡ 实时渲染</span>
            <span class="feature">📂 拖拽加载</span>
            <span class="feature">🔢 行号增强</span>
            <span class="feature">📍 元素定位</span>
        </div>
        <button id="demoBtn">✨ 试试点击反馈</button>
        <footer>点击任意元素 → 定位代码行</footer>
    </div>
    <script>
        document.getElementById('demoBtn')?.addEventListener('click', () => {
            alert('🎉 预览区交互完美运行！现在点击任意文字或卡片区域，左侧编辑器会高亮对应HTML行号～');
        });
        // 可选：为卡片添加点击时的控制台提示（仅演示）
        console.log('探查器已激活：点击任意元素，父页面将定位源码行');
    <\/script>
</body>
</html>`;
        
        // ---------- 行号管理模块 ----------
        function updateLineNumbers() {
            if (!editorTextarea || !lineNumbersList) return;
            const code = editorTextarea.value;
            const lines = code.split('\n');
            const totalLines = lines.length;
            let htmlFragment = '';
            for (let i = 1; i <= totalLines; i++) {
                htmlFragment += `<div data-line="${i}">${i}</div>`;
            }
            lineNumbersList.innerHTML = htmlFragment;
            syncLineNumbersScroll();
        }
        
        function syncLineNumbersScroll() {
            if (!editorTextarea || !lineNumbersList) return;
            const scrollTop = editorTextarea.scrollTop;
            lineNumbersList.style.transform = `translateY(-${scrollTop}px)`;
        }
        
        function refreshLineNumbers() {
            updateLineNumbers();
            syncLineNumbersScroll();
        }
        
        // 高亮指定行号 (并滚动到可视区域)
        let currentHighlightTimer = null;
        function highlightCodeLine(lineNumber) {
            if (!lineNumbersList) return;
            // 清除之前高亮
            const prevHighlights = lineNumbersList.querySelectorAll('.highlight-line');
            prevHighlights.forEach(el => el.classList.remove('highlight-line'));
            if (!lineNumber) return;
            
            const targetLineDiv = lineNumbersList.querySelector(`div[data-line="${lineNumber}"]`);
            if (targetLineDiv) {
                targetLineDiv.classList.add('highlight-line');
                // 滚动 textarea 使得该行可见
                const lineHeight = parseFloat(getComputedStyle(editorTextarea).lineHeight);
                const paddingTop = parseFloat(getComputedStyle(editorTextarea).paddingTop);
                // 估算该行顶部偏移 (行高 * (行号-1))
                const targetScroll = (lineNumber - 1) * lineHeight - paddingTop;
                if (!isNaN(targetScroll) && targetScroll >= 0) {
                    editorTextarea.scrollTop = Math.max(0, targetScroll);
                }
                syncLineNumbersScroll(); // 滚动后立即同步行号偏移
                // 显示短暂提示
                showToast(`📍 定位到第 ${lineNumber} 行`);
                // 3秒后移除高亮
                if (currentHighlightTimer) clearTimeout(currentHighlightTimer);
                currentHighlightTimer = setTimeout(() => {
                    if (targetLineDiv) targetLineDiv.classList.remove('highlight-line');
                }, 2500);
            } else {
                showToast(`⚠️ 未找到第 ${lineNumber} 行`);
            }
        }
        
        // ---------- 预览更新 + 注入元素探查器 ----------
        function updatePreview() {
            const code = editorTextarea.value;
            if (!previewIframe) return;
            
            const iframeDoc = previewIframe.contentWindow?.document;
            if (!iframeDoc) {
                previewIframe.srcdoc = "<html><body>预览加载中...</body></html>";
                setTimeout(() => {
                    const newDoc = previewIframe.contentWindow?.document;
                    if (newDoc) {
                        newDoc.open();
                        newDoc.write(code);
                        newDoc.close();
                        injectInspectorIntoIframe(); // 注入监听
                    }
                }, 20);
                return;
            }
            
            iframeDoc.open();
            iframeDoc.write(code);
            iframeDoc.close();
            // 等待 DOM 加载完毕后注入探查脚本
            if (previewIframe.contentWindow) {
                // 确保内容加载完成再注入
                if (previewIframe.contentWindow.document.readyState === 'complete') {
                    injectInspectorIntoIframe();
                } else {
                    previewIframe.addEventListener('load', function onLoad() {
                        injectInspectorIntoIframe();
                        previewIframe.removeEventListener('load', onLoad);
                    });
                }
            } else {
                // fallback
                setTimeout(() => injectInspectorIntoIframe(), 50);
            }
        }
        
        // 向 iframe 注入元素点击探查器 (通过 postMessage 通信)
        let inspectorInjected = false;
        function injectInspectorIntoIframe() {
            if (!previewIframe || !previewIframe.contentWindow) return;
            try {
                // 避免重复注入，但每次更新 iframe 后需要重新注入
                const doc = previewIframe.contentWindow.document;
                if (!doc) return;
                // 检查是否已经注入过标识，防止多次监听
                if (doc.body && doc.body.getAttribute('data-inspector-ready') === 'true') {
                    return;
                }
                // 注入脚本
                const script = doc.createElement('script');
                script.textContent = `
                    (function() {
                        if (window.__inspectorActive) return;
                        window.__inspectorActive = true;
                        // 监听点击事件
                        document.addEventListener('click', function(e) {
                            var target = e.target;
                            if (!target) return;
                            // 收集元素关键信息 (tagName, id, classList)
                            var info = {
                                tagName: target.tagName ? target.tagName.toLowerCase() : '',
                                id: target.id || '',
                                classList: target.className ? target.className.split(/\\s+/) : []
                            };
                            // 额外收集可能的内联样式特征 (不必要)
                            // 尝试获取 data-* 属性 或者 父级上下文? 简单但足够
                            // 生成唯一的选择器提示: 优先 id, 其次 tag + 部分 class
                            if (info.id) {
                                info.selectorHint = '#' + info.id;
                            } else if (info.classList.length > 0) {
                                info.selectorHint = info.tagName + '.' + info.classList.join('.');
                            } else {
                                info.selectorHint = info.tagName;
                            }
                            // 发送给父窗口
                            window.parent.postMessage({
                                type: 'INSPECT_ELEMENT',
                                elementInfo: info,
                                outerHTML: target.outerHTML.substring(0, 300) // 截取部分用于匹配
                            }, '*');
                            // 可选视觉反馈 (闪一下)
                            target.style.transition = 'background 0.1s';
                            var originalBg = target.style.backgroundColor;
                            target.style.backgroundColor = '#facc1550';
                            setTimeout(function() {
                                target.style.backgroundColor = originalBg;
                            }, 200);
                            e.stopPropagation();
                        });
                        document.body && document.body.setAttribute('data-inspector-ready', 'true');
                        console.log('✅ 元素探查器已注入，点击任意元素将定位左侧源码行');
                    })();
                `;
                doc.body?.appendChild(script);
                // 如果 body 尚未准备好，等待 DOMContentLoaded
                if (!doc.body) {
                    doc.addEventListener('DOMContentLoaded', () => {
                        const s = doc.createElement('script');
                        s.textContent = script.textContent;
                        doc.body.appendChild(s);
                    });
                }
            } catch (err) {
                console.warn('注入探查器失败（跨域限制忽略）', err);
            }
        }
        
        // 处理来自 iframe 的消息：定位代码行
        function onMessageFromIframe(event) {
            if (!event.data || event.data.type !== 'INSPECT_ELEMENT') return;
            const elementInfo = event.data.elementInfo;
            const outerHTMLSnippet = event.data.outerHTML;
            if (!elementInfo) return;
            
            const code = editorTextarea.value;
            if (!code.trim()) return;
            
            // 在代码中查找最佳匹配行
            let foundLine = findBestMatchLine(code, elementInfo, outerHTMLSnippet);
            if (foundLine !== null) {
                highlightCodeLine(foundLine);
            } else {
                showToast('❓ 未能定位到源码行 (可能由JS动态生成)');
            }
        }
        
        // 根据元素信息在源代码中查找匹配行号
        function findBestMatchLine(code, elementInfo, outerSnippet) {
            const lines = code.split('\n');
            const tag = elementInfo.tagName;
            const id = elementInfo.id;
            const classList = elementInfo.classList;
            
            // 策略 1: 优先精确匹配 id (最可靠)
            if (id) {
                const idPattern = new RegExp(`<${tag}[^>]*\\bid\\s*=\\s*["']${escapeRegex(id)}["'][^>]*>`, 'i');
                for (let i = 0; i < lines.length; i++) {
                    if (idPattern.test(lines[i])) {
                        return i + 1; // 行号从1开始
                    }
                }
                // 更宽松: 只匹配 id 属性值
                const looseIdPattern = new RegExp(`\\bid\\s*=\\s*["']${escapeRegex(id)}["']`, 'i');
                for (let i = 0; i < lines.length; i++) {
                    if (looseIdPattern.test(lines[i]) && lines[i].includes(`<${tag}`)) {
                        return i + 1;
                    }
                }
            }
            
            // 策略 2: 利用 class 组合 (匹配 tag + class)
            if (classList && classList.length > 0) {
                // 构建 class 匹配正则 (顺序可能不同，但至少包含所有class)
                const classPattern = classList.map(cls => `(?=[^>]*\\bclass\\s*=\\s*["'][^"']*\\b${escapeRegex(cls)}\\b)`).join('');
                const regex = new RegExp(`<${tag}[^>]*${classPattern}[^>]*>`, 'i');
                for (let i = 0; i < lines.length; i++) {
                    if (regex.test(lines[i])) {
                        return i + 1;
                    }
                }
                // 降级: 仅匹配任意一个 class
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (line.includes(`<${tag}`) && classList.some(cls => line.includes(`class="`) && line.includes(cls))) {
                        return i + 1;
                    }
                }
            }
            
            // 策略 3: 使用 outerHTML 片段的前40个字符匹配
            if (outerSnippet && outerSnippet.length > 15) {
                const snippetClean = outerSnippet.substring(0, 80).replace(/\s+/g, ' ').trim();
                for (let i = 0; i < lines.length; i++) {
                    const lineClean = lines[i].replace(/\s+/g, ' ').trim();
                    if (lineClean.includes(snippetClean.substring(0, 40))) {
                        return i + 1;
                    }
                }
            }
            
            // 策略 4: 纯标签名匹配 (取第一个出现的对应标签)
            if (tag) {
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].match(new RegExp(`<${tag}\\b`, 'i'))) {
                        return i + 1;
                    }
                }
            }
            return null;
        }
        
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        // 编辑器内容变化时的处理
        let previewTimer = null;
        function debouncedUpdatePreview() {
            if (previewTimer) clearTimeout(previewTimer);
            previewTimer = setTimeout(() => {
                updatePreview();
                previewTimer = null;
            }, 8);
        }
        
        function onEditorContentChange() {
            debouncedUpdatePreview();
            refreshLineNumbers();
        }
        
        // ---------- 文件拖放 ----------
        const dropZone = codePanel;
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (!files || files.length === 0) return;
            const file = files[0];
            const fileName = file.name.toLowerCase();
            const isHtmlFile = fileName.endsWith('.html') || fileName.endsWith('.htm') || file.type === 'text/html';
            if (!isHtmlFile) {
                alert('📛 请拖放 .html 或 .htm 文件到代码栏。');
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                editorTextarea.value = ev.target.result;
                updatePreview();
                refreshLineNumbers();
            };
            reader.readAsText(file, 'UTF-8');
        });
        
        // ---------- 分屏模式 (保留原逻辑) ----------
        function setSplitMode(mode) {
            modeBtns.forEach(btn => btn.classList.remove('active'));
            switch (mode) {
                case 'code-full':
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'none';
                    resizeHandle.style.display = 'none';
                    codePanel.style.width = '100%';
                    break;
                case 'preview-full':
                    codePanel.style.display = 'none';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'none';
                    break;
                case 'half':
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'block';
                    codePanel.style.width = '50%';
                    break;
                case 'fifth':
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'block';
                    codePanel.style.width = '20%';
                    break;
                default: return;
            }
            const activeBtn = Array.from(modeBtns).find(btn => btn.getAttribute('data-mode') === mode);
            if (activeBtn) activeBtn.classList.add('active');
            setTimeout(() => {
                syncLineNumbersScroll();
                refreshLineNumbers();
            }, 30);
        }
        
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                setSplitMode(mode);
            });
        });
        
        // ---------- 初始化 ----------
        function init() {
            editorTextarea.value = DEFAULT_HTML;
            updatePreview();
            refreshLineNumbers();
            editorTextarea.addEventListener('input', onEditorContentChange);
            editorTextarea.addEventListener('scroll', syncLineNumbersScroll);
            editorTextarea.addEventListener('blur', () => {
                if (previewTimer) clearTimeout(previewTimer);
                updatePreview();
            });
            window.addEventListener('message', onMessageFromIframe);
            setSplitMode('half');
            previewIframe.addEventListener('load', () => {
                injectInspectorIntoIframe();
            });
        }
        
        init();
        console.log('✅ 增强预览器已启动 | 点击预览区元素自动定位源码行 + 高亮行号');
    })();
</script>
</body>
</html>
