<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>代码预览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全屏布局，底部栏固定 */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #1e1f2c;
            font-family: 'Segoe UI', 'Fira Code', 'Cascadia Code', monospace, system-ui;
            display: flex;
            flex-direction: column;
        }

        /* 主分屏容器，占满剩余空间 */
        .split-container {
            display: flex;
            width: 100%;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========= 左侧代码区 ========= */
        .code-panel {
            width: 50%;                /* 默认 1/2 分屏 */
            background: #0a0c15;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            transition: width 0.2s ease;  /* 切换模式时平滑过渡 */
            overflow: auto;
        }

        /* 编辑器区域 (相对定位容器，用于行号绝对定位) */
        .editor-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0c15;
        }

        /* ---------- 行号容器 (绝对定位，覆盖左侧) ---------- */
        .line-numbers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 56px;            /* 足够显示4位行号 + 内边距 */
            height: 100%;
            background: #0a0c15;
            overflow: hidden;
            pointer-events: none;    /* 让鼠标穿透，不影响编辑 */
            z-index: 10;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.55;
            border-right: 1px solid #2d3748;
            box-sizing: border-box;
        }

        .line-numbers-list {
            display: flex;
            flex-direction: column;
            text-align: right;
            padding: 20px 8px 20px 0;   /* 上下内边距与textarea的padding同步 */
            color: #6c7c9e;
            background: #0a0c15;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            transition: transform 0s linear; /* 滚动偏移由js控制 */
            will-change: transform;
            width: 100%;
            box-sizing: border-box;
        }

        .line-numbers-list div {
            white-space: nowrap;
            font-size: 14px;
            line-height: 1.55;
            min-height: 1.55em;
            padding-right: 4px;
        }

        /* 编辑器文本域 */
        textarea {
            width: 100%;
            height: 100%;
            background: #0a0c15;
            color: #e2e8f0;
            border: none;
            padding: 20px 18px 20px 68px;   /* 左侧留出空间给行号 (行号容器宽56px + 额外间隙) */
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.55;
            resize: none;
            outline: none;
            white-space: pre;
            tab-size: 4;
            overflow: auto;
            caret-color: #60a5fa;
            position: relative;
            z-index: 5;
        }

        textarea:focus {
            background: #0f111a;
            box-shadow: inset 0 0 0 1px #334155;
        }

        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1e1f2c;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 6px;
        }

        /* ========= 视觉分隔条（仅装饰，不可拖动） ========= */
        .resize-handle {
            width: 2px;
            background: #3b4252;
            flex-shrink: 0;
            transition: background 0.1s;
        }

        /* ========= 右侧预览区 ========= */
        .preview-panel {
            flex: 1;                /* 自动填充剩余空间 */
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .iframe-wrapper {
            flex: 1;
            background: white;
            position: relative;
            overflow: auto;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* 拖拽高亮动画（文件拖放） */
        .code-panel.drag-over {
            background: #11131f;
            box-shadow: inset 0 0 0 3px #60a5fa, 0 0 0 2px rgba(96,165,250,0.5);
            transition: all 0.1s ease;
        }
        .code-panel.drag-over .editor-area {
            background: rgba(96,165,250,0.05);
        }

        /* ========= 底部简洁按钮栏 ========= */
        .bottom-bar {
            flex-shrink: 0;
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid #2d3748;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 8px 16px;
            z-index: 20;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid #4b5563;
            color: #e2e8f0;
            font-size: 0.75rem;
            font-family: inherit;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .mode-btn:hover {
            background: #2d3748;
            border-color: #60a5fa;
            color: white;
        }
        .mode-btn:active {
            transform: scale(0.96);
        }
        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* 响应式微调 */
        @media (max-width: 640px) {
            .mode-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            textarea {
                padding: 12px 12px 12px 60px;
                font-size: 12px;
            }
            .line-numbers-container {
                width: 48px;
            }
            .line-numbers-list {
                padding: 12px 6px 12px 0;
            }
            .line-numbers-list div {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- 主分屏区域 -->
<div class="split-container">
    <!-- 左侧代码面板（支持拖拽文件） -->
    <div class="code-panel" id="codePanel">
        <div class="editor-area" id="editorArea">
            <!-- 行号容器（动态更新） -->
            <div class="line-numbers-container" id="lineNumbersContainer">
                <div class="line-numbers-list" id="lineNumbersList"></div>
            </div>
            <textarea id="codeEditor" spellcheck="false" placeholder="✍️ 编写 HTML 代码，或直接拖入 .html 文件 ..."></textarea>
        </div>
    </div>

    <!-- 视觉分隔条（仅装饰，不可拖拽） -->
    <div class="resize-handle"></div>

    <!-- 右侧预览面板 -->
    <div class="preview-panel">
        <div class="iframe-wrapper">
            <iframe id="previewFrame" title="代码预览窗口" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>

<!-- 底部简洁按钮栏：四种分屏模式 -->
<div class="bottom-bar">
    <button class="mode-btn" data-mode="code-full">代码全屏</button>
    <button class="mode-btn" data-mode="half">1/2 分屏</button>
    <button class="mode-btn" data-mode="fifth">1/5 分屏</button>
    <button class="mode-btn" data-mode="preview-full">预览全屏</button>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const codePanel = document.getElementById('codePanel');
        const previewPanel = document.querySelector('.preview-panel');
        const resizeHandle = document.querySelector('.resize-handle');
        const editorTextarea = document.getElementById('codeEditor');
        const previewIframe = document.getElementById('previewFrame');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const lineNumbersList = document.getElementById('lineNumbersList');
        
        // 初始默认示例代码 (一个漂亮的现代HTML演示)
        const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态预览 | 灵动双屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #e9eef5 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            max-width: 700px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            padding: 2rem 2rem 2.5rem;
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(120deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .badge {
            background: #3b82f620;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #1e40af;
            font-weight: 500;
        }
        p {
            color: #334155;
            line-height: 1.6;
            margin: 1rem 0;
        }
        button {
            background: #0f172a;
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }
        .feature-grid {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        .feature {
            background: #f1f5f9;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✨ 双屏即时预览器 · 带行号</div>
        <h1>拖放 · 编码 · 预览</h1>
        <p>左侧编辑任意 HTML/CSS/JS，右侧实时呈现效果。<br>
        📁 将 <strong>.html</strong> 文件直接拖入左侧代码区，自动加载并预览。<br>
        🖱️ 点击底部按钮，自由切换四种分屏模式。<br>
        🔢 左侧编辑器自带行号，滚动同步，清晰定位代码。</p>
        <div class="feature-grid">
            <span class="feature">🎨 动态分屏</span>
            <span class="feature">⚡ 实时渲染</span>
            <span class="feature">📂 拖拽加载</span>
            <span class="feature">🔢 行号增强</span>
        </div>
        <button id="demoBtn">✨ 试试点击反馈</button>
        <footer>极速开发 · 灵感呈现</footer>
    </div>
    <script>
        document.getElementById('demoBtn')?.addEventListener('click', () => {
            alert('🎉 预览区交互完美运行！你可以自由编写任意HTML结构～');
        });
    <\/script>
</body>
</html>`;
        
        // ---------- 行号管理模块 (不干扰任何原有功能) ----------
        // 更新行号显示：根据textarea的换行符生成行号
        function updateLineNumbers() {
            if (!editorTextarea || !lineNumbersList) return;
            const code = editorTextarea.value;
            // 根据换行符分割行数 (保留所有空行)
            const lines = code.split('\n');
            const totalLines = lines.length;
            
            // 构建行号HTML (性能优化：使用DocumentFragment或字符串拼接)
            let htmlFragment = '';
            for (let i = 1; i <= totalLines; i++) {
                htmlFragment += `<div>${i}</div>`;
            }
            lineNumbersList.innerHTML = htmlFragment;
            
            // 确保行号容器与textarea行高完全一致 (行高已在CSS统一)
            // 同步滚动偏移
            syncLineNumbersScroll();
        }
        
        // 同步行号滚动偏移: 根据textarea的scrollTop移动行号列表
        function syncLineNumbersScroll() {
            if (!editorTextarea || !lineNumbersList) return;
            const scrollTop = editorTextarea.scrollTop;
            // 使用 transform 让行号列表跟随滚动，达到视觉上滚动同步的效果
            lineNumbersList.style.transform = `translateY(-${scrollTop}px)`;
        }
        
        // 刷新行号 (内容改变时调用，并且保持滚动偏移同步)
        function refreshLineNumbers() {
            updateLineNumbers();
            // 内容变动后textarea滚动位置可能未变，但行号偏移需重新同步
            syncLineNumbersScroll();
        }
        
        // 监听textarea滚动事件，同步行号偏移
        function bindScrollSync() {
            if (editorTextarea) {
                editorTextarea.addEventListener('scroll', () => {
                    syncLineNumbersScroll();
                });
            }
        }
        
        // 监听窗口尺寸变化时，行号容器的高度可能改变，重新刷新偏移，保证不错位 (无需重新生成行号)
        function handleResizeSync() {
            if (editorTextarea && lineNumbersList) {
                syncLineNumbersScroll();
            }
        }
        
        // 当分屏模式切换导致布局/字体变化时，再次刷新行号确保准确 (行高、内边距不变但为了绝对位置稳健)
        function reAlignLineNumbers() {
            // 重新生成行号 (确保行号数量匹配最新内容)
            updateLineNumbers();
            // 同步滚动偏移量
            syncLineNumbersScroll();
        }
        
        // ---------- 原有预览更新函数 (保持不变) ----------
        function updatePreview() {
            const code = editorTextarea.value;
            if (!previewIframe) return;
            
            const iframeDoc = previewIframe.contentWindow?.document;
            if (!iframeDoc) {
                previewIframe.srcdoc = "<html><body>预览加载中...</body></html>";
                setTimeout(() => {
                    const newDoc = previewIframe.contentWindow?.document;
                    if (newDoc) {
                        newDoc.open();
                        newDoc.write(code);
                        newDoc.close();
                    }
                }, 20);
                return;
            }
            
            iframeDoc.open();
            iframeDoc.write(code);
            iframeDoc.close();
        }
        
        // 防抖优化
        let previewTimer = null;
        function debouncedUpdatePreview() {
            if (previewTimer) clearTimeout(previewTimer);
            previewTimer = setTimeout(() => {
                updatePreview();
                previewTimer = null;
            }, 8);
        }
        
        // 编辑器内容变化时的统一处理：更新预览 + 刷新行号
        function onEditorContentChange() {
            debouncedUpdatePreview();
            refreshLineNumbers();   // 内容改变后同步行号数量与滚动偏移
        }
        
        // 初始化编辑器内容与事件
        function initEditor() {
            editorTextarea.value = DEFAULT_HTML;
            updatePreview();
            refreshLineNumbers();    // 生成初始行号
        }
        
        // 监听编辑器输入
        editorTextarea.addEventListener('input', () => {
            onEditorContentChange();
        });
        
        // 失去焦点时确保预览与行号完整同步
        editorTextarea.addEventListener('blur', () => {
            if (previewTimer) clearTimeout(previewTimer);
            updatePreview();
            syncLineNumbersScroll();
        });
        
        // ---------- 拖放文件功能 (保持原有逻辑，同时更新行号) ----------
        const dropZone = codePanel;
        
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drag-over');
            
            const files = e.dataTransfer.files;
            if (!files || files.length === 0) return;
            
            const file = files[0];
            const fileName = file.name.toLowerCase();
            const isHtmlFile = fileName.endsWith('.html') || fileName.endsWith('.htm') || file.type === 'text/html';
            
            if (!isHtmlFile) {
                alert('📛 请拖放 .html 或 .htm 文件到代码栏。\n当前文件类型: ' + (file.type || '未知'));
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                editorTextarea.value = ev.target.result;
                // 更新预览 + 行号
                updatePreview();
                refreshLineNumbers();
            };
            reader.onerror = () => alert('❌ 文件读取失败，请重试');
            reader.readAsText(file, 'UTF-8');
        });
        
        // ---------- 四种分屏模式控制 (保留原逻辑，增加行号重新对齐) ----------
        function setSplitMode(mode) {
            // 清除所有按钮激活样式
            modeBtns.forEach(btn => btn.classList.remove('active'));
            
            // 根据模式设置面板显示及宽度
            switch (mode) {
                case 'code-full':
                    // 代码全屏：隐藏右侧预览区和分隔条，左侧占满全部宽度
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'none';
                    resizeHandle.style.display = 'none';
                    codePanel.style.width = '100%';
                    break;
                case 'preview-full':
                    // 预览全屏：隐藏左侧代码区和分隔条，右侧自动撑满
                    codePanel.style.display = 'none';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'none';
                    break;
                case 'half':
                    // 1/2 分屏：两侧都显示，分隔条显示，左侧宽度 50%
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'block';
                    codePanel.style.width = '50%';
                    break;
                case 'fifth':
                    // 1/5 分屏：两侧都显示，分隔条显示，左侧宽度 20%
                    codePanel.style.display = 'flex';
                    previewPanel.style.display = 'flex';
                    resizeHandle.style.display = 'block';
                    codePanel.style.width = '20%';
                    break;
                default:
                    return;
            }
            
            // 高亮当前按钮
            const activeBtn = Array.from(modeBtns).find(btn => btn.getAttribute('data-mode') === mode);
            if (activeBtn) activeBtn.classList.add('active');
            
            // 分屏切换后，由于布局改变，textarea尺寸可能变化，但行号偏移需重新同步 (行号数量不变，偏移量保持scrollTop)
            // 微小延迟确保布局稳定后再同步
            setTimeout(() => {
                syncLineNumbersScroll();
                // 某些极端情况高度变化引起滚动条位移偏移，再次刷新保证完美
                reAlignLineNumbers();
            }, 30);
        }
        
        // 绑定按钮事件
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                setSplitMode(mode);
            });
        });
        
        // 初始设置为 1/2 分屏
        setSplitMode('half');
        
        // 确保iframe加载完毕后有可能第一次内容未正确显示，强制刷新预览和行号
        previewIframe.addEventListener('load', () => {
            const iframeDoc = previewIframe.contentWindow?.document;
            if (iframeDoc && (iframeDoc.body?.innerHTML.trim() === '' || iframeDoc.body?.innerText === '预览加载中...')) {
                updatePreview();
            }
        });
        
        // 阻止预览区拖放干扰
        if (previewPanel) {
            previewPanel.addEventListener('dragover', (e) => e.preventDefault());
            previewPanel.addEventListener('drop', (e) => e.preventDefault());
        }
        
        // 监听窗口resize重新对齐行号 (滚动同步偏移)
        window.addEventListener('resize', () => {
            handleResizeSync();
            // 重新微调行号容器内容确保无偏差 (行数不会变，但布局可能引起错位)
            setTimeout(() => {
                syncLineNumbersScroll();
            }, 50);
        });
        
        // 由于textarea滚动条出现与否可能改变容器内边距，当内容高度变化时再次同步
        // 使用MutationObserver监视textarea属性？但简单使用滚动事件已够, 但保证每帧同步优化
        // 附加：切换分屏时也重新计算偏移，上面已做。
        
        // 同时监听字体加载或者任何导致行高变化的情况，手动调用同步（一般不会）
        // 当textarea获得焦点滚动位置改变时已经通过scroll事件同步。
        
        // 启动滚动同步绑定
        bindScrollSync();
        
        // 最后初始化编辑器内容 (会生成行号)
        initEditor();
        
        // 额外保险：在分屏动画结束后再次同步（避免transition影响）
        setTimeout(() => {
            syncLineNumbersScroll();
        }, 100);
        
        // 每次预览更新时，保留行号的滚动偏移同步 (其实input事件已做，再巩固一下)
        const originalUpdatePreview = updatePreview;
        window.updatePreview = originalUpdatePreview; // 无关
        
        console.log('✅ 双屏预览器已启动 | 支持四种分屏模式 + 代码行号实时同步');
    })();
</script>
</body>
</html>
