<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典扫雷 · 触摸优化版</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        body {
            background: linear-gradient(145deg, #1f2c3a 0%, #15232e 100%);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            touch-action: pan-y pinch-zoom;
        }
        #Mclear {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 20px 16px;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.06);
            display: inline-block;
            width: fit-content;
            max-width: 100vw;
        }
        .title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 30, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 12px 6px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 12px -8px rgba(0,0,0,0.4);
            gap: 10px;
        }
        #time, #tabnum {
            background: rgba(0, 0, 0, 0.25);
            color: #b7e4fa;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 500;
            font-size: min(26px, 6vw);
            padding: 4px 10px;
            border-radius: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #2ad4ff;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.4), 0 2px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 75px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        #restart {
            width: min(54px, 12vw);
            height: min(54px, 12vw);
            background: rgba(230, 245, 255, 0.15);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(32px, 7vw);
            font-weight: 300;
            color: #ddf0ff;
            box-shadow: 0 6px 0 #0e1a24, 0 8px 16px rgba(0,0,0,0.5), inset 0 2px 4px #b0daff;
            transition: all 0.12s ease;
            border: 1px solid rgba(255,255,240,0.3);
            backdrop-filter: blur(6px);
        }
        #restart:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0e1a24, 0 6px 12px rgba(0,0,0,0.5), inset 0 2px 4px white;
        }
        #shadow {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 18px 30px -10px black;
            position: relative;
            display: flex;
            justify-content: center;
            touch-action: none;
        }
        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 30px -12px black;
            background: #1e2b36;
            width: 100%;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            touch-action: none;
            pointer-events: auto;
        }
        #hint {
            background: rgba(20, 30, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px black, 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 10;
            width: fit-content;
            min-width: 260px;
            max-width: 85vw;
        }
        .animati1 {
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -30%) scale(0.9);
        }
        .animati2 {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .hbg {
            background: transparent;
            padding: 28px 20px;
            text-align: center;
        }
        #text p {
            font-size: min(26px, 6vw);
            color: #f5c6a0;
            margin: 12px 0;
            text-shadow: 0 2px 6px #ffb56b;
            line-height: 1.4;
        }
        #butt {
            background: linear-gradient(145deg, #2e4357, #1b2a38);
            display: inline-block;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: min(22px, 5.5vw);
            font-weight: 500;
            color: #e2f0fa;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 8px 0 #0d1a22, 0 8px 18px rgba(0,0,0,0.4);
            transition: 0.08s linear;
            border: 1px solid rgba(255,255,255,0.08);
        }
        #butt:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0d1a22, 0 8px 18px rgba(0,0,0,0.4);
        }
        #Difficu ul {
            padding: 0;
            margin: 10px 0;
        }
        #Difficu li {
            list-style: none;
            margin: 14px 0;
        }
        #Difficu span {
            font-size: min(28px, 7vw);
            font-weight: 450;
            color: #d7edff;
            cursor: pointer;
            background: rgba(25, 40, 55, 0.7);
            padding: 12px 35px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 0 #0f1c27, 0 8px 20px rgba(0,0,0,0.3);
            display: inline-block;
            transition: 0.08s;
        }
        #Difficu span:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1c27, 0 8px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
<div id="Mclear">
    <div class="title">
        <div id="time">000</div>
        <div id="restart" title="新一局">↻</div>
        <div id="tabnum">000</div>
    </div>
    <div id="shadow">
        <canvas id="canvas" width="300" height="400"></canvas>
        <!-- 浮层 -->
        <div id="hint" class="animati2">
            <div class="hbg">
                <div id="load" style="display: none;">加载中...</div>
                <div id="text" style="display: none;">
                    <p>💥 踩到炸弹啦 💥<br>再试一次</p>
                    <span id="butt">再来一局</span>
                </div>
                <div id="Difficu">
                    <ul>
                        <li><span data-diff="简单">🌳 简单</span></li>
                        <li><span data-diff="一般">⚙️ 一般</span></li>
                        <li><span data-diff="困难">💀 困难</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // --- 配置常量 ---
    const CELL_SIZE = 30;
    const SHADOW_PADDING = 16;
    const BORDER_COLOR = '#2d3e4f';
    const COVER_INNER = '#a3b9d1';
    const OPEN_INNER = '#f2f6fc';
    const MAX_TIME = 999;
    const LONG_PRESS_DELAY = 350;

    // --- DOM ---
    const $ = id => document.getElementById(id);
    const canvas = $('canvas');
    const ctx = canvas.getContext('2d');
    const timeDiv = $('time');
    const tabnumDiv = $('tabnum');
    const hintDiv = $('hint');
    const textDiv = $('text');
    const difficuDiv = $('Difficu');
    const restartBtn = $('restart');
    const butt = $('butt');

    // --- 游戏状态 ---
    let map = [];
    let rows = 0, cols = 0;
    let mineCount = 0;
    let flaggedCount = 0;
    let correctFlagCount = 0;
    let elapsedSeconds = 0;
    let gameActive = false;
    let timerInterval = null;
    let difficulty = '简单';

    let cellCanvas = null;
    let pressedCell = null;
    let longPressTimer = null;
    let isLongPressTriggered = false;

    // --- 辅助函数 ---
    function formatNumber(n) {
        return Math.min(MAX_TIME, Math.max(0, n)).toString().padStart(3, '0');
    }

    function updateCounters() {
        const remain = Math.max(0, mineCount - flaggedCount);
        tabnumDiv.innerText = formatNumber(remain);
        timeDiv.innerText = formatNumber(elapsedSeconds);
    }

    // --- 绘制原语 ---
    function fillCellBase(destCtx, col, row, innerColor) {
        const x = col * CELL_SIZE, y = row * CELL_SIZE;
        destCtx.fillStyle = BORDER_COLOR;
        destCtx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        destCtx.fillStyle = innerColor;
        destCtx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    }

    function drawCovered(destCtx, col, row) {
        fillCellBase(destCtx, col, row, COVER_INNER);
    }

    function drawOpenedBase(destCtx, col, row) {
        fillCellBase(destCtx, col, row, OPEN_INNER);
    }

    function drawNumber(destCtx, col, row, num) {
        drawOpenedBase(destCtx, col, row);
        if (num > 0) {
            const x = col * CELL_SIZE + CELL_SIZE/2;
            const y = row * CELL_SIZE + CELL_SIZE/2;
            destCtx.font = 'bold 24px "JetBrains Mono", "Segoe UI", monospace';
            const colors = ['#2673b3', '#2b7a4b', '#c44536', '#8a4f9e', '#b3444a', '#3f6a7a', '#4a4a4a', '#2673b3'];
            destCtx.fillStyle = colors[(num-1) % colors.length];
            destCtx.textAlign = 'center';
            destCtx.textBaseline = 'middle';
            destCtx.fillText(num, x, y);
        }
    }

    function drawEmpty(destCtx, col, row) {
        drawOpenedBase(destCtx, col, row);
    }

    function drawFlag(destCtx, col, row) {
        drawCovered(destCtx, col, row);
        const x = col * CELL_SIZE + CELL_SIZE/2;
        const y = row * CELL_SIZE + CELL_SIZE/2;
        destCtx.font = '24px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        destCtx.fillStyle = '#dc5f4c';
        destCtx.textAlign = 'center';
        destCtx.textBaseline = 'middle';
        destCtx.fillText('🚩', x, y);
    }

    function drawMine(destCtx, col, row, isRed = false) {
        const x = col * CELL_SIZE, y = row * CELL_SIZE;
        destCtx.fillStyle = BORDER_COLOR;
        destCtx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
        destCtx.fillStyle = isRed ? '#f6cfcf' : OPEN_INNER;
        destCtx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        const cx = x + CELL_SIZE/2;
        const cy = y + CELL_SIZE/2;
        destCtx.font = '24px "Segoe UI Emoji", "Apple Color Emoji"';
        destCtx.fillStyle = '#2e2e2e';
        destCtx.textAlign = 'center';
        destCtx.textBaseline = 'middle';
        destCtx.fillText('💣', cx, cy);
    }

    function redrawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (cellCanvas) ctx.drawImage(cellCanvas, 0, 0);
        if (pressedCell && gameActive && !isLongPressTriggered) {
            const { row, col } = pressedCell;
            if (map[row] && map[row][col] && map[row][col].covered) {
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#2f4f6f';
                ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                ctx.globalAlpha = 1.0;
            }
        }
    }

    // --- 核心逻辑 ---
    function generateMines(totalCells, mineNum) {
        const indices = Array.from({ length: totalCells }, (_, i) => i);
        for (let i = 0; i < mineNum; i++) {
            const j = i + Math.floor(Math.random() * (totalCells - i));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        return indices.slice(0, mineNum).sort((a,b) => a-b);
    }

    function initMap() {
        switch (difficulty) {
            case '简单': cols = 10; mineCount = 10; break;
            case '一般': cols = 20; mineCount = 40; break;
            case '困难': cols = 30; mineCount = 120; break;
            default: cols = 10; mineCount = 10;
        }

        const maxHeight = Math.min(600, window.innerHeight - 200);
        let rawRows = Math.floor(maxHeight / CELL_SIZE);
        rows = Math.max(5, Math.min(20, rawRows));
        if (difficulty === '困难' && rows * cols < mineCount * 2) {
            rows = Math.min(20, Math.ceil(mineCount * 2 / cols));
        }
        if (difficulty === '一般' && rows * cols < mineCount * 2) {
            rows = Math.min(18, Math.ceil(mineCount * 1.8 / cols));
        }

        canvas.width = cols * CELL_SIZE;
        canvas.height = rows * CELL_SIZE;

        cellCanvas = document.createElement('canvas');
        cellCanvas.width = canvas.width;
        cellCanvas.height = canvas.height;
        const cellCtx = cellCanvas.getContext('2d');

        const totalCells = rows * cols;
        if (mineCount > totalCells) mineCount = Math.floor(totalCells * 0.2);
        const mineIndices = generateMines(totalCells, mineCount);

        map = Array.from({ length: rows }, (_, r) =>
            Array.from({ length: cols }, (_, c) => {
                const idx = r * cols + c;
                return {
                    mine: mineIndices.includes(idx),
                    covered: true,
                    flagged: false,
                    num: 0
                };
            })
        );

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (map[r][c].mine) continue;
                let cnt = 0;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && map[nr][nc].mine) cnt++;
                    }
                }
                map[r][c].num = cnt;
            }
        }

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                drawCovered(cellCtx, c, r);
            }
        }

        flaggedCount = 0;
        correctFlagCount = 0;
        gameActive = true;
        pressedCell = null;
        isLongPressTriggered = false;
        if (longPressTimer) clearTimeout(longPressTimer);
        updateCounters();

        if (timerInterval) clearInterval(timerInterval);
        elapsedSeconds = 0;
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (elapsedSeconds >= MAX_TIME) {
                gameOver(false);
                return;
            }
            elapsedSeconds++;
            updateCounters();
        }, 1000);

        redrawScene();
    }

    function expandEmpty(startRow, startCol) {
        const cellCtx = cellCanvas.getContext('2d');
        const queue = [{ row: startRow, col: startCol }];
        while (queue.length) {
            const { row, col } = queue.shift();
            const cell = map[row]?.[col];
            if (!cell || !cell.covered || cell.flagged || cell.mine) continue;

            cell.covered = false;
            if (cell.num === 0) {
                drawEmpty(cellCtx, col, row);
            } else {
                drawNumber(cellCtx, col, row, cell.num);
                continue;
            }

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr, nc = col + dc;
                    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
                    const neighbor = map[nr][nc];
                    if (neighbor.covered && !neighbor.flagged && !neighbor.mine) {
                        if (neighbor.num === 0) {
                            queue.push({ row: nr, col: nc });
                        } else {
                            neighbor.covered = false;
                            drawNumber(cellCtx, nc, nr, neighbor.num);
                        }
                    }
                }
            }
        }
    }

    function gameOver(win) {
        if (!gameActive) return;
        gameActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        if (!win) {
            const cellCtx = cellCanvas.getContext('2d');
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (map[r][c].mine) {
                        map[r][c].covered = false;
                        drawMine(cellCtx, c, r, false);
                    }
                }
            }
            redrawScene();
        }

        const msg = textDiv.querySelector('p');
        if (win) {
            msg.innerHTML = `🏆 胜利！ 🏆<br>用时 ${elapsedSeconds} 秒`;
            butt.innerText = '再玩一局';
        } else {
            msg.innerHTML = '💥 踩到炸弹啦 💥<br>再来一次';
            butt.innerText = '重新开始';
        }
        textDiv.style.display = 'block';
        difficuDiv.style.display = 'none';
        hintDiv.className = 'animati2';

        pressedCell = null;
        if (longPressTimer) clearTimeout(longPressTimer);
    }

    function showDifficultyMenu() {
        hintDiv.className = 'animati2';
        textDiv.style.display = 'none';
        difficuDiv.style.display = 'block';
        gameActive = false;
        pressedCell = null;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        if (longPressTimer) clearTimeout(longPressTimer);
    }

    // --- 触摸/鼠标统一坐标获取 ---
    function getCellFromClient(clientX, clientY) {
        const shadowRect = $('shadow').getBoundingClientRect();
        const offsetX = clientX - shadowRect.left - SHADOW_PADDING;
        const offsetY = clientY - shadowRect.top - SHADOW_PADDING;
        if (offsetX < 0 || offsetY < 0 || offsetX >= canvas.width || offsetY >= canvas.height) return null;
        const col = Math.floor(offsetX / CELL_SIZE);
        const row = Math.floor(offsetY / CELL_SIZE);
        if (row < 0 || row >= rows || col < 0 || col >= cols) return null;
        return { row, col };
    }

    // --- 触摸事件处理 (已修复: 浮层内不拦截) ---
    function handleTouchStart(e) {
        // 如果触摸点在浮层上，直接放行，让click事件正常触发
        if (e.target.closest('#hint')) return;

        e.preventDefault(); // 阻止页面滚动
        if (!gameActive) return;

        const touch = e.touches[0];
        if (!touch) return;
        const cell = getCellFromClient(touch.clientX, touch.clientY);
        if (!cell) return;

        const { row, col } = cell;
        if (!map[row]?.[col]?.covered) return;

        if (pressedCell) {
            if (longPressTimer) clearTimeout(longPressTimer);
        }

        pressedCell = { row, col, identifier: touch.identifier };
        isLongPressTriggered = false;

        longPressTimer = setTimeout(() => {
            if (!gameActive || !pressedCell) return;
            const r = pressedCell.row, c = pressedCell.col;
            if (!map[r]?.[c]?.covered) return;

            isLongPressTriggered = true;
            const cellCtx = cellCanvas.getContext('2d');
            const cell = map[r][c];

            if (!cell.flagged && flaggedCount < mineCount) {
                cell.flagged = true;
                flaggedCount++;
                if (cell.mine) correctFlagCount++;
                drawFlag(cellCtx, c, r);
                updateCounters();
                if (correctFlagCount === mineCount) gameOver(true);
            } else if (cell.flagged) {
                cell.flagged = false;
                flaggedCount--;
                if (cell.mine) correctFlagCount--;
                drawCovered(cellCtx, c, r);
                updateCounters();
            }
            redrawScene();
            pressedCell = null;
            longPressTimer = null;
        }, LONG_PRESS_DELAY);

        redrawScene();
    }

    function handleTouchEnd(e) {
        if (e.target.closest('#hint')) return;
        e.preventDefault();

        if (!gameActive || !pressedCell) {
            pressedCell = null;
            if (longPressTimer) clearTimeout(longPressTimer);
            redrawScene();
            return;
        }

        const touch = e.changedTouches[0];
        if (!touch) return;

        if (isLongPressTriggered) {
            pressedCell = null;
            if (longPressTimer) clearTimeout(longPressTimer);
            redrawScene();
            return;
        }

        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }

        const start = pressedCell;
        pressedCell = null;

        const endCell = getCellFromClient(touch.clientX, touch.clientY);
        if (!endCell) {
            redrawScene();
            return;
        }

        const { row: sRow, col: sCol } = start;
        const { row: eRow, col: eCol } = endCell;
        if (sRow !== eRow || sCol !== eCol) {
            redrawScene();
            return;
        }

        const cell = map[sRow]?.[sCol];
        if (!cell || !cell.covered) {
            redrawScene();
            return;
        }

        if (cell.flagged) {
            redrawScene();
            return;
        }

        const cellCtx = cellCanvas.getContext('2d');

        if (cell.mine) {
            cell.covered = false;
            drawMine(cellCtx, sCol, sRow, true);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (map[r][c].mine && !(r === sRow && c === sCol)) {
                        map[r][c].covered = false;
                        drawMine(cellCtx, c, r, false);
                    }
                }
            }
            redrawScene();
            gameOver(false);
            return;
        } else {
            if (cell.num === 0) {
                expandEmpty(sRow, sCol);
            } else {
                cell.covered = false;
                drawNumber(cellCtx, sCol, sRow, cell.num);
            }
        }
        redrawScene();
    }

    function handleTouchCancel(e) {
        if (e.target.closest('#hint')) return;
        e.preventDefault();
        if (longPressTimer) clearTimeout(longPressTimer);
        pressedCell = null;
        isLongPressTriggered = false;
        redrawScene();
    }

    function handleTouchMove(e) {
        if (e.target.closest('#hint')) return;
        e.preventDefault();
        if (!gameActive || !pressedCell) return;
        const touch = e.touches[0];
        if (!touch) return;
        const cell = getCellFromClient(touch.clientX, touch.clientY);
        if (!cell || cell.row !== pressedCell.row || cell.col !== pressedCell.col) {
            if (longPressTimer) clearTimeout(longPressTimer);
            pressedCell = null;
            isLongPressTriggered = false;
            redrawScene();
        }
    }

    // --- 鼠标事件 (保留，移动端不会触发) ---
    function onMouseDown(e) {
        if (e.pointerType === 'touch') return;
        if (!gameActive) return;
        const cell = getCellFromClient(e.clientX, e.clientY);
        if (!cell) return;
        if (!map[cell.row]?.[cell.col]?.covered) return;
        pressedCell = { row: cell.row, col: cell.col };
        isLongPressTriggered = false;
        redrawScene();
        e.preventDefault();
    }

    function onMouseUp(e) {
        if (e.pointerType === 'touch') return;
        if (!gameActive || !pressedCell) {
            pressedCell = null;
            redrawScene();
            return;
        }

        const start = pressedCell;
        pressedCell = null;

        const end = getCellFromClient(e.clientX, e.clientY);
        if (!end) { redrawScene(); return; }
        if (start.row !== end.row || start.col !== end.col) { redrawScene(); return; }

        const cell = map[start.row]?.[start.col];
        if (!cell || !cell.covered) { redrawScene(); return; }

        if (e.button === 2) {
            const cellCtx = cellCanvas.getContext('2d');
            if (!cell.flagged && flaggedCount < mineCount) {
                cell.flagged = true;
                flaggedCount++;
                if (cell.mine) correctFlagCount++;
                drawFlag(cellCtx, start.col, start.row);
                updateCounters();
                if (correctFlagCount === mineCount) gameOver(true);
            } else if (cell.flagged) {
                cell.flagged = false;
                flaggedCount--;
                if (cell.mine) correctFlagCount--;
                drawCovered(cellCtx, start.col, start.row);
                updateCounters();
            }
            redrawScene();
        } else if (e.button === 0) {
            if (cell.flagged) { redrawScene(); return; }
            const cellCtx = cellCanvas.getContext('2d');
            if (cell.mine) {
                cell.covered = false;
                drawMine(cellCtx, start.col, start.row, true);
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (map[r][c].mine && !(r === start.row && c === start.col)) {
                            map[r][c].covered = false;
                            drawMine(cellCtx, c, r, false);
                        }
                    }
                }
                redrawScene();
                gameOver(false);
            } else {
                if (cell.num === 0) expandEmpty(start.row, start.col);
                else {
                    cell.covered = false;
                    drawNumber(cellCtx, start.col, start.row, cell.num);
                }
                redrawScene();
            }
        }
        e.preventDefault();
    }

    // --- 事件绑定 ---
    function bindEvents() {
        const shadow = $('shadow');
        shadow.addEventListener('touchstart', handleTouchStart, { passive: false });
        shadow.addEventListener('touchend', handleTouchEnd, { passive: false });
        shadow.addEventListener('touchcancel', handleTouchCancel, { passive: false });
        shadow.addEventListener('touchmove', handleTouchMove, { passive: false });

        shadow.addEventListener('mousedown', onMouseDown);
        shadow.addEventListener('mouseup', onMouseUp);
        shadow.addEventListener('mouseleave', () => {
            if (pressedCell) {
                if (longPressTimer) clearTimeout(longPressTimer);
                pressedCell = null;
                isLongPressTriggered = false;
                redrawScene();
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    }

    // 启动
    restartBtn.addEventListener('click', showDifficultyMenu);
    butt.addEventListener('click', function() {
        textDiv.style.display = 'none';
        difficuDiv.style.display = 'block';
        hintDiv.className = 'animati2';
        gameActive = false;
        if (timerInterval) clearInterval(timerInterval);
        if (longPressTimer) clearTimeout(longPressTimer);
        pressedCell = null;
    });

    difficuDiv.addEventListener('click', (e) => {
        const span = e.target.closest('span');
        if (!span) return;
        const diff = span.getAttribute('data-diff');
        if (!diff) return;
        difficulty = diff;
        hintDiv.className = 'animati1';
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        initMap();
    });

    window.addEventListener('load', () => {
        difficulty = '简单';
        initMap();
        hintDiv.className = 'animati1';
        bindEvents();
    });
})();
</script>
</body>
</html>
