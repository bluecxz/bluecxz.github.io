<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS代码混淆工具 (修复增强版)</title>
    <!-- 引入JavaScript Obfuscator库 -->
    <script src="browser.js"></script>
    <!-- 引入js-beautify用于代码格式化 -->
    <script src="min.js"></script>
    <style>
        :root {
            --primary-color: #4a6ee0;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --border-radius: 6px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #4a6ee0 0%, #7049f0 100%);
            color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        .description {
            margin-bottom: 20px;
            opacity: 0.9;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .code-area {
            width: 100%;
            height: 300px;
            font-family: 'Consolas', 'Monaco', monospace;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            resize: vertical;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .config-area {
            margin: 20px 0;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .config-group {
            margin-bottom: 12px;
        }
        
        .config-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .config-group select, .config-group input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        button.primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        button.success {
            background-color: var(--success-color);
            color: white;
        }
        
        button.secondary {
            background-color: var(--secondary-color);
            color: white;
        }
        
        button.danger {
            background-color: var(--danger-color);
            color: white;
        }
        
        button.warning {
            background-color: var(--warning-color);
            color: var(--dark-color);
        }
        
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats {
            margin-top: 15px;
            padding: 12px;
            background-color: var(--light-color);
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }
        
        .stats div {
            margin-bottom: 5px;
        }
        
        .message {
            padding: 12px;
            border-radius: var(--border-radius);
            margin-top: 15px;
            display: none;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: var(--secondary-color);
            font-size: 0.9rem;
        }
        
        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .preset-buttons button {
            flex: 1;
            font-size: 0.8rem;
            padding: 8px 12px;
        }
        
        .load-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-loading {
            background-color: var(--warning-color);
        }
        
        .status-success {
            background-color: var(--success-color);
        }
        
        .status-error {
            background-color: var(--danger-color);
        }
        
        .tab-container {
            margin-bottom: 15px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        
        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .tab.active {
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>JS代码混淆工具 (修复增强版)</h1>
        <p class="description">基于JavaScript Obfuscator实现，完全在浏览器中运行，保护您的代码隐私</p>
    </header>
    
    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">原始代码</h2>
                <div>
                    <button id="clear-input" class="secondary">清空</button>
                </div>
            </div>
            <textarea id="input-code" class="code-area" placeholder="请输入要混淆的JavaScript代码..."></textarea>
            <div class="button-group">
                <button id="format-btn" class="secondary">格式化</button>
                <button id="example-btn" class="secondary">加载示例</button>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">混淆后代码</h2>
                <div>
                    <button id="copy-btn" class="success">复制</button>
                </div>
            </div>
            <textarea id="output-code" class="code-area" placeholder="混淆后的代码将显示在这里..." readonly></textarea>
            <div class="button-group">
                <button id="download-btn" class="success">下载</button>
            </div>
        </div>
    </div>
    
    <div class="panel">
        <div class="panel-header">
            <h2 class="panel-title">混淆配置</h2>
        </div>
        
        <div class="load-status">
            <span class="status-dot" id="library-status"></span>
            <span id="library-status-text">检查JavaScript Obfuscator库状态...</span>
        </div>
        
        <div class="tab-container">
            <div class="tabs">
                <div class="tab active" data-tab="presets">预设配置</div>
                <div class="tab" data-tab="advanced">高级选项</div>
            </div>
            
            <div class="tab-content active" id="presets-tab">
                <div class="preset-buttons">
                    <button id="low-obfuscation" class="secondary">低强度混淆</button>
                    <button id="medium-obfuscation" class="secondary">中等强度混淆</button>
                    <button id="high-obfuscation" class="secondary">高强度混淆</button>
                </div>
                
                <div class="config-area">
                    <div class="config-grid">
                        <div class="config-group">
                            <label for="compact">压缩代码</label>
                            <select id="compact">
                                <option value="true">是</option>
                                <option value="false">否</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="controlFlowFlattening">控制流平坦化</label>
                            <select id="controlFlowFlattening">
                                <option value="false">否</option>
                                <option value="true">是</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="stringArray">字符串阵列化</label>
                            <select id="stringArray">
                                <option value="true">是</option>
                                <option value="false">否</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="stringArrayEncoding">字符串编码</label>
                            <select id="stringArrayEncoding">
                                <option value="none">无</option>
                                <option value="base64">Base64</option>
                                <option value="rc4">RC4</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="advanced-tab">
                <div class="config-area">
                    <div class="config-grid">
                        <div class="config-group">
                            <label for="controlFlowFlatteningThreshold">控制流平坦化阈值</label>
                            <input type="number" id="controlFlowFlatteningThreshold" min="0" max="1" step="0.1" value="0.75">
                        </div>
                        
                        <div class="config-group">
                            <label for="deadCodeInjection">死代码注入</label>
                            <select id="deadCodeInjection">
                                <option value="false">否</option>
                                <option value="true">是</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="deadCodeInjectionThreshold">死代码注入阈值</label>
                            <input type="number" id="deadCodeInjectionThreshold" min="0" max="1" step="0.1" value="0.4">
                        </div>
                        
                        <div class="config-group">
                            <label for="debugProtection">调试保护</label>
                            <select id="debugProtection">
                                <option value="false">否</option>
                                <option value="true">是</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="rotateStringArray">旋转字符串阵列</label>
                            <select id="rotateStringArray">
                                <option value="true">是</option>
                                <option value="false">否</option>
                            </select>
                        </div>
                        
                        <div class="config-group">
                            <label for="selfDefending">自我防御</label>
                            <select id="selfDefending">
                                <option value="false">否</option>
                                <option value="true">是</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button id="obfuscate-btn" class="primary">混淆代码</button>
            <button id="test-btn" class="warning">测试库加载</button>
        </div>
        
        <div id="stats" class="stats">
            <div>原始大小: <span id="original-size">0</span> 字符</div>
            <div>混淆后大小: <span id="obfuscated-size">0</span> 字符</div>
            <div>压缩率: <span id="compression-ratio">0%</span></div>
            <div>处理时间: <span id="processing-time">0</span> ms</div>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <footer>
        <p>本工具完全在浏览器中运行，您的代码不会上传到任何服务器 | 基于 <a href="https://github.com/javascript-obfuscator/javascript-obfuscator" target="_blank">JavaScript Obfuscator</a> 构建</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const inputCode = document.getElementById('input-code');
            const outputCode = document.getElementById('output-code');
            const obfuscateBtn = document.getElementById('obfuscate-btn');
            const copyBtn = document.getElementById('copy-btn');
            const downloadBtn = document.getElementById('download-btn');
            const clearInputBtn = document.getElementById('clear-input');
            const formatBtn = document.getElementById('format-btn');
            const exampleBtn = document.getElementById('example-btn');
            const testBtn = document.getElementById('test-btn');
            const statsDiv = document.getElementById('stats');
            const messageDiv = document.getElementById('message');
            const libraryStatus = document.getElementById('library-status');
            const libraryStatusText = document.getElementById('library-status-text');
            const tabs = document.querySelectorAll('.tab');
            const tabContents = document.querySelectorAll('.tab-content');
            
            // 预设配置
            const lowObfuscationBtn = document.getElementById('low-obfuscation');
            const mediumObfuscationBtn = document.getElementById('medium-obfuscation');
            const highObfuscationBtn = document.getElementById('high-obfuscation');
            
            // 标签切换功能
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    
                    // 移除所有active类
                    tabs.forEach(t => t.classList.remove('active'));
                    tabContents.forEach(tc => tc.classList.remove('active'));
                    
                    // 添加active类到当前标签和内容
                    tab.classList.add('active');
                    document.getElementById(`${tabId}-tab`).classList.add('active');
                });
            });
            
            // 检查JavaScriptObfuscator库是否加载成功
            function checkLibrary() {
                if (typeof JavaScriptObfuscator !== 'undefined' && JavaScriptObfuscator.obfuscate) {
                    libraryStatus.className = 'status-dot status-success';
                    libraryStatusText.textContent = 'JavaScript Obfuscator库已正确加载';
                    obfuscateBtn.disabled = false;
                    return true;
                } else {
                    libraryStatus.className = 'status-dot status-error';
                    libraryStatusText.textContent = 'JavaScript Obfuscator库加载失败';
                    obfuscateBtn.disabled = true;
                    showMessage('JavaScript Obfuscator库加载失败，请检查网络连接或刷新页面重试', 'error');
                    return false;
                }
            }
            
            // 初始检查库状态
            setTimeout(checkLibrary, 1000);
            
            // 测试库功能
            testBtn.addEventListener('click', function() {
                if (checkLibrary()) {
                    try {
                        const testResult = JavaScriptObfuscator.obfuscate('console.log("test");', { 
                            compact: true,
                            stringArrayEncoding: []  // 修复：使用空数组而不是false
                        });
                        if (testResult.getObfuscatedCode()) {
                            showMessage('库功能测试成功！', 'success');
                        } else {
                            showMessage('库功能测试失败：无法获取混淆代码', 'error');
                        }
                    } catch (error) {
                        showMessage('库功能测试失败：' + error.message, 'error');
                    }
                }
            });
            
            // 示例代码
            const exampleCode = `// 示例代码
function calculatePrice(quantity, price) {
    // 计算总价
    let total = quantity * price;
    
    // 应用折扣
    if (quantity > 10) {
        total = total * 0.9; // 10% 折扣
    }
    
    return total;
}

function validateEmail(email) {
    // 简单的邮箱验证
    const regex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
    return regex.test(email);
}

class User {
    constructor(name, email) {
        this.name = name;
        this.email = email;
    }
    
    getProfile() {
        return {
            name: this.name,
            email: this.email,
            joined: new Date().toLocaleDateString()
        };
    }
}

console.log(calculatePrice(15, 10));
console.log(validateEmail('test@example.com'));
const user = new User('张三', 'zhangsan@example.com');
console.log(user.getProfile());
`;
            
            // 加载示例代码
            exampleBtn.addEventListener('click', function() {
                inputCode.value = exampleCode;
                showMessage('已加载示例代码', 'success');
            });
            
            // 清空输入
            clearInputBtn.addEventListener('click', function() {
                inputCode.value = '';
                outputCode.value = '';
                updateStats(0, 0, 0);
                showMessage('已清空输入', 'success');
            });
            
            // 格式化代码
            formatBtn.addEventListener('click', function() {
                try {
                    const formattedCode = js_beautify(inputCode.value, {
                        indent_size: 2,
                        space_in_empty_paren: true
                    });
                    inputCode.value = formattedCode;
                    showMessage('代码已格式化', 'success');
                } catch (error) {
                    showMessage('格式化失败: ' + error.message, 'error');
                }
            });
            
            // 复制代码
            copyBtn.addEventListener('click', function() {
                if (!outputCode.value) {
                    showMessage('没有可复制的内容', 'error');
                    return;
                }
                
                outputCode.select();
                document.execCommand('copy');
                showMessage('代码已复制到剪贴板', 'success');
            });
            
            // 下载代码
            downloadBtn.addEventListener('click', function() {
                if (!outputCode.value) {
                    showMessage('没有可下载的内容', 'error');
                    return;
                }
                
                const blob = new Blob([outputCode.value], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'obfuscated-code.js';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showMessage('代码已下载', 'success');
            });
            
            // 混淆代码
            obfuscateBtn.addEventListener('click', function() {
                // 先检查库是否加载
                if (!checkLibrary()) {
                    showMessage('JavaScript Obfuscator库未正确加载，无法进行混淆', 'error');
                    return;
                }
                
                const code = inputCode.value.trim();
                if (!code) {
                    showMessage('请输入要混淆的代码', 'error');
                    return;
                }
                
                // 获取配置选项
                const stringArrayEncodingValue = document.getElementById('stringArrayEncoding').value;
                
                const options = {
                    compact: document.getElementById('compact').value === 'true',
                    controlFlowFlattening: document.getElementById('controlFlowFlattening').value === 'true',
                    controlFlowFlatteningThreshold: parseFloat(document.getElementById('controlFlowFlatteningThreshold').value),
                    deadCodeInjection: document.getElementById('deadCodeInjection').value === 'true',
                    deadCodeInjectionThreshold: parseFloat(document.getElementById('deadCodeInjectionThreshold').value),
                    debugProtection: document.getElementById('debugProtection').value === 'true',
                    stringArray: document.getElementById('stringArray').value === 'true',
                    rotateStringArray: document.getElementById('rotateStringArray').value === 'true',
                    selfDefending: document.getElementById('selfDefending').value === 'true',
                    // 修复：stringArrayEncoding必须是数组格式
                    stringArrayEncoding: stringArrayEncodingValue !== 'none' ? [stringArrayEncodingValue] : []
                };
                
                try {
                    const startTime = performance.now();
                    
                    // 执行混淆
                    const obfuscatedResult = JavaScriptObfuscator.obfuscate(code, options);
                    const obfuscatedCode = obfuscatedResult.getObfuscatedCode();
                    
                    const endTime = performance.now();
                    const processingTime = (endTime - startTime).toFixed(2);
                    
                    // 显示混淆后的代码
                    outputCode.value = obfuscatedCode;
                    
                    // 更新统计信息
                    updateStats(code.length, obfuscatedCode.length, processingTime);
                    
                    showMessage('代码混淆成功!', 'success');
                } catch (error) {
                    showMessage('混淆失败: ' + error.message, 'error');
                    console.error(error);
                }
            });
            
            // 预设配置
            lowObfuscationBtn.addEventListener('click', function() {
                document.getElementById('compact').value = 'true';
                document.getElementById('controlFlowFlattening').value = 'false';
                document.getElementById('controlFlowFlatteningThreshold').value = '0';
                document.getElementById('deadCodeInjection').value = 'false';
                document.getElementById('deadCodeInjectionThreshold').value = '0';
                document.getElementById('debugProtection').value = 'false';
                document.getElementById('stringArray').value = 'true';
                document.getElementById('stringArrayEncoding').value = 'none';
                document.getElementById('rotateStringArray').value = 'true';
                document.getElementById('selfDefending').value = 'true';
                
                showMessage('已应用低强度混淆配置', 'success');
            });
            
            mediumObfuscationBtn.addEventListener('click', function() {
                document.getElementById('compact').value = 'true';
                document.getElementById('controlFlowFlattening').value = 'true';
                document.getElementById('controlFlowFlatteningThreshold').value = '0.75';
                document.getElementById('deadCodeInjection').value = 'true';
                document.getElementById('deadCodeInjectionThreshold').value = '0.4';
                document.getElementById('debugProtection').value = 'false';
                document.getElementById('stringArray').value = 'true';
                document.getElementById('stringArrayEncoding').value = 'base64';
                document.getElementById('rotateStringArray').value = 'true';
                document.getElementById('selfDefending').value = 'true';
                
                showMessage('已应用中等强度混淆配置', 'success');
            });
            
            highObfuscationBtn.addEventListener('click', function() {
                document.getElementById('compact').value = 'true';
                document.getElementById('controlFlowFlattening').value = 'true';
                document.getElementById('controlFlowFlatteningThreshold').value = '1';
                document.getElementById('deadCodeInjection').value = 'true';
                document.getElementById('deadCodeInjectionThreshold').value = '1';
                document.getElementById('debugProtection').value = 'true';
                document.getElementById('stringArray').value = 'true';
                document.getElementById('stringArrayEncoding').value = 'rc4';
                document.getElementById('rotateStringArray').value = 'true';
                document.getElementById('selfDefending').value = 'true';
                
                showMessage('已应用高强度混淆配置', 'success');
            });
            
            // 更新统计信息
            function updateStats(originalLength, obfuscatedLength, processingTime) {
                document.getElementById('original-size').textContent = originalLength;
                document.getElementById('obfuscated-size').textContent = obfuscatedLength;
                document.getElementById('processing-time').textContent = processingTime;
                
                const compressionRatio = originalLength > 0 ? 
                    (100 - (obfuscatedLength / originalLength * 100)).toFixed(2) : 0;
                document.getElementById('compression-ratio').textContent = 
                    compressionRatio + '%';
                
                statsDiv.style.display = 'block';
            }
            
            // 显示消息
            function showMessage(message, type) {
                messageDiv.textContent = message;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
