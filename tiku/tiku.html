<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>考试题库练习系统 · 移动优化版</title>
    <!-- 注意：tailwindcss.min.js 并非标准样式，但保留以兼容原有环境；同时添加内联样式增强移动端适配 -->
    <script src="css/tailwindcss.min.js"></script>
    <script src="js/xlsx.full.min.js"></script>
    <script src="js/qrcode.min.js"></script>
    <style>
        /* 移动端竖屏优化：增大触摸区域，调整间距，优化进度格子 */
        @media (max-width: 640px) {
            /* 所有按钮增加最小高度，方便手指点按 */
            button {
                min-height: 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            /* 文件操作行按钮适当缩小文字，但保留触摸区域 */
            #importBtn, #exportBtn, #templateBtn, #resetBtn, #showQRCodeBtn {
                font-size: 0.8rem;
                padding-top: 0.5rem;
                padding-bottom: 0.5rem;
            }
            /* 模式按钮内部文字微调 */
            #practiceBtn, #randomPracticeBtn, #examBtn, #wrongQuestionsBtn {
                font-size: 0.85rem;
                white-space: nowrap;
            }
            /* 题目进度指示器方块：更紧凑，一行显示更多 */
            #questionProgress button,
            #questionProgress a,
            #questionProgress div[class*="progress"] {
                width: 2.2rem !important;
                height: 2.2rem !important;
                font-size: 0.75rem !important;
                line-height: 2.2rem !important;
                margin: 0.15rem !important;
                border-radius: 0.375rem !important;
                flex-shrink: 0;
            }
            /* 进度容器最大高度降低，避免占据太多屏幕 */
            #questionProgress {
                max-height: 200px !important;
            }
            /* 开关按钮微调，更贴合手指 */
            .toggle-switch label {
                width: 2.8rem !important;
                height: 1.5rem !important;
            }
            .toggle-switch .toggle-slider {
                width: 1.2rem !important;
                height: 1.2rem !important;
            }
            /* 题目选项区域文字适当缩小，防止换行混乱 */
            #optionsArea label {
                font-size: 0.9rem;
                padding: 0.4rem 0;
            }
            /* 模态框内容内边距优化 */
            .p-4, .p-6 {
                padding: 0.75rem !important;
            }
            /* 考试设置选项卡字体 */
            #tabByType, #tabByDomain {
                font-size: 0.9rem;
                padding: 0.5rem 0.75rem;
            }
            /* 确保任何按钮不溢出屏幕 */
            .container {
                padding-left: 0.5rem;
                padding-right: 0.5rem;
            }
            /* 题型过滤标签紧凑 */
            #questionTypeFilter label span {
                font-size: 0.75rem;
            }
            /* 已导入题库信息文字 */
            #importedFileInfo span, #importedFileInfo div {
                font-size: 0.75rem;
            }
        }
        /* 额外：保证所有模态框在小屏上边缘有间距 */
        @media (max-width: 480px) {
            .fixed .bg-white {
                width: 95% !important;
                margin: 0 auto;
            }
        }
        /* 保持开关原有功能（样式由js控制，我们只调整尺寸，不干预逻辑） */
        .toggle-switch input:checked + label {
            background-color: #4f46e5; /*  fallback，但具体由js处理 */
        }
        /* 滑块动画基础，不影响js交互 */
        .toggle-switch label {
            transition: background-color 0.2s;
        }
        .toggle-switch .toggle-slider {
            transition: transform 0.2s;
        }
        /* 确保进度指示器容器可以滚动 */
        #questionProgress {
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 0.25rem;
        }
    </style>
</head>
<body class="bg-gray-100 antialiased">
    <div class="container mx-auto px-2 sm:px-4 py-4 sm:py-8">
        <h1 class="text-xl sm:text-3xl font-bold text-center mb-4 sm:mb-8">考试题库练习系统</h1>
        
        <!-- 第一行：文件操作按钮 (保留原有flex-wrap，移动端已通过全局样式优化触摸) -->
        <div class="flex flex-wrap gap-2 sm:gap-3 mb-3 sm:mb-4 justify-center">
            <button id="importBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[80px] sm:min-w-[100px]">
                导入题库
            </button>
            <button id="exportBtn" class="bg-green-500 hover:bg-green-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[80px] sm:min-w-[100px]">
                导出题库
            </button>
            <button id="templateBtn" class="bg-yellow-500 hover:bg-yellow-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[80px] sm:min-w-[100px]">
                导出模板
            </button>
            <button id="resetBtn" class="bg-red-500 hover:bg-red-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[80px] sm:min-w-[100px]">
                重置题库
            </button>
            <button id="showQRCodeBtn" class="bg-purple-500 hover:bg-purple-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[80px] sm:min-w-[100px]">
                手机访问
            </button>
        </div>
        
        <!-- 第二行：题库信息和类型选择 -->
        <div class="flex flex-col gap-2 sm:gap-3 mb-3 sm:mb-4">
            <!-- 已导入题库信息 -->
            <div id="importedFileInfo" class="hidden">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-2 sm:p-3">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="flex items-center">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5 text-blue-500 mr-1 sm:mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <span class="text-blue-700 font-medium text-xs sm:text-sm">已导入题库:</span>
                            <span id="fileName" class="ml-1 text-blue-900 font-semibold text-xs sm:text-sm truncate max-w-[120px] sm:max-w-[200px]"></span>
                        </div>
                        <span class="text-xs text-blue-500 bg-blue-100 px-2 py-0.5 rounded">题库数量: <span id="questionCount">0</span> 题</span>
                    </div>
                </div>
            </div>
            
            <!-- 题目类型选择 -->
            <div id="questionTypeFilter" class="hidden">
                <div class="bg-gray-50 border border-gray-200 rounded-lg p-2 sm:p-3">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-xs sm:text-sm font-medium text-gray-700">题型:</span>
                        <label class="inline-flex items-center">
                            <input type="checkbox" name="questionType" value="单选题" class="rounded text-indigo-600 focus:ring-indigo-500 w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <span class="ml-1 text-xs sm:text-sm text-gray-700">单选</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="checkbox" name="questionType" value="多选题" class="rounded text-indigo-600 focus:ring-indigo-500 w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <span class="ml-1 text-xs sm:text-sm text-gray-700">多选</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="checkbox" name="questionType" value="判断题" class="rounded text-indigo-600 focus:ring-indigo-500 w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <span class="ml-1 text-xs sm:text-sm text-gray-700">判断</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="checkbox" name="questionType" value="填空题" class="rounded text-indigo-600 focus:ring-indigo-500 w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <span class="ml-1 text-xs sm:text-sm text-gray-700">填空</span>
                        </label>
                        <div class="flex gap-2 ml-auto">
                            <button id="selectAllTypes" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">全选</button>
                            <button id="clearAllTypes" class="text-xs text-gray-600 hover:text-gray-800 font-medium">清空</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 第三行：模式选择和开关 (移动端改为两列网格，确保按钮易点) -->
        <div class="flex flex-col gap-2 sm:gap-3 mb-4 sm:mb-6">
            <!-- 模式按钮容器：小屏两列，sm以上恢复flex一行 -->
            <div class="grid grid-cols-2 sm:flex sm:flex-wrap gap-2 sm:gap-3 justify-center">
                <!-- 顺序练习 -->
                <div class="flex flex-col items-center w-full sm:w-auto">
                    <button id="practiceBtn" class="bg-purple-500 hover:bg-purple-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[90px] sm:min-w-[120px] w-full sm:w-auto">
                        顺序练习
                    </button>
                    <div id="practiceModeIndicator" class="w-20 sm:w-24 h-1 bg-purple-500 mt-1 hidden"></div>
                </div>
                <!-- 随机练习 -->
                <div class="flex flex-col items-center w-full sm:w-auto">
                    <button id="randomPracticeBtn" class="bg-teal-500 hover:bg-teal-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[90px] sm:min-w-[120px] w-full sm:w-auto">
                        随机练习
                    </button>
                    <div id="randomPracticeModeIndicator" class="w-20 sm:w-24 h-1 bg-teal-500 mt-1 hidden"></div>
                </div>
                <!-- 考试模式 -->
                <div class="flex flex-col items-center w-full sm:w-auto">
                    <button id="examBtn" class="bg-indigo-500 hover:bg-indigo-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[90px] sm:min-w-[120px] w-full sm:w-auto">
                        考试模式
                    </button>
                    <div id="examModeIndicator" class="w-20 sm:w-24 h-1 bg-indigo-500 mt-1 hidden"></div>
                </div>
                <!-- 查看错题集 -->
                <div class="flex flex-col items-center w-full sm:w-auto">
                    <button id="wrongQuestionsBtn" class="bg-red-500 hover:bg-red-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base min-w-[90px] sm:min-w-[120px] w-full sm:w-auto">
                        查看错题集
                    </button>
                    <div id="wrongQuestionsModeIndicator" class="w-20 sm:w-24 h-1 bg-red-500 mt-1 hidden"></div>
                </div>
            </div>
            
            <!-- 开关选项 (保留原有flex-wrap) -->
            <div class="flex flex-wrap gap-3 sm:gap-4 justify-center items-center">
                <div class="flex items-center">
                    <span class="mr-1.5 sm:mr-2 text-xs sm:text-sm font-medium text-gray-700">显示答案</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="toggleAnswerDisplay" class="hidden">
                        <label for="toggleAnswerDisplay" class="cursor-pointer flex items-center w-10 sm:w-12 h-5 sm:h-6 bg-gray-300 rounded-full transition duration-300 ease-in-out">
                            <span class="toggle-slider bg-white w-4 sm:w-5 h-4 sm:h-5 rounded-full shadow-md transform transition duration-300 ease-in-out ml-0.5"></span>
                        </label>
                    </div>
                </div>
                <div class="flex items-center">
                    <span class="mr-1.5 sm:mr-2 text-xs sm:text-sm font-medium text-gray-700">答题后显示</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="toggleShowAfterAnswer" class="hidden">
                        <label for="toggleShowAfterAnswer" class="cursor-pointer flex items-center w-10 sm:w-12 h-5 sm:h-6 bg-gray-300 rounded-full transition duration-300 ease-in-out">
                            <span class="toggle-slider bg-white w-4 sm:w-5 h-4 sm:h-5 rounded-full shadow-md transform transition duration-300 ease-in-out ml-0.5"></span>
                        </label>
                    </div>
                </div>
                <div class="flex items-center">
                    <span class="mr-1.5 sm:mr-2 text-xs sm:text-sm font-medium text-gray-700">仅未做题和错题</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="toggleUnansweredAndWrong" class="hidden">
                        <label for="toggleUnansweredAndWrong" class="cursor-pointer flex items-center w-10 sm:w-12 h-5 sm:h-6 bg-gray-300 rounded-full transition duration-300 ease-in-out">
                            <span class="toggle-slider bg-white w-4 sm:w-5 h-4 sm:h-5 rounded-full shadow-md transform duration-300 ease-in-out ml-0.5"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 题目显示区域 (结构完全不变) -->
        <div id="questionArea" class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-6 sm:mb-8 hidden">
            <div class="flex flex-col md:flex-row gap-4 sm:gap-6">
                <!-- 左侧主要内容区 -->
                <div class="w-full md:w-4/5 md:pr-6 md:border-r md:border-gray-200">
                    <div class="mb-3 sm:mb-4 flex flex-wrap items-center gap-2">
                        <span id="questionTypeIcon" class="inline-block w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </span>
                        <span id="questionType" class="inline-block rounded-full px-2 sm:px-3 py-0.5 sm:py-1 text-xs sm:text-sm font-semibold"></span>
                        <span id="questionDomain" class="inline-block rounded-full px-2 sm:px-3 py-0.5 sm:py-1 text-xs sm:text-sm font-semibold bg-orange-500 text-white hidden"></span>
                        <span id="questionIndex" class="text-xs sm:text-sm text-gray-600"></span>
                    </div>
                    <h3 id="questionStem" class="text-base sm:text-xl font-semibold mb-3 sm:mb-4"></h3>
                    
                    <!-- 选项区域 -->
                    <div id="optionsArea" class="mb-4 sm:mb-6">
                        <!-- 动态生成选项 -->
                    </div>
                    
                    <!-- 填空题输入区域 -->
                    <div id="fillBlankArea" class="mb-4 sm:mb-6 hidden">
                        <input type="text" id="fillBlankInput" class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm sm:text-base" placeholder="请输入答案">
                    </div>
                    
                    <!-- 答案和解析区域 -->
                    <div id="answerSection" class="hidden">
                        <div class="bg-green-50 border border-green-200 rounded-lg p-3 sm:p-4 mb-3 sm:mb-4">
                            <p class="text-green-800 font-medium text-sm sm:text-base">
                                <span class="font-bold">正确答案:</span>
                                <span id="correctAnswer"></span>
                            </p>
                        </div>
                        <div id="explanationSection" class="bg-blue-50 border border-blue-200 rounded-lg p-3 sm:p-4 hidden">
                            <p class="text-blue-800 text-sm sm:text-base">
                                <span class="font-bold">解析:</span>
                                <span id="explanationText"></span>
                            </p>
                        </div>
                    </div>
                    
                    <!-- 导航按钮 -->
                    <div class="flex justify-between items-center mt-4 sm:mt-6">
                        <button id="prevQuestion" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base disabled:opacity-50 disabled:cursor-not-allowed">
                            上一题
                        </button>
                        <div class="flex gap-2 sm:gap-3">
                            <button id="checkAnswer" class="bg-yellow-500 hover:bg-yellow-600 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base">
                                查看答案
                            </button>
                            <button id="finishExamEarly" class="bg-red-500 hover:bg-red-600 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base hidden">
                                结束考试
                            </button>
                        </div>
                        <button id="nextQuestion" class="bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base disabled:opacity-50 disabled:cursor-not-allowed">
                            下一题
                        </button>
                    </div>
                </div>
                
                <!-- 右侧题目进度指示器 (移动端在下方，已通过样式优化方块大小) -->
                <div class="w-full md:w-1/5 mt-4 md:mt-0">
                    <h4 class="text-xs sm:text-sm font-medium text-gray-700 mb-2">题目进度</h4>
                    <div id="questionProgress" class="flex flex-wrap gap-1 max-h-[300px] sm:max-h-[400px] overflow-y-auto">
                        <!-- 动态生成进度指示器 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 考试结果区域 -->
        <div id="examResultArea" class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-6 sm:mb-8 hidden">
            <h2 class="text-xl sm:text-2xl font-bold mb-3 sm:mb-4">考试结果</h2>
            <p class="text-base sm:text-xl mb-3 sm:mb-4">总题数: <span id="totalQuestions"></span> | 正确题数: <span id="correctCount"></span> | 正确率: <span id="accuracyRate"></span>% | 得分: <span id="examScore"></span>分</p>
            <div class="text-center mt-4 sm:mt-6 flex flex-wrap gap-2 justify-center">
                <button id="viewExamWrongQuestions" class="bg-blue-500 hover:bg-blue-700 text-white font-medium py-1.5 sm:py-2 px-4 sm:px-6 rounded-lg text-sm sm:text-base hidden">
                    查看错题
                </button>
                <button id="finishExam" class="bg-green-500 hover:bg-green-700 text-white font-medium py-1.5 sm:py-2 px-4 sm:px-6 rounded-lg text-sm sm:text-base">
                    结束考试
                </button>
            </div>
        </div>
        
        <!-- 隐藏的文件输入 (手机导入XLSX的关键) -->
        <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
    </div>

    <!-- 错题集模态框 (所有模态框结构不变) -->
    <div id="wrongQuestionsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-4xl max-h-[90vh] flex flex-col">
            <div class="p-4 sm:p-6 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl sm:text-2xl font-bold">错题集</h2>
                    <button id="closeWrongQuestionsModal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="wrongQuestionsContainer" class="p-4 sm:p-6 overflow-y-auto flex-1">
                <!-- 动态生成错题列表 -->
            </div>
            <div class="p-4 sm:p-6 border-t flex flex-wrap gap-2 justify-end">
                <button id="exportWrongQuestionsBtn" class="bg-green-500 hover:bg-green-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base">
                    导出错题
                </button>
                <button id="deleteAllWrongQuestionsBtn" class="bg-red-500 hover:bg-red-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base">
                    全部删除
                </button>
                <button id="redoWrongQuestionsBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-medium py-1.5 sm:py-2 px-3 sm:px-4 rounded-lg text-sm sm:text-base">
                    重做错题
                </button>
            </div>
        </div>
    </div>

    <!-- 考试错题模态框 -->
    <div id="examWrongQuestionsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-4xl max-h-[90vh] flex flex-col">
            <div class="p-4 sm:p-6 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl sm:text-2xl font-bold">考试错题</h2>
                    <button id="closeExamWrongQuestionsModal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="examWrongQuestionsContainer" class="p-4 sm:p-6 overflow-y-auto flex-1">
                <!-- 动态生成考试错题列表 -->
            </div>
        </div>
    </div>

    <!-- 分值设置模态框 -->
    <div id="scoreSettingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-md">
            <div class="p-4 sm:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">分值设置</h2>
                    <button id="closeScoreSettingModal" class="text-gray-500 hover:text-gray-700">

    <!-- 自动导入同目录下的 list.xlsx (其他功能不变) -->
    <script>
        (function() {
            // 等待页面和所有脚本加载完成后执行，确保 fileInput 存在且事件监听已绑定
            window.addEventListener('load', function() {
                // 尝试获取 list.xlsx 文件
                fetch('list.xlsx')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('文件不存在或无法访问 (HTTP ' + response.status + ')');
                        }
                        return response.arrayBuffer();
                    })
                    .then(arrayBuffer => {
                        // 创建一个 File 对象
                        const file = new File([arrayBuffer], 'list.xlsx', { 
                            type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
                        });
                        
                        const fileInput = document.getElementById('fileInput');
                        if (!fileInput) return;

                        // 使用 DataTransfer 模拟文件选择
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;

                        // 触发 change 事件，通知 Quiz.js 处理导入
                        fileInput.dispatchEvent(new Event('change', { bubbles: true }));

                        console.log('自动导入 list.xlsx 成功');
                    })
                    .catch(err => {
                        // 静默失败，不干扰用户手动操作
                        console.log('自动导入 list.xlsx 失败 (不影响手动导入):', err.message);
                    });
            });
        })();
    </script>
