<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            transition: background-color 0.5s;
        }
        #timer {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .input-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        /* 下拉菜单与手动输入组合样式 */
        .time-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
        }
        select, #customMinutesInput {
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
            outline: none;
        }
        select:focus, #customMinutesInput:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 3px rgba(76, 175, 80, 0.5);
        }
        #customMinutesInput {
            width: 80px;
            cursor: text;
        }
        .input-container span {
            font-size: 16px;
            color: #333;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .blink {
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { background-color: #f0f0f0; }
            50% { background-color: #ff0000; }
            100% { background-color: #f0f0f0; }
        }
        #errorMessage {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="timer">05:00</div>
    <div class="input-container">
        <div class="time-selector">
            <select id="presetSelect">
                <option value="1">1</option>
                <option value="3">3</option>
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="45">45</option>
                <option value="60">60</option>
                <option value="custom">自定义</option>
            </select>
            <input type="number" id="customMinutesInput" value="5" min="1" step="1" placeholder="分钟" style="display: none;">
            <span>分钟</span>
        </div>
    </div>
    <div class="buttons">
        <button id="startBtn">开始</button>
        <button id="resetBtn">重置</button>
    </div>
    <div id="errorMessage"></div>
    <script>
        // ======================== DOM 元素 ========================
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const presetSelect = document.getElementById('presetSelect');
        const customMinutesInput = document.getElementById('customMinutesInput');
        const errorMessage = document.getElementById('errorMessage');
        
        // ======================== 核心变量 ========================
        let timeLeft = 5 * 60;          // 当前剩余秒数
        let timerId = null;              // setInterval 句柄
        let isRunning = false;           // 倒计时是否进行中
        
        // 【修复后台/锁屏计时的关键变量】基于真实时间戳的校准数据
        let timerStartTimestamp = null;   // 本次倒计时开始时的系统时间戳 (毫秒)
        let timerRemainingAtStart = 0;    // 倒计时开始时的剩余秒数 (与 startTimestamp 对应)
        
        // ======================== 辅助函数 ========================
        // 获取当前选中的分钟数 (整合下拉菜单 + 自定义输入)
        function getCurrentMinutes() {
            const selectedVal = presetSelect.value;
            if (selectedVal === 'custom') {
                let customVal = parseInt(customMinutesInput.value);
                if (isNaN(customVal) || customVal < 1) {
                    customVal = 1;
                }
                return customVal;
            } else {
                return parseInt(selectedVal);
            }
        }
        
        // 同步自定义输入框的显示/隐藏
        function syncCustomInputVisibility() {
            if (presetSelect.value === 'custom') {
                customMinutesInput.style.display = 'inline-block';
                let curCustom = parseInt(customMinutesInput.value);
                if (isNaN(curCustom) || curCustom < 1) {
                    customMinutesInput.value = 1;
                }
            } else {
                customMinutesInput.style.display = 'none';
                const presetMinutes = parseInt(presetSelect.value);
                if (!isNaN(presetMinutes) && presetMinutes > 0) {
                    customMinutesInput.value = presetMinutes;
                }
            }
        }
        
        // 更新时间显示 (基于全局 timeLeft，自动格式化为 MM:SS)
        function updateDisplay() {
            const totalSeconds = Math.max(0, Math.floor(timeLeft));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 根据界面输入刷新 timeLeft (仅在未运行时调用，保证预览同步)
        function syncTimeFromUI() {
            if (!isRunning) {
                let minutes = getCurrentMinutes();
                if (minutes < 1) minutes = 1;
                timeLeft = minutes * 60;
                updateDisplay();
            }
        }
        
        // ======================== 倒计时结束处理 ========================
        function finishCountdown() {
            // 防止重复触发结束逻辑
            if (!isRunning && timerId === null) return;
            
            // 清除计时器及基准数据
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            timerStartTimestamp = null;
            timerRemainingAtStart = 0;
            
            // 保证剩余时间为0
            timeLeft = 0;
            updateDisplay();
            
            // 标记状态: 倒计时已结束, 不再运行
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.disabled = true;        // 倒计时结束后只能按重置
            // 恢复下拉/输入控件可用
            presetSelect.disabled = false;
            customMinutesInput.disabled = false;
            
            // 启用闪烁特效 (视觉提醒)
            document.body.classList.add('blink');
            
            // 隐藏任何错误提示
            errorMessage.style.display = 'none';
        }
        
        // ======================== 基于时间戳的精准刷新核心 ========================
        // 此函数在 setInterval 中被调用, 根据真实时间差计算剩余时间, 彻底解决锁屏/后台停止问题
        function updateTimerByTimestamp() {
            if (!isRunning || timerStartTimestamp === null) {
                return;
            }
            
            const now = Date.now();
            const elapsedSeconds = (now - timerStartTimestamp) / 1000;
            let remaining = timerRemainingAtStart - elapsedSeconds;
            
            if (remaining <= 0) {
                // 倒计时归零
                timeLeft = 0;
                updateDisplay();
                finishCountdown();
                return;
            }
            
            // 更新全局剩余时间
            timeLeft = remaining;
            updateDisplay();
        }
        
        // ======================== 开始倒计时（基于时间戳启动） ========================
        function startCountdown() {
            if (isRunning) return;
            
            // 如果当前剩余时间 <= 0，不允许开始
            if (timeLeft <= 0) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '倒计时已结束，请按「重置」重新设置时间';
                setTimeout(() => {
                    if (!isRunning) errorMessage.style.display = 'none';
                }, 1500);
                return;
            }
            
            // 清除可能残留的定时器
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            // 记录开始时的真实时间戳 与 当前剩余秒数
            timerStartTimestamp = Date.now();
            timerRemainingAtStart = timeLeft;
            
            // 启动定时器，每秒刷新一次。即使后台节流，恢复后第一次刷新会立刻根据真实时间差计算出正确剩余值
            timerId = setInterval(() => {
                updateTimerByTimestamp();
            }, 1000);
            
            // 设置运行标志及UI禁用控件
            isRunning = true;
            startBtn.textContent = '暂停';
            startBtn.disabled = false;
            presetSelect.disabled = true;
            customMinutesInput.disabled = true;
            errorMessage.style.display = 'none';
            // 移除闪烁特效（如果有）
            document.body.classList.remove('blink');
            
            // 立即刷新一次显示，避免等待1秒延迟
            updateTimerByTimestamp();
        }
        
        // ======================== 暂停倒计时 ========================
        function pauseCountdown() {
            if (!isRunning) return;
            
            // 先基于时间戳精确计算出当前剩余时间，确保暂停时剩余秒数准确
            if (timerStartTimestamp !== null) {
                const now = Date.now();
                const elapsed = (now - timerStartTimestamp) / 1000;
                let accurateRemaining = timerRemainingAtStart - elapsed;
                if (accurateRemaining < 0) accurateRemaining = 0;
                timeLeft = accurateRemaining;
                updateDisplay();
            }
            
            // 清除计时器与基准数据
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            timerStartTimestamp = null;
            timerRemainingAtStart = 0;
            
            // 更新状态
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.disabled = false;
            presetSelect.disabled = false;
            customMinutesInput.disabled = false;
            
            // 同步下拉菜单选项，让界面显示与剩余分钟匹配 (提升用户体验)
            const remainingMinutes = Math.floor(timeLeft / 60);
            let matched = false;
            for (let i = 0; i < presetSelect.options.length; i++) {
                const opt = presetSelect.options[i];
                if (opt.value !== 'custom' && parseInt(opt.value) === remainingMinutes) {
                    presetSelect.value = opt.value;
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                presetSelect.value = 'custom';
                customMinutesInput.value = remainingMinutes;
            } else {
                customMinutesInput.value = remainingMinutes;
            }
            syncCustomInputVisibility();
            
            // 隐藏错误提示
            errorMessage.style.display = 'none';
        }
        
        // ======================== 重置全部 ========================
        function resetTimer() {
            // 清除所有计时器
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            
            // 清除时间戳基准数据
            timerStartTimestamp = null;
            timerRemainingAtStart = 0;
            
            // 清除闪烁效果
            document.body.classList.remove('blink');
            
            // 重置下拉菜单和自定义输入框为默认值 5 分钟
            presetSelect.value = '5';
            customMinutesInput.value = '5';
            syncCustomInputVisibility();
            
            // 重置剩余时间 (5分钟)
            timeLeft = 5 * 60;
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.disabled = false;
            
            // 启用所有控件
            presetSelect.disabled = false;
            customMinutesInput.disabled = false;
            
            // 隐藏任何错误提示
            errorMessage.style.display = 'none';
            
            // 更新时间显示
            updateDisplay();
        }
        
        // ======================== UI 事件监听与同步处理 ========================
        // 当下拉菜单改变时 (未运行状态才允许修改剩余时间)
        function onPresetOrCustomChange() {
            if (isRunning) {
                // 运行时不允许修改，恢复之前选项（给出短暂提示）
                const currentMin = Math.floor(timeLeft / 60);
                let found = false;
                for (let i = 0; i < presetSelect.options.length; i++) {
                    const opt = presetSelect.options[i];
                    if (opt.value !== 'custom' && parseInt(opt.value) === currentMin) {
                        presetSelect.value = opt.value;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    presetSelect.value = 'custom';
                    if (customMinutesInput) customMinutesInput.value = currentMin;
                }
                syncCustomInputVisibility();
                errorMessage.style.display = 'block';
                errorMessage.textContent = '计时运行时无法修改时间，请先暂停或重置';
                setTimeout(() => {
                    if (!isRunning) errorMessage.style.display = 'none';
                    else if (isRunning) { /* 保留提示直至操作停止 */ }
                }, 1500);
                return;
            }
            
            // 未运行：更新界面并同步剩余时间预览
            syncCustomInputVisibility();
            let minutes = getCurrentMinutes();
            if (minutes < 1) minutes = 1;
            timeLeft = minutes * 60;
            updateDisplay();
        }
        
        // 下拉菜单变更事件
        presetSelect.addEventListener('change', () => {
            onPresetOrCustomChange();
        });
        
        // 自定义输入框手动输入处理
        customMinutesInput.addEventListener('input', function() {
            if (isRunning) {
                // 运行时阻止输入改动，恢复正确的剩余分钟
                const currentMin = Math.floor(timeLeft / 60);
                if (customMinutesInput.value != currentMin) {
                    customMinutesInput.value = currentMin;
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = '计时运行时无法修改时间，请先暂停或重置';
                    setTimeout(() => {
                        if (!isRunning) errorMessage.style.display = 'none';
                    }, 1500);
                }
                return;
            }
            
            // 未运行，且当前处于自定义模式时实时更新时间预览
            if (presetSelect.value === 'custom') {
                let val = parseInt(customMinutesInput.value);
                if (isNaN(val)) val = 1;
                if (val < 1) customMinutesInput.value = 1;
                timeLeft = (parseInt(customMinutesInput.value) || 1) * 60;
                updateDisplay();
            } else {
                // 非自定义模式下如果用户修改了自定义输入框的值，仅保存数值，不改变显示（切换到自定义时会用到）
                let val = parseInt(customMinutesInput.value);
                if (isNaN(val) || val < 1) customMinutesInput.value = 1;
            }
        });
        
        customMinutesInput.addEventListener('change', function() {
            if (!isRunning && presetSelect.value === 'custom') {
                let minutes = getCurrentMinutes();
                timeLeft = minutes * 60;
                updateDisplay();
            }
        });
        
        // 开始/暂停 按钮逻辑
        startBtn.addEventListener('click', () => {
            if (isRunning) {
                pauseCountdown();
            } else {
                // 开始前确保 timeLeft > 0
                if (timeLeft <= 0) {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = '倒计时已结束，请按「重置」重新设置时间';
                    setTimeout(() => {
                        if (!isRunning) errorMessage.style.display = 'none';
                    }, 1500);
                    return;
                }
                startCountdown();
            }
        });
        
        // 重置按钮逻辑
        resetBtn.addEventListener('click', resetTimer);
        
        // ======================== 页面可见性变化时额外保障 ========================
        // 虽然时间戳校准已能完美解决后台恢复，但额外处理一下确保恢复后UI立即同步最新剩余
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isRunning && timerStartTimestamp !== null) {
                // 页面重新可见时，强制刷新一次倒计时显示，确保剩余时间精确
                updateTimerByTimestamp();
            }
        });
        
        // ======================== 初始化程序 ========================
        function init() {
            syncCustomInputVisibility();
            // 确保初始 timeLeft 为5分钟
            timeLeft = 5 * 60;
            updateDisplay();
            presetSelect.disabled = false;
            customMinutesInput.disabled = false;
            startBtn.disabled = false;
            startBtn.textContent = '开始';
            isRunning = false;
            timerStartTimestamp = null;
            timerRemainingAtStart = 0;
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            document.body.classList.remove('blink');
            errorMessage.style.display = 'none';
        }
        
        init();
    </script>
</body>
</html>
