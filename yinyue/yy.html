<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎵音乐盒</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #4a6fa5;
            --primary-light: #6b8ec9;
            --primary-dark: #2c4b7a;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-color: rgba(0, 20, 30, 0.2);
            --text-dark: #1e2b3a;
            --text-soft: #2c3e50;
            --radius-lg: 28px;
            --radius-md: 20px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #c0cfde 0%, #b3c5d8 100%);
            min-height: 100vh;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .container {
            max-width: 200px;          /* 更紧凑 */
            width: 100%;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px var(--shadow-color), 0 2px 6px rgba(255,255,255,0.3) inset;
            transition: box-shadow 0.3s ease;
        }

        .playlist-card {
            height: calc(100vh - 40px);
            overflow-y: auto;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) rgba(255,255,255,0.2);
        }

        .playlist-card::-webkit-scrollbar { width: 5px; }
        .playlist-card::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .playlist-card::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .file-picker { margin-bottom: 18px; flex-shrink: 0; }

        .file-picker-button {
            width: 100%;
            padding: 16px 10px;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-dark);
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }
        .file-picker-button:hover {
            background: rgba(255,255,255,0.45);
            border-color: white;
            transform: scale(1.02);
        }

        .song-list { list-style: none; flex: 1; overflow-y: auto; padding-right: 4px; }

        .song-item {
            padding: 3px 10px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            border-left: 5px solid transparent;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-item i { width: 22px; color: var(--primary-dark); font-size: 1rem; }
        .song-item.active {
            background: rgba(255,255,255,0.9);
            border-left: 5px solid var(--primary);
            font-weight: 600;
            color: var(--primary-dark);
            box-shadow: 0 8px 18px rgba(74, 111, 165, 0.2);
            transform: translateX(4px);
        }
        .song-item:hover { background: rgba(255, 255, 255, 0.8); transform: translateX(5px); }

        .song-item-inner { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .song-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .remove-btn {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.05rem;
            padding: 5px;
            border-radius: 50%;
            opacity: 0.75;
            transition: 0.2s ease;
            flex-shrink: 0;
        }
        .remove-btn:hover { opacity: 1; background: rgba(231,76,60,0.12); transform: scale(1.15); }

        /* ---------- 右侧播放面板 (极简：无封面，无歌词) ---------- */
        .player-card {
            padding: 28px 22px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 歌曲信息条 —— 替代封面区域 */
        .now-playing-bar {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .now-playing-icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .now-playing-text {
            flex: 1;
            overflow: hidden;
        }
        .current-song-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .current-artist-name {
            font-size: 0.95rem;
            color: #2e405b;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 进度条区域 */
        .progress-area { width: 100%; }
        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1);
        }
        .progress {
            height: 8px;
            background: linear-gradient(90deg, var(--primary), #8aacdf);
            border-radius: 20px;
            width: 0%;
            position: relative;
            box-shadow: 0 0 8px var(--primary-light);
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #1f2e41;
            margin-top: 5px;
            font-weight: 500;
        }

        /* 控制按钮组 (紧凑) */
        .button-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .control-button {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: #1e3b5a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
        }
        .control-button:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.1);
            color: var(--primary-dark);
        }
        .control-button.main {
            background: white;
            color: var(--primary-dark);
            font-size: 2.2rem;
            width: 68px;
            height: 68px;
            box-shadow: 0 8px 20px rgba(0,30,50,0.2);
        }
        .control-button.main:hover { background: #f0f5ff; transform: scale(1.05); }
        .control-button.active { color: #1f4a81; text-shadow: 0 0 6px #7ca2df; }

        /* 音量简洁 */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.25);
            padding: 8px 18px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;  /* 居中 */
        }
        .volume-slider {
            width: 100px;
            height: 5px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            -webkit-appearance: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            border: 2px solid var(--primary);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* 移动端适配 */
        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; gap: 14px; }
            .playlist-card { height: auto; max-height: 38vh; }
            .now-playing-bar { padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧歌单 (不变) -->
    <div class="playlist-card glass-card">
        <div class="file-picker">
            <button class="file-picker-button" id="filePickerButton">
                <i class="fas fa-folder-open" style="margin-right: 8px;"></i>选择音乐文件夹
            </button>
            <input type="file" id="directoryPicker" webkitdirectory directory multiple accept="audio/*" style="display: none;">
        </div>
        <ul id="songList" class="song-list"></ul>
    </div>

    <!-- 右侧播放器 (极简：无动画封面，无歌词) -->
    <div class="player-card glass-card">
        <!-- 现在播放简洁卡片 -->
        <div class="now-playing-bar">
            <div class="now-playing-icon"><i class="fas fa-headphones-alt"></i></div>
            <div class="now-playing-text">
                <div id="currentSong" class="current-song-name">未选择歌曲</div>
                <div id="artist" class="current-artist-name">未知艺术家</div>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-area">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
            </div>
        </div>

        <!-- 播放控制组 (保留全部功能) -->
        <div class="button-group">
            <button class="control-button" id="playModeBtn" title="随机/顺序"><i class="fas fa-arrows-alt-h"></i></button>
            <button class="control-button" id="loopBtn" title="单曲循环"><i class="fas fa-sync-alt"></i></button>
            <button class="control-button" id="prevBtn" title="上一首"><i class="fas fa-step-backward"></i></button>
            <button class="control-button main" id="playPauseBtn" title="播放/暂停"><i class="fas fa-play"></i></button>
            <button class="control-button" id="nextBtn" title="下一首"><i class="fas fa-step-forward"></i></button>
        </div>

        <!-- 音量简洁 -->
        <div class="volume-container">
            <i class="fas fa-volume-up" id="volumeIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        </div>
    </div>
</div>

<audio id="audioPlayer" preload="metadata"></audio>

<script>
(function() {
    // ---------- 核心DOM (移除所有歌词/封面相关变量) ----------
    const dom = {
        dirPicker: document.getElementById('directoryPicker'),
        fileBtn: document.getElementById('filePickerButton'),
        songList: document.getElementById('songList'),
        audio: document.getElementById('audioPlayer'),
        playPause: document.getElementById('playPauseBtn'),
        prev: document.getElementById('prevBtn'),
        next: document.getElementById('nextBtn'),
        modeBtn: document.getElementById('playModeBtn'),
        loopBtn: document.getElementById('loopBtn'),
        curTime: document.getElementById('currentTime'),
        totalTime: document.getElementById('totalTime'),
        progressBar: document.getElementById('progressBar'),
        progress: document.getElementById('progress'),
        volumeSlider: document.getElementById('volumeSlider'),
        volIcon: document.getElementById('volumeIcon'),
        songTitle: document.getElementById('currentSong'),
        artist: document.getElementById('artist')
        // 注：albumArt, lyrics相关元素已从HTML移除
    };

    // ---------- 状态 ----------
    const state = {
        songs: [],                 // File 数组
        currentIdx: -1,
        shuffled: [],
        shuffleOn: false,
        loopOne: false,
        revokeUrl: ''              // 用于释放上一个blob
    };

    // ---------- 辅助函数 ----------
    const fmtTime = s => isNaN(s) ? '00:00' : `${Math.floor(s/60)}`.padStart(2,'0')+':'+`${Math.floor(s%60)}`.padStart(2,'0');

    // 简单从文件名猜测艺术家/标题 (可选)
    const guessMeta = name => {
        let base = name.substring(0, name.lastIndexOf('.')) || name;
        base = base.replace(/\s*[\(\[]([^\)\]]+)[\)\]]/g, '').trim();
        if (base.includes(' - ')) {
            const parts = base.split(' - ');
            return { artist: parts[0].trim(), title: parts.slice(1).join(' - ').trim() };
        }
        return { artist: '', title: base };
    };

    // 释放旧blob内存
    function revokeCurrentSrc() {
        if (dom.audio.src && dom.audio.src.startsWith('blob:')) {
            URL.revokeObjectURL(dom.audio.src);
        }
    }

    // 渲染歌单
    function renderPlaylist() {
        if (!state.songs.length) {
            dom.songList.innerHTML = '<li class="song-item" style="justify-content:center;opacity:0.7;"><i class="fas fa-music"></i> 暂无歌曲</li>';
            return;
        }
        let html = '';
        state.songs.forEach((s, idx) => {
            const active = (idx === state.currentIdx) ? 'active' : '';
            html += `<li class="song-item ${active}" data-index="${idx}">
                <div class="song-item-inner"><i class="fas fa-music"></i><span class="song-name">${s.name}</span></div>
                <button class="remove-btn" data-index="${idx}" title="移除"><i class="fas fa-times"></i></button>
            </li>`;
        });
        dom.songList.innerHTML = html;
    }

    // 移除歌曲 (精简版, 已去除歌词相关)
    function removeSong(index) {
        if (index<0 || index>=state.songs.length) return;
        const wasCurrent = (index === state.currentIdx);
        state.songs.splice(index, 1);

        if (wasCurrent) {
            revokeCurrentSrc();
            if (state.songs.length) {
                let next = index;
                if (next >= state.songs.length) next = state.songs.length-1;
                playSong(next);
            } else {
                dom.audio.pause();
                dom.audio.removeAttribute('src');
                dom.songTitle.textContent = '未选择歌曲';
                dom.artist.textContent = '未知艺术家';
                dom.playPause.innerHTML = '<i class="fas fa-play"></i>';
                state.currentIdx = -1;
                renderPlaylist();
            }
        } else {
            if (state.currentIdx > index) state.currentIdx--;
            renderPlaylist();
        }
        // 更新随机索引
        if (state.shuffleOn) {
            state.shuffled = [...Array(state.songs.length).keys()].sort(()=>Math.random()-0.5);
        }
    }

    // 播放指定歌曲
    function playSong(index) {
        if (!state.songs.length || index<0 || index>=state.songs.length) return;

        revokeCurrentSrc();                 // 清除前一个blob
        state.currentIdx = index;
        const file = state.songs[index];
        dom.audio.src = URL.createObjectURL(file);

        // 更新界面显示
        dom.songTitle.textContent = file.name;
        dom.artist.textContent = '未知艺术家';

        // 尝试从ID3读取艺术家 (若有jsmediatags)
        if (window.jsmediatags) {
            window.jsmediatags.read(file, {
                onSuccess: tag => {
                    // 只提取艺术家和标题，忽略歌词和封面
                    const artistTag = tag.tags?.artist || tag.tags?.performer || '';
                    const titleTag = tag.tags?.title || '';
                    if (artistTag) dom.artist.textContent = artistTag;
                    if (titleTag) dom.songTitle.textContent = titleTag;
                },
                onError: () => {
                    const { artist, title } = guessMeta(file.name);
                    if (artist) dom.artist.textContent = artist;
                    if (title) dom.songTitle.textContent = title;
                }
            });
        } else {
            const { artist, title } = guessMeta(file.name);
            if (artist) dom.artist.textContent = artist;
            if (title) dom.songTitle.textContent = title;
        }

        dom.audio.play().then(() => {
            dom.playPause.innerHTML = '<i class="fas fa-pause"></i>';
        }).catch(() => {
            dom.playPause.innerHTML = '<i class="fas fa-play"></i>';
        });

        renderPlaylist();
    }

    // 下一首
    function nextSong() {
        if (!state.songs.length) return;
        if (state.loopOne) { playSong(state.currentIdx); return; }
        let next;
        if (state.shuffleOn) {
            if (!state.shuffled.length) state.shuffled = [...Array(state.songs.length).keys()].sort(()=>Math.random()-0.5);
            const pos = state.shuffled.indexOf(state.currentIdx);
            next = state.shuffled[(pos+1) % state.shuffled.length];
        } else {
            next = (state.currentIdx + 1) % state.songs.length;
        }
        playSong(next);
    }

    function prevSong() {
        if (!state.songs.length) return;
        if (state.loopOne) { playSong(state.currentIdx); return; }
        let prev;
        if (state.shuffleOn) {
            if (!state.shuffled.length) state.shuffled = [...Array(state.songs.length).keys()].sort(()=>Math.random()-0.5);
            const pos = state.shuffled.indexOf(state.currentIdx);
            prev = state.shuffled[(pos-1+state.shuffled.length) % state.shuffled.length];
        } else {
            prev = (state.currentIdx - 1 + state.songs.length) % state.songs.length;
        }
        playSong(prev);
    }

    function togglePlay() {
        if (state.currentIdx === -1 && state.songs.length) playSong(0);
        else if (dom.audio.paused) dom.audio.play();
        else dom.audio.pause();
    }

    // ---------- 事件绑定 ----------
    dom.songList.addEventListener('click', e => {
        const item = e.target.closest('.song-item');
        if (!item) return;
        const idx = parseInt(item.dataset.index, 10);
        if (e.target.closest('.remove-btn')) {
            e.stopPropagation();
            removeSong(idx);
        } else {
            playSong(idx);
        }
    });

    dom.fileBtn.addEventListener('click', () => dom.dirPicker.click());
    dom.dirPicker.addEventListener('change', e => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || /\.(mp3|flac|wav|m4a|ogg)$/i.test(f.name));
        if (!files.length) return;
        revokeCurrentSrc();
        state.songs = files;
        state.shuffled = [...Array(files.length).keys()];
        state.currentIdx = -1;
        renderPlaylist();
        playSong(0);
    });

    dom.playPause.addEventListener('click', togglePlay);
    dom.next.addEventListener('click', nextSong);
    dom.prev.addEventListener('click', prevSong);

    dom.modeBtn.addEventListener('click', () => {
        state.shuffleOn = !state.shuffleOn;
        dom.modeBtn.classList.toggle('active');
        dom.modeBtn.querySelector('i').className = state.shuffleOn ? 'fas fa-random' : 'fas fa-arrows-alt-h';
        if (state.shuffleOn) {
            state.shuffled = [...Array(state.songs.length).keys()].sort(()=>Math.random()-0.5);
        }
    });

    dom.loopBtn.addEventListener('click', () => {
        state.loopOne = !state.loopOne;
        dom.loopBtn.classList.toggle('active');
        dom.loopBtn.querySelector('i').className = state.loopOne ? 'fas fa-infinity' : 'fas fa-sync-alt';
    });

    // 进度条拖拽 (轻量)
    let seeking = false;
    dom.progressBar.addEventListener('mousedown', e => {
        seeking = true;
        const rect = dom.progressBar.getBoundingClientRect();
        let per = Math.min(1, Math.max(0, (e.clientX - rect.left)/rect.width));
        if (dom.audio.duration) dom.audio.currentTime = per * dom.audio.duration;
    });
    document.addEventListener('mousemove', e => {
        if (!seeking) return;
        const rect = dom.progressBar.getBoundingClientRect();
        let per = Math.min(1, Math.max(0, (e.clientX - rect.left)/rect.width));
        dom.progress.style.width = (per*100)+'%';
        if (dom.audio.duration) dom.curTime.textContent = fmtTime(per * dom.audio.duration);
    });
    document.addEventListener('mouseup', e => {
        if (!seeking) return;
        seeking = false;
        const rect = dom.progressBar.getBoundingClientRect();
        let per = Math.min(1, Math.max(0, (e.clientX - rect.left)/rect.width));
        if (dom.audio.duration) dom.audio.currentTime = per * dom.audio.duration;
    });

    // 音量
    dom.volumeSlider.addEventListener('input', e => {
        const v = e.target.value/100;
        dom.audio.volume = v;
        dom.volIcon.className = v===0 ? 'fas fa-volume-mute' : (v<0.5 ? 'fas fa-volume-down' : 'fas fa-volume-up');
    });
    dom.audio.volume = 0.8;

    // 音频事件
    dom.audio.addEventListener('timeupdate', () => {
        if (seeking) return;
        const ct = dom.audio.currentTime || 0, dur = dom.audio.duration || 0;
        dom.curTime.textContent = fmtTime(ct);
        dom.totalTime.textContent = fmtTime(dur);
        dom.progress.style.width = dur ? (ct/dur*100)+'%' : '0%';
    });

    dom.audio.addEventListener('ended', () => {
        if (state.loopOne) playSong(state.currentIdx);
        else nextSong();
    });

    dom.audio.addEventListener('pause', () => {
        dom.playPause.innerHTML = '<i class="fas fa-play"></i>';
    });
    dom.audio.addEventListener('play', () => {
        dom.playPause.innerHTML = '<i class="fas fa-pause"></i>';
    });

    // 快捷键
    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowLeft') { e.preventDefault(); prevSong(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); nextSong(); }
    });

    // 按需加载jsmediatags (不强制)
    if (!window.jsmediatags) {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js';
        script.async = true;
        document.head.appendChild(script);
    }

    renderPlaylist();
})();
</script>
</body>
</html>
