<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>数字华容道</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            color: #1e3a8a;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(30 58 138);
            max-width: 520px;
            width: 100%;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 2px;
            background: linear-gradient(to right, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.05rem;
            color: #64748b;
            margin-bottom: 5px;
        }
        
        /* 难度选择器 */
        .difficulty-selector {
            display: flex;
            gap: 2px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }
        
        .diff-btn {
            padding: 5px 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 2px solid #64748b;
            background: #fff;
            color: #64748b;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 70px;
        }
        
        .diff-btn.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 3px 10px rgba(59, 130, 246, 0.3);
        }
        
        .diff-btn:hover:not(.active) {
            background: #f1f5f9;
            transform: translateY(-1px);
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        
        .info-label {
            font-weight: 700;
            color: #64748b;
            font-size: 0.95rem;
        }
        
        .value {
            font-size: 1.45rem;
            font-weight: 700;
            color: #1e40af;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            gap: 8px;
            background: #1e3a8a;
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 22px;
            box-shadow: inset 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            aspect-ratio: 1 / 1;
            --tile-font-size: 2.0rem;   /* 4×4 默认 */
        }
        
        /* ==================== 各难度精确适配 ==================== */
        .grid.size-3 {
            --grid-size: 3;
            --tile-font-size: 2.65rem;   /* 3×3 大方块，大字体更清晰 */
            gap: 12px;
            padding: 12px;
        }
        .grid.size-4 {
            --grid-size: 4;
            --tile-font-size: 2.0rem;
            gap: 8px;
            padding: 12px;
        }
        .grid.size-5 {
            --grid-size: 5;
            --tile-font-size: 1.38rem;   /* 5×5 双位数数字，字体缩小避免挤压 */
            gap: 6px;
            padding: 12px;
        }
        
        .tile {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3b82f6, #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--tile-font-size);
            font-weight: 700;
            color: #fff;
            box-shadow: 0 6px 14px rgba(30, 58, 138, 0.3);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
        }
        
        .tile:hover {
            transform: scale(1.06);
            box-shadow: 0 10px 18px rgba(30, 58, 138, 0.4);
        }
        
        .tile:active {
            transform: scale(0.95);
        }
        
        .tile.empty {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
            cursor: default;
        }
        
        .tile.empty:hover,
        .tile.empty:active {
            transform: none;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 14px 26px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 54px;
            flex: 1;
            max-width: 160px;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover,
        .btn-primary:active {
            background: #1e40af;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        
        .btn-secondary:hover,
        .btn-secondary:active {
            background: #475569;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            color: #1e3a8a;
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0);
        }
        
        .modal h2 {
            font-size: 1.9rem;
            margin-bottom: 12px;
        }
        
        .modal p {
            font-size: 1.2rem;
            margin-bottom: 22px;
            color: #64748b;
        }
        
        .win-stats {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 1.1rem;
            text-align: left;
        }
        
        .footer {
            margin-top: 22px;
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.4;
        }
        
        @keyframes pop {
            0% { transform: scale(0.75); }
            60% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        
        .win-tile {
            animation: pop 0.5s ease forwards;
        }
        
        /* ====================== 移动设备精确优化 ====================== */
        @media (max-width: 480px) {
            body { padding: 8px; }
            
            .game-container {
                padding: 20px;
                min-height: 80px;
                border-radius: 16px;
            }
            
            h1 { font-size: 1.85rem; }
            
            .subtitle { font-size: 0.98rem; margin-bottom: 5px; }
            
            .difficulty-selector { gap: 6px; margin-bottom: 5px; }
            .diff-btn { padding: 5px 10px; font-size: 0.98rem; min-width: 78px; }
            
            .info-bar {
                padding: 5px 10px;
                margin-bottom: 5px;
                font-size: 1rem;
                border-radius: 10px;
            }
            
            .value { font-size: 1.3rem; }
            
            /* 移动端各难度字体+间距微调（避免挤压/过大） */
            .grid.size-3 {
                --tile-font-size: 2.35rem;
                gap: 5px;
                padding: 9px;
            }
            .grid.size-4 {
                --tile-font-size: 1.78rem;
                gap: 5px;
                padding: 6px;
            }
            .grid.size-5 {
                --tile-font-size: 1.22rem;   /* 5×5 双位数在小屏更清晰 */
                gap: 4px;
                padding: 5px;
            }
            
            .tile {
                border-radius: 10px;
                box-shadow: 0 4px 10px rgba(30, 58, 138, 0.25);
            }
            
            button {
                padding: 15px 20px;
                font-size: 1.05rem;
                min-height: 52px;
                flex: 1;
                max-width: none;
                border-radius: 14px;
            }
            
            .controls { gap: 10px; margin-top: 4px; }
            
            .modal-content { padding: 30px 20px; max-width: 95%; border-radius: 18px; }
            .modal h2 { font-size: 1.75rem; }
            
            .footer { font-size: 0.8rem; margin-top: 5px; }
        }
        
        /* 超小屏幕（iPhone SE / 360px 宽）额外保护 */
        @media (max-width: 360px) {
            .grid.size-3 { --tile-font-size: 2.15rem; }
            .grid.size-4 { --tile-font-size: 1.65rem; }
            .grid.size-5 { --tile-font-size: 1.15rem; }
        }
        
        /* 横屏优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container { padding: 12px; max-width: 480px; }
            .grid { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        
        <p class="subtitle">数字华容道</p>
        
        <!-- 难度选择 -->
        <div class="difficulty-selector">
            <button onclick="setDifficulty(3)" id="diff-3" class="diff-btn">3×3 简单</button>
            <button onclick="setDifficulty(4)" id="diff-4" class="diff-btn active">4×4 中等</button>
            <button onclick="setDifficulty(5)" id="diff-5" class="diff-btn">5×5 困难</button>
        </div>
        
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">步数</span>
                <span class="value" id="moves">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">时间</span>
                <span class="value" id="time">00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">难度</span>
                <span class="value" id="level">4×4</span>
            </div>
        </div>
        
        <div id="grid" class="grid size-4"></div>
        
        <div class="controls">
            <button onclick="newGame()" class="btn-primary">
                <span>🎲</span> 新游戏
            </button>
            <button onclick="resetGame()" class="btn-secondary">
                <span>🔄</span> 重置
            </button>
            <button onclick="showHelp()" class="btn-secondary">
                <span>❔</span> 规则
            </button>
        </div>
        
        <div class="footer">
            支持 3×3 / 4×4 / 5×5 三种难度<br>
            滑动数字 → 1到N按顺序排列，空格在右下角即胜利！完美触屏
        </div>
    </div>
    
    <!-- 胜利弹窗 -->
    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>🎉 恭喜通关！</h2>
            <p id="winTitle">你成功完成了数字华容道！</p>
            
            <div class="win-stats">
                <div>难度：<strong id="winLevel">4×4</strong></div>
                <div>步数：<strong id="winMoves">0</strong></div>
                <div>时间：<strong id="winTime">00:00</strong></div>
                <div style="margin-top:10px; font-size:1rem;">太强了！换个难度继续挑战吧！</div>
            </div>
            
            <button onclick="newGameFromWin()" class="btn-primary" style="width:100%; padding:16px; font-size:1.15rem;">
                再来一局
            </button>
            
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:2px solid #64748b; color:#64748b; width:100%; padding:12px;">
                关闭
            </button>
        </div>
    </div>
    
    <!-- 帮助弹窗 -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <h2>游戏规则</h2>
            <p style="text-align:left; line-height:1.7;">
                1. 支持 <strong>3×3（简单）</strong>、<strong>4×4（中等）</strong>、<strong>5×5（困难）</strong> 三种难度<br>
                2. 点击或手指滑动与空格相邻的数字方块<br>
                3. 目标：把数字按1→N从小到大顺序排列，空格在右下角<br>
                4. 每一步计入步数，时间自动记录<br>
                5. 每次生成都是100%可解的局面<br><br>
                <strong>手机专属：</strong> 触屏滑动超顺滑，横竖屏自动适配！
            </p>
            <button onclick="closeHelp()" class="btn-primary" style="width:100%; padding:16px; font-size:1.15rem;">
                我知道了，开始挑战！
            </button>
        </div>
    </div>

    <script>
        // 游戏核心变量
        let currentSize = 4;
        let board = [];
        let emptyIndex = 15;
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let isPlaying = false;
        
        // DOM 元素
        const gridEl = document.getElementById('grid');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const levelEl = document.getElementById('level');
        const winModal = document.getElementById('winModal');
        const helpModal = document.getElementById('helpModal');
        const winLevelEl = document.getElementById('winLevel');
        const winMovesEl = document.getElementById('winMoves');
        const winTimeEl = document.getElementById('winTime');
        const winTitleEl = document.getElementById('winTitle');
        
        // 创建棋盘
        function createGrid() {
            gridEl.innerHTML = '';
            const total = currentSize * currentSize;
            for (let i = 0; i < total; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i;
                tile.addEventListener('click', handleTileClick);
                tile.addEventListener('touchstart', handleTouchStart, { passive: true });
                gridEl.appendChild(tile);
            }
            gridEl.className = `grid size-${currentSize}`;
        }
        
        // 渲染棋盘
        function renderBoard() {
            const tiles = gridEl.querySelectorAll('.tile');
            tiles.forEach((tile, i) => {
                const num = board[i];
                if (num === 0) {
                    tile.classList.add('empty');
                    tile.textContent = '';
                } else {
                    tile.classList.remove('empty');
                    tile.textContent = num;
                    if (isSolved() && num === i + 1) {
                        tile.classList.add('win-tile');
                    } else {
                        tile.classList.remove('win-tile');
                    }
                }
            });
        }
        
        // 获取可移动位置
        function getMovableDirections() {
            const row = Math.floor(emptyIndex / currentSize);
            const col = emptyIndex % currentSize;
            const directions = [];
            if (row > 0) directions.push(emptyIndex - currentSize);
            if (row < currentSize - 1) directions.push(emptyIndex + currentSize);
            if (col > 0) directions.push(emptyIndex - 1);
            if (col < currentSize - 1) directions.push(emptyIndex + 1);
            return directions;
        }
        
        // 点击处理
        function handleTileClick(e) {
            if (!isPlaying) return;
            const index = parseInt(e.currentTarget.dataset.index);
            if (getMovableDirections().includes(index)) performMove(index);
        }
        
        // 触屏滑动
        function handleTouchStart(e) {
            if (!isPlaying) return;
            const startX = e.changedTouches[0].screenX;
            const startY = e.changedTouches[0].screenY;
            const startIndex = parseInt(e.currentTarget.dataset.index);
            const tileEl = e.currentTarget;
            
            const touchEndHandler = function(ev) {
                tileEl.removeEventListener('touchend', touchEndHandler);
                const endX = ev.changedTouches[0].screenX;
                const endY = ev.changedTouches[0].screenY;
                const deltaX = endX - startX;
                const deltaY = endY - startY;
                
                let targetIndex = startIndex;
                if (Math.abs(deltaX) > Math.abs(deltaY) + 12) {
                    if (deltaX > 38 && (startIndex % currentSize) < currentSize - 1) targetIndex = startIndex + 1;
                    else if (deltaX < -38 && (startIndex % currentSize) > 0) targetIndex = startIndex - 1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) + 12) {
                    if (deltaY > 38 && Math.floor(startIndex / currentSize) < currentSize - 1) targetIndex = startIndex + currentSize;
                    else if (deltaY < -38 && Math.floor(startIndex / currentSize) > 0) targetIndex = startIndex - currentSize;
                }
                
                if (targetIndex !== startIndex && getMovableDirections().includes(targetIndex)) {
                    performMove(targetIndex);
                }
            };
            tileEl.addEventListener('touchend', touchEndHandler, { passive: true });
        }
        
        // 执行移动
        function performMove(targetIndex) {
            [board[targetIndex], board[emptyIndex]] = [board[emptyIndex], board[targetIndex]];
            emptyIndex = targetIndex;
            moves++;
            movesEl.textContent = moves;
            renderBoard();
            checkWin();
        }
        
        // 打乱（保证可解）
        function shuffleBoard() {
            const n = currentSize * currentSize;
            board = Array.from({length: n}, (_, i) => i + 1);
            board[n - 1] = 0;
            emptyIndex = n - 1;
            
            const shuffleCount = 180 * n;
            for (let i = 0; i < shuffleCount; i++) {
                const movable = getMovableDirections();
                const randomTarget = movable[Math.floor(Math.random() * movable.length)];
                [board[randomTarget], board[emptyIndex]] = [board[emptyIndex], board[randomTarget]];
                emptyIndex = randomTarget;
            }
        }
        
        // 是否已完成
        function isSolved() {
            const n = currentSize * currentSize;
            for (let i = 0; i < n - 1; i++) {
                if (board[i] !== i + 1) return false;
            }
            return board[n - 1] === 0;
        }
        
        // 检查胜利
        function checkWin() {
            if (isSolved()) {
                isPlaying = false;
                clearInterval(timerInterval);
                
                winLevelEl.textContent = `${currentSize}×${currentSize}`;
                winMovesEl.textContent = moves;
                winTimeEl.textContent = formatTime(seconds);
                winTitleEl.textContent = `你成功完成了 ${currentSize}×${currentSize} 华龙道！`;
                
                setTimeout(() => {
                    renderBoard();
                    winModal.style.display = 'flex';
                }, 280);
            }
        }
        
        // 计时器
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            seconds = 0;
            timeEl.textContent = '00:00';
            timerInterval = setInterval(() => {
                seconds++;
                timeEl.textContent = formatTime(seconds);
            }, 1000);
        }
        
        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }
        
        // 更新难度显示
        function updateLevelDisplay() {
            levelEl.textContent = `${currentSize}×${currentSize}`;
        }
        
        // 切换难度
        function setDifficulty(size) {
            if (size === currentSize) return;
            currentSize = size;
            
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.id.split('-')[1]) === size);
            });
            
            createGrid();
            newGame();
        }
        
        // 新游戏
        function newGame() {
            winModal.style.display = 'none';
            helpModal.style.display = 'none';
            
            shuffleBoard();
            moves = 0;
            movesEl.textContent = '0';
            isPlaying = true;
            
            updateLevelDisplay();
            renderBoard();
            startTimer();
        }
        
        function newGameFromWin() {
            winModal.style.display = 'none';
            newGame();
        }
        
        // 重置
        function resetGame() {
            if (!confirm('确定要重置当前局面吗？')) return;
            shuffleBoard();
            moves = 0;
            movesEl.textContent = '0';
            renderBoard();
            clearInterval(timerInterval);
            startTimer();
        }
        
        // 帮助
        function showHelp() {
            helpModal.style.display = 'flex';
        }
        
        function closeHelp() {
            helpModal.style.display = 'none';
        }
        
        function closeModal() {
            winModal.style.display = 'none';
        }
        
        // 初始化
        function initGame() {
            createGrid();
            newGame();
            
            // 键盘支持
            document.addEventListener('keydown', (e) => {
                if (!isPlaying) return;
                let target = emptyIndex;
                switch (e.key) {
                    case 'ArrowUp':    target -= currentSize; break;
                    case 'ArrowDown':  target += currentSize; break;
                    case 'ArrowLeft':  target -= 1; break;
                    case 'ArrowRight': target += 1; break;
                    default: return;
                }
                if (target >= 0 && target < currentSize * currentSize && getMovableDirections().includes(target)) {
                    performMove(target);
                }
            });
            
            console.log('%c✅ 数字华容道 多难度版已修复！3×3/4×4/5×5 显示已优化～', 'color:#3b82f6; font-size:13px; font-weight:bold;');
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
