<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #111;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 主对比区域 */
        .comparison-container {
            display: flex;
            height: calc(100vh - 20px);
            width: 100vw;
        }
        
        /* 文件对比面板 */
        .file-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            overflow: hidden;
        }
        
        .file-panel:last-child {
            border-right: none;
        }
        
        .panel-header {
            padding: 2px 2px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-size: 13px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }
        
        .file-name {
            font-weight: 500;
            color: #ccc;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: rtl;
            text-align: left;
        }
        
        .drop-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        .drop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 60, 90, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .drop-overlay.active {
            opacity: 1;
        }
        
        .drop-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 文本对比区域 */
        .text-container {
            flex: 1;
            display: flex;
            overflow: auto;
            background: #0a0a0a;
        }
        
        .line-numbers {
            width: 25px;
            background: #151515;
            color: #666;
            text-align: right;
            padding: 8px 12px 8px 0;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }
        
        .line-number {
            height: 20px;
            display: block;
        }
        
        .text-content {
            flex: 1;
            padding: 8px 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre;
            tab-size: 4;
            min-width: 0;
        }
        
        .text-line {
            height: 20px;
            display: block;
            white-space: nowrap;
        }
        
        /* 差异高亮 */
        .diff-added {
            background: rgba(46, 160, 67, 0.9);
            border-left: 3px solid #2ea043;
        }
        
        .diff-removed {
            background: rgba(248, 81, 73, 0.9);
            border-left: 3px solid #f85149;
            color: #adff2f;
        }
        
        .diff-changed {
            background: rgba(187, 128, 9, 0.3);
            border-left: 3px solid #bb8009;
        }
        
        /* 响应式调整 */
        @media (max-width: 1024px) {
            .comparison-container {
                flex-direction: column;
            }
            
            .file-panel {
                height: 50%;
                border-right: none;
                border-bottom: 1px solid #333;
            }
        }
        
        /* 滚动条美工 */
        .text-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .text-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        .text-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        
        /* 文件选择提示 */
        .file-hint {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 14px;
            pointer-events: none;
            z-index: 5;
        }
        
        .file-hint.hidden {
            display: none;
        }
        
        .hint-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .separator {
            width: 1px;
            background: #333;
            height: 100%;
            flex-shrink: 0;
        }
        
        /* 滚动条差异标记容器 */
        .scroll-marks-container {
            position: absolute;
            right: 0;
            top: 0;
            width: 5px;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            background: transparent;
        }
        
        .diff-scroll-mark {
            position: absolute;
            left: 0;
            width: 5px;
            height: 1px;
            border-radius: 2px;
            transition: opacity 0.1s;
        }
        
        .diff-scroll-mark.added {
            background: #2ea043;
            box-shadow: 0 0 2px #2ea043;
        }
        
        .diff-scroll-mark.removed {
            background: #f85149;
            box-shadow: 0 0 2px #f85149;
        }
        
        .diff-scroll-mark.changed {
            background: #bb8009;
            box-shadow: 0 0 2px #bb8009;
        }
        
        .btn, button {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>
    <div class="comparison-container">
        <!-- 左侧文件面板 -->
        <div class="file-panel">
            <div class="panel-header">
                <span>原文件</span>
                <span class="file-name" id="leftFileName">未选择文件</span>
            </div>
            <div class="drop-area" id="leftDropArea">
                <div class="drop-overlay" id="leftDropOverlay">
                    <div class="drop-icon">📄</div>
                    <div>拖放文本文件到此处</div>
                </div>
                <div class="file-hint" id="leftHint">
                    <div class="hint-icon">📄</div>
                    <div>拖放文件到此处</div>
                </div>
                <div class="text-container" id="leftTextContainer">
                    <div class="line-numbers" id="leftLineNumbers"></div>
                    <div class="text-content" id="leftTextContent"></div>
                </div>
                <!-- 滚动条差异标记容器 -->
                <div id="leftScrollMarks" class="scroll-marks-container"></div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <!-- 右侧文件面板 -->
        <div class="file-panel">
            <div class="panel-header">
                <span>对比文件</span>
                <span class="file-name" id="rightFileName">未选择文件</span>
            </div>
            <div class="drop-area" id="rightDropArea">
                <div class="drop-overlay" id="rightDropOverlay">
                    <div class="drop-icon">📄</div>
                    <div>拖放文本文件到此处</div>
                </div>
                <div class="file-hint" id="rightHint">
                    <div class="hint-icon">📄</div>
                    <div>拖放文件到此处</div>
                </div>
                <div class="text-container" id="rightTextContainer">
                    <div class="line-numbers" id="rightLineNumbers"></div>
                    <div class="text-content" id="rightTextContent"></div>
                </div>
                <!-- 滚动条差异标记容器 -->
                <div id="rightScrollMarks" class="scroll-marks-container"></div>
            </div>
        </div>
        
        <!-- 隐藏的文件输入（保留原始机制但不干扰体验） -->
        <input type="file" id="leftFileInput" accept=".txt,.json,.xml,.html,.css,.js,.md,.log,.csv,.java,.py,.php,.rb,.go" style="display: none;">
        <input type="file" id="rightFileInput" accept=".txt,.json,.xml,.html,.css,.js,.md,.log,.csv,.java,.py,.php,.rb,.go" style="display: none;">
    </div>

    <script>
        // ---------- 状态管理 ----------
        const state = {
            left: { content: '', fileName: '', filePath: '', lines: [] },
            right: { content: '', fileName: '', filePath: '', lines: [] },
            diffResult: null   // 存储最新对比结果
        };
        
        // DOM 元素
        const leftDropArea = document.getElementById('leftDropArea');
        const rightDropArea = document.getElementById('rightDropArea');
        const leftDropOverlay = document.getElementById('leftDropOverlay');
        const rightDropOverlay = document.getElementById('rightDropOverlay');
        const leftHint = document.getElementById('leftHint');
        const rightHint = document.getElementById('rightHint');
        const leftFileInput = document.getElementById('leftFileInput');
        const rightFileInput = document.getElementById('rightFileInput');
        const leftFileName = document.getElementById('leftFileName');
        const rightFileName = document.getElementById('rightFileName');
        const leftLineNumbers = document.getElementById('leftLineNumbers');
        const rightLineNumbers = document.getElementById('rightLineNumbers');
        const leftTextContent = document.getElementById('leftTextContent');
        const rightTextContent = document.getElementById('rightTextContent');
        const leftTextContainer = document.getElementById('leftTextContainer');
        const rightTextContainer = document.getElementById('rightTextContainer');
        
        // 滚动标记容器
        const leftScrollMarks = document.getElementById('leftScrollMarks');
        const rightScrollMarks = document.getElementById('rightScrollMarks');
        
        // 辅助函数：转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 行高固定20px（与 .text-line 一致）
        const LINE_HEIGHT = 20;
        
        // 更新滚动条差异标记 (基于差异结果和总行数)
        function updateScrollMarks(side) {
            const container = side === 'left' ? leftTextContainer : rightTextContainer;
            const marksContainer = side === 'left' ? leftScrollMarks : rightScrollMarks;
            const diffLines = side === 'left' ? state.diffResult?.leftDiffLines : state.diffResult?.rightDiffLines;
            const totalLines = side === 'left' ? state.left.lines.length : state.right.lines.length;
            
            // 清空旧标记
            marksContainer.innerHTML = '';
            
            // 没有对比结果 或 无差异行 或 没有内容时，不显示标记
            if (!state.diffResult || !diffLines || diffLines.length === 0 || totalLines === 0) {
                return;
            }
            
            // 获取滚动容器可视高度和内容总高度
            const clientHeight = container.clientHeight;
            const scrollHeight = totalLines * LINE_HEIGHT;
            if (scrollHeight <= 0 || clientHeight <= 0) return;
            
            // 遍历差异行，生成细线标记
            diffLines.forEach(diff => {
                const lineIdx = diff.line - 1;      // 0-index
                const offsetY = lineIdx * LINE_HEIGHT; // 距离顶部的绝对偏移
                // 计算标记在滚动条轨道上的相对位置百分比 (相对于可滚动内容)
                let percent = offsetY / scrollHeight;
                // 限制百分比范围 [0, 1]
                percent = Math.min(1, Math.max(0, percent));
                // 标记在可视容器中的 top 值 (相对于 marksContainer 高度)
                const markTop = percent * clientHeight;
                
                const mark = document.createElement('div');
                mark.className = `diff-scroll-mark ${diff.type}`;
                mark.style.top = `${markTop}px`;
                marksContainer.appendChild(mark);
            });
        }
        
        // 同时更新左右两侧的滚动条标记
        function updateBothScrollMarks() {
            if (!state.diffResult) {
                if (leftScrollMarks) leftScrollMarks.innerHTML = '';
                if (rightScrollMarks) rightScrollMarks.innerHTML = '';
                return;
            }
            updateScrollMarks('left');
            updateScrollMarks('right');
        }
        
        // 监听滚动容器尺寸变化 (ResizeObserver)
        let resizeObserver = null;
        function observeContainerResize() {
            if (resizeObserver) resizeObserver.disconnect();
            resizeObserver = new ResizeObserver(() => {
                if (state.diffResult) {
                    updateBothScrollMarks();
                }
            });
            if (leftTextContainer) resizeObserver.observe(leftTextContainer);
            if (rightTextContainer) resizeObserver.observe(rightTextContainer);
        }
        
        // 更新文本显示 (无差异样式，原始内容)
        function updateTextDisplay(side) {
            const fileInfo = state[side];
            const lines = fileInfo.lines;
            let lineNumbersHTML = '';
            let textContentHTML = '';
            for (let i = 0; i < lines.length; i++) {
                lineNumbersHTML += `<span class="line-number" data-line="${i+1}">${i+1}</span>`;
                textContentHTML += `<span class="text-line" data-line="${i+1}">${escapeHtml(lines[i])}</span>`;
            }
            if (side === 'left') {
                leftLineNumbers.innerHTML = lineNumbersHTML;
                leftTextContent.innerHTML = textContentHTML;
            } else {
                rightLineNumbers.innerHTML = lineNumbersHTML;
                rightTextContent.innerHTML = textContentHTML;
            }
        }
        
        // 更新文件名显示（完整路径）
        function updateFileNameDisplay(side) {
            const fileInfo = state[side];
            const displayPath = fileInfo.filePath || fileInfo.fileName || '未选择文件';
            if (side === 'left') {
                leftFileName.textContent = displayPath;
                leftFileName.title = displayPath; // 鼠标悬浮显示完整路径
            } else {
                rightFileName.textContent = displayPath;
                rightFileName.title = displayPath;
            }
        }
        
        // 更新文件显示（内容 + 文件名）
        function updateFileDisplay(side) {
            updateFileNameDisplay(side);
            updateTextDisplay(side);
        }
        
        // ---------- 核心 diff 算法 (LCS 变体) ----------
        function diffLines(leftLines, rightLines) {
            const m = leftLines.length;
            const n = rightLines.length;
            const dp = Array(m + 1).fill().map(() => Array(n + 1).fill(0));
            
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (leftLines[i - 1] === rightLines[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }
            
            const result = {
                left: [],
                right: [],
                leftDiffLines: [],   // { line, type }
                rightDiffLines: []
            };
            
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && leftLines[i - 1] === rightLines[j - 1]) {
                    result.left.unshift({ text: leftLines[i - 1], type: 'same', originalLine: i });
                    result.right.unshift({ text: rightLines[j - 1], type: 'same', originalLine: j });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    // 右侧新增
                    result.left.unshift({ text: '', type: 'empty', originalLine: null });
                    result.right.unshift({ text: rightLines[j - 1], type: 'added', originalLine: j });
                    result.rightDiffLines.push({ line: j, type: 'added' });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                    // 左侧删除
                    result.left.unshift({ text: leftLines[i - 1], type: 'removed', originalLine: i });
                    result.right.unshift({ text: '', type: 'empty', originalLine: null });
                    result.leftDiffLines.push({ line: i, type: 'removed' });
                    i--;
                } else {
                    // 修改（双方都有但不同）
                    result.left.unshift({ text: leftLines[i - 1], type: 'changed', originalLine: i });
                    result.right.unshift({ text: rightLines[j - 1], type: 'changed', originalLine: j });
                    result.leftDiffLines.push({ line: i, type: 'changed' });
                    result.rightDiffLines.push({ line: j, type: 'changed' });
                    i--; j--;
                }
            }
            
            result.leftDiffLines.sort((a,b) => a.line - b.line);
            result.rightDiffLines.sort((a,b) => a.line - b.line);
            return result;
        }
        
        // 渲染对比高亮 (基于diffResult)
        function renderDiffHighlight(diffResult) {
            if (!diffResult) return;
            // 左侧渲染
            let leftHTML = '', rightHTML = '', leftLineNumHTML = '', rightLineNumHTML = '';
            diffResult.left.forEach((item, idx) => {
                const lineNum = idx + 1;
                const className = item.type === 'same' ? '' : `diff-${item.type}`;
                leftHTML += `<span class="text-line ${className}" data-line="${lineNum}">${escapeHtml(item.text)}</span>`;
                leftLineNumHTML += `<span class="line-number" data-line="${lineNum}">${lineNum}</span>`;
            });
            diffResult.right.forEach((item, idx) => {
                const lineNum = idx + 1;
                const className = item.type === 'same' ? '' : `diff-${item.type}`;
                rightHTML += `<span class="text-line ${className}" data-line="${lineNum}">${escapeHtml(item.text)}</span>`;
                rightLineNumHTML += `<span class="line-number" data-line="${lineNum}">${lineNum}</span>`;
            });
            leftTextContent.innerHTML = leftHTML;
            rightTextContent.innerHTML = rightHTML;
            leftLineNumbers.innerHTML = leftLineNumHTML;
            rightLineNumbers.innerHTML = rightLineNumHTML;
        }
        
        // 执行对比（更新高亮 + 滚动条标记）
        function performComparison() {
            if (!state.left.content || !state.right.content) return false;
            const diff = diffLines(state.left.lines, state.right.lines);
            state.diffResult = diff;
            renderDiffHighlight(diff);
            // 更新滚动条标记（细线标识）
            updateBothScrollMarks();
            return true;
        }
        
        // 重置所有内容
        function resetAll() {
            state.left = { content: '', fileName: '', filePath: '', lines: [] };
            state.right = { content: '', fileName: '', filePath: '', lines: [] };
            state.diffResult = null;
            
            leftFileName.textContent = '未选择文件';
            rightFileName.textContent = '未选择文件';
            leftLineNumbers.innerHTML = '';
            rightLineNumbers.innerHTML = '';
            leftTextContent.innerHTML = '';
            rightTextContent.innerHTML = '';
            
            leftFileInput.value = '';
            rightFileInput.value = '';
            
            leftHint.classList.remove('hidden');
            rightHint.classList.remove('hidden');
            
            // 清除滚动条标记
            if (leftScrollMarks) leftScrollMarks.innerHTML = '';
            if (rightScrollMarks) rightScrollMarks.innerHTML = '';
        }
        
        // 加载示例 (保留原有示例功能)
        function loadExample() {
            const example1 = `# 用户配置文件
# 版本: 1.0

[数据库]
host = localhost
port = 3306
username = admin
password = secret123

[应用设置]
debug_mode = true
log_level = info
max_connections = 100

[功能开关]
feature_a = enabled
feature_b = disabled
feature_c = enabled

# 缓存设置
cache_size = 1024
cache_ttl = 3600`;

            const example2 = `# 用户配置文件
# 版本: 1.1

[数据库]
host = db.example.com
port = 3306
username = admin
password = new_secret_456

[应用设置]
debug_mode = false
log_level = debug
max_connections = 200
timeout = 30

[功能开关]
feature_a = enabled
feature_b = enabled
feature_c = disabled
feature_d = enabled

# 缓存设置
cache_size = 2048
cache_ttl = 7200
cache_type = redis`;

            state.left.content = example1;
            state.right.content = example2;
            state.left.fileName = 'config_v1.0.ini';
            state.left.filePath = '示例/config_v1.0.ini';
            state.right.fileName = 'config_v1.1.ini';
            state.right.filePath = '示例/config_v1.1.ini';
            state.left.lines = example1.split('\n');
            state.right.lines = example2.split('\n');
            
            updateFileDisplay('left');
            updateFileDisplay('right');
            leftHint.classList.add('hidden');
            rightHint.classList.add('hidden');
            
            performComparison();  // 对比并高亮，同时更新滚动条标记
        }
        
        // 获取文件的完整路径（尽量模拟）
        function getFilePath(file) {
            // 优先使用 webkitRelativePath（如果文件是从文件夹拖拽且支持）
            if (file.webkitRelativePath && file.webkitRelativePath !== '') {
                return file.webkitRelativePath;
            }
            // 否则返回文件名（因为无法获取真实绝对路径）
            return file.name;
        }
        
        // 处理文件拖放 + 读取
        function handleFile(file, side) {
            const validExt = /\.(txt|json|xml|html|css|js|md|log|csv|java|py|php|rb|go|ini|conf)$/i;
            if (!file.type.match('text.*') && !validExt.test(file.name)) {
                alert('请选择文本文件 (.txt, .json, .xml, .html, .css, .js, .md, .log, .csv, .java, .py, .php, .rb, .go 等)');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                state[side].content = content;
                state[side].fileName = file.name;
                state[side].filePath = getFilePath(file);
                state[side].lines = content.split('\n');
                updateFileDisplay(side);
                if (side === 'left') leftHint.classList.add('hidden');
                else rightHint.classList.add('hidden');
                // 两边都有内容时自动对比
                if (state.left.content && state.right.content) {
                    performComparison();
                } else {
                    // 只有一个文件时清除差异及标记
                    if (state.diffResult) {
                        state.diffResult = null;
                        if (side === 'left') updateTextDisplay('left');
                        if (side === 'right') updateTextDisplay('right');
                        updateBothScrollMarks();
                    }
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        // 拖拽事件设置
        function setupDropEvents(dropArea, dropOverlay, fileInput, side) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
                dropArea.addEventListener(ev, preventDefaults, false);
            });
            ['dragenter', 'dragover'].forEach(ev => {
                dropArea.addEventListener(ev, () => dropOverlay.classList.add('active'), false);
            });
            ['dragleave', 'drop'].forEach(ev => {
                dropArea.addEventListener(ev, () => dropOverlay.classList.remove('active'), false);
            });
            dropArea.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length) handleFile(files[0], side);
            }, false);
        }
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        function handleFileSelect(e, side) {
            if (e.target.files.length) handleFile(e.target.files[0], side);
        }
        
        // 同步滚动
        function setupSyncScroll() {
            let isScrolling = false;
            leftTextContainer.addEventListener('scroll', () => {
                if (isScrolling) return;
                isScrolling = true;
                rightTextContainer.scrollTop = leftTextContainer.scrollTop;
                rightTextContainer.scrollLeft = leftTextContainer.scrollLeft;
                setTimeout(() => { isScrolling = false; }, 10);
            });
            rightTextContainer.addEventListener('scroll', () => {
                if (isScrolling) return;
                isScrolling = true;
                leftTextContainer.scrollTop = rightTextContainer.scrollTop;
                leftTextContainer.scrollLeft = rightTextContainer.scrollLeft;
                setTimeout(() => { isScrolling = false; }, 10);
            });
        }
        
        // 监听窗口尺寸变化，重新计算滚动条标记位置
        function bindScrollMarkUpdateOnResize() {
            window.addEventListener('resize', () => {
                if (state.diffResult) updateBothScrollMarks();
            });
        }
        
        // ---------- 初始化 ----------
        function init() {
            setupDropEvents(leftDropArea, leftDropOverlay, leftFileInput, 'left');
            setupDropEvents(rightDropArea, rightDropOverlay, rightFileInput, 'right');
            leftFileInput.addEventListener('change', (e) => handleFileSelect(e, 'left'));
            rightFileInput.addEventListener('change', (e) => handleFileSelect(e, 'right'));
            setupSyncScroll();
            
            observeContainerResize();
            bindScrollMarkUpdateOnResize();
            
            // 挂载示例和重置函数供控制台调用（但不添加额外按钮，保持原功能不变）
            window.loadExample = loadExample;
            window.resetAll = resetAll;
        }
        
        init();
    </script>
</body>
</html>
