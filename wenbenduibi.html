<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #111;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 极简头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            height: 48px;
            flex-shrink: 0;
        }
        
        .title {
            font-size: 1px;
            font-weight: 500;
            color: #ccc;
        }
        
        .controls {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            background: #333;
            color: #ccc;
            border: none;
            border-radius: 1px;
            padding: 1px 1px;
            font-size: 1px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #444;
        }
        
        .btn-primary {
            background: #2a6fd6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3578e0;
        }
        
        .btn-reset {
            background: #c0392b;
            color: white;
        }
        
        .btn-reset:hover {
            background: #d9534f;
        }
        
        /* 主对比区域 */
        .comparison-container {
            display: flex;
            height: calc(100vh - 48px);
            width: 100vw;
        }
        
        /* 文件对比面板 */
        .file-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            overflow: hidden;
        }
        
        .file-panel:last-child {
            border-right: none;
        }
        
        .panel-header {
            padding: 8px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-size: 13px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }
        
        .file-name {
            font-weight: 500;
            color: #ccc;
        }
        
        .drop-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        
        .drop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 60, 90, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .drop-overlay.active {
            opacity: 1;
        }
        
        .drop-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 文本对比区域 */
        .text-container {
            flex: 1;
            display: flex;
            overflow: auto;
            background: #0a0a0a;
        }
        
        .line-numbers {
            width: 60px;
            background: #151515;
            color: #666;
            text-align: right;
            padding: 8px 12px 8px 0;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }
        
        .line-number {
            height: 20px;
            display: block;
        }
        
        .text-content {
            flex: 1;
            padding: 8px 12px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre;
            tab-size: 4;
            min-width: 0;
        }
        
        .text-line {
            height: 20px;
            display: block;
            white-space: nowrap;
        }
        
        /* 差异高亮 */
        .diff-added {
            background: rgba(46, 160, 67, 0.9);
            border-left: 3px solid #2ea043;
        }
        
        .diff-removed {
            background: rgba(248, 81, 73, 0.9);
            border-left: 3px solid #f85149;
            color: #adff2f;
        }
        
        .diff-changed {
            background: rgba(187, 128, 9, 0.3);
            border-left: 3px solid #bb8009;
        }
        
        /* 统计信息 - 修改为显示差异行号 */
        .stats {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #333;
            z-index: 100;
            max-width: 90vw;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 180px;
            max-width: 300px;
        }
        
        .stat-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2a6fd6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-title:before {
            content: "📌";
            font-size: 12px;
        }
        
        .stat-content {
            font-size: 13px;
            line-height: 1.4;
            max-height: 80px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .stat-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .stat-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .stat-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }
        
        /* 差异行号样式 */
        .line-number-item {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            margin: 2px 4px 2px 0;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        .line-number-item.added {
            background: rgba(46, 160, 67, 0.2);
            color: #2ea043;
        }
        
        .line-number-item.removed {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
        }
        
        .line-number-item.changed {
            background: rgba(187, 128, 9, 0.2);
            color: #bb8009;
        }
        
        .no-differences {
            color: #666;
            font-style: italic;
            font-size: 12px;
        }
        
        /* 响应式调整 */
        @media (max-width: 1024px) {
            .comparison-container {
                flex-direction: column;
            }
            
            .file-panel {
                height: 50%;
                border-right: none;
                border-bottom: 1px solid #333;
            }
            
            .stats {
                bottom: 8px;
                padding: 8px 12px;
                flex-direction: column;
                gap: 12px;
                max-width: 95vw;
            }
            
            .stat-item {
                min-width: 0;
                max-width: 100%;
            }
        }
        
        /* 隐藏滚动条但保持功能 */
        .text-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .text-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        .text-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        
        .text-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* 文件选择提示 */
        .file-hint {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 14px;
            pointer-events: none;
            z-index: 5;
        }
        
        .file-hint.hidden {
            display: none;
        }
        
        .hint-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* 高亮当前行 */
        .highlighted-line {
            background: rgba(255, 255, 255, 0.05);
        }
        
        /* 简洁的分隔线 */
        .separator {
            width: 1px;
            background: #333;
            height: 100%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">文本对比工具</div>
        <div class="controls">
            <span class=" btn-primary" id="compareBtn"> .</span>
            <span class="" id="exampleBtn">.</span>
            <button class="btn btn-reset" id="resetBtn">重置</button>
        </div>
    </div>
    
    <div class="comparison-container">
        <!-- 左侧文件面板 -->
        <div class="file-panel">
            <div class="panel-header">
                <span>原文件</span>
                <span class="file-name" id="leftFileName">未选择文件</span>
            </div>
            <div class="drop-area" id="leftDropArea">
                <div class="drop-overlay" id="leftDropOverlay">
                    <div class="drop-icon">📄</div>
                    <div>拖放文本文件到此处</div>
                </div>
                <div class="file-hint" id="leftHint">
                    <div class="hint-icon">📄</div>
                    <div>拖放文件到此处</div>
                </div>
                <div class="text-container" id="leftTextContainer">
                    <div class="line-numbers" id="leftLineNumbers"></div>
                    <div class="text-content" id="leftTextContent"></div>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <!-- 右侧文件面板 -->
        <div class="file-panel">
            <div class="panel-header">
                <span>对比文件</span>
                <span class="file-name" id="rightFileName">未选择文件</span>
            </div>
            <div class="drop-area" id="rightDropArea">
                <div class="drop-overlay" id="rightDropOverlay">
                    <div class="drop-icon">📄</div>
                    <div>拖放文本文件到此处</div>
                </div>
                <div class="file-hint" id="rightHint">
                    <div class="hint-icon">📄</div>
                    <div>拖放文件到此处</div>
                </div>
                <div class="text-container" id="rightTextContainer">
                    <div class="line-numbers" id="rightLineNumbers"></div>
                    <div class="text-content" id="rightTextContent"></div>
                </div>
            </div>
        </div>
        
        <!-- 文件输入 -->
        <input type="file" id="leftFileInput" accept=".txt,.json,.xml,.html,.css,.js,.md,.log,.csv,.java,.py,.php,.rb,.go" style="display: none;">
        <input type="file" id="rightFileInput" accept=".txt,.json,.xml,.html,.css,.js,.md,.log,.csv,.java,.py,.php,.rb,.go" style="display: none;">
    </div>
    
    <!-- 统计信息 - 修改为显示差异行号 -->
    <div class="stats">
        <div class="stat-item">
            <div class="stat-title">差异行号 (原文件)</div>
            <div class="stat-content" id="leftDiffLines">无差异</div>
        </div>
        <div class="stat-item">
            <div class="stat-title">差异行号 (对比文件)</div>
            <div class="stat-content" id="rightDiffLines">无差异</div>
        </div>
    </div>

    <script>
        // 状态管理
        const state = {
            left: { content: '', fileName: '', lines: [] },
            right: { content: '', fileName: '', lines: [] },
            diffResult: null
        };
        
        // DOM元素
        const leftDropArea = document.getElementById('leftDropArea');
        const rightDropArea = document.getElementById('rightDropArea');
        const leftDropOverlay = document.getElementById('leftDropOverlay');
        const rightDropOverlay = document.getElementById('rightDropOverlay');
        const leftHint = document.getElementById('leftHint');
        const rightHint = document.getElementById('rightHint');
        const leftFileInput = document.getElementById('leftFileInput');
        const rightFileInput = document.getElementById('rightFileInput');
        const leftFileName = document.getElementById('leftFileName');
        const rightFileName = document.getElementById('rightFileName');
        const leftLineNumbers = document.getElementById('leftLineNumbers');
        const rightLineNumbers = document.getElementById('rightLineNumbers');
        const leftTextContent = document.getElementById('leftTextContent');
        const rightTextContent = document.getElementById('rightTextContent');
        const compareBtn = document.getElementById('compareBtn');
        const exampleBtn = document.getElementById('exampleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const leftDiffLines = document.getElementById('leftDiffLines');
        const rightDiffLines = document.getElementById('rightDiffLines');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置拖放事件
            setupDropEvents(leftDropArea, leftDropOverlay, leftFileInput, 'left');
            setupDropEvents(rightDropArea, rightDropOverlay, rightFileInput, 'right');
            
            // 注意：已移除点击打开文件选择的功能
            
            // 按钮事件
            compareBtn.addEventListener('click', compareTexts);
            exampleBtn.addEventListener('click', loadExample);
            resetBtn.addEventListener('click', resetAll);
            
            // 文件选择事件（仅用于文件输入框，如果用户通过其他方式选择文件）
            leftFileInput.addEventListener('change', (e) => handleFileSelect(e, 'left'));
            rightFileInput.addEventListener('change', (e) => handleFileSelect(e, 'right'));
            
            // 同步滚动
            setupSyncScroll();
        });
        
        // 设置拖放事件
        function setupDropEvents(dropArea, dropOverlay, fileInput, side) {
            // 阻止默认行为
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });
            
            // 显示拖放覆盖层
            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => {
                    dropOverlay.classList.add('active');
                }, false);
            });
            
            // 隐藏拖放覆盖层
            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => {
                    dropOverlay.classList.remove('active');
                }, false);
            });
            
            // 处理文件拖放
            dropArea.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                
                if (files.length > 0) {
                    handleFile(files[0], side);
                }
            }, false);
        }
        
        // 阻止默认事件
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        // 处理文件选择
        function handleFileSelect(e, side) {
            const files = e.target.files;
            if (files.length > 0) {
                handleFile(files[0], side);
            }
        }
        
        // 处理文件
        function handleFile(file, side) {
            // 检查文件类型
            if (!file.type.match('text.*') && !file.name.match(/\.(txt|json|xml|html|css|js|md|log|csv|java|py|php|rb|go)$/i)) {
                alert('请选择文本文件 (.txt, .json, .xml, .html, .css, .js, .md, .log, .csv, .java, .py, .php, .rb, .go 等)');
                return;
            }
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const content = e.target.result;
                
                // 更新状态
                state[side].content = content;
                state[side].fileName = file.name;
                state[side].lines = content.split('\n');
                
                // 更新UI
                updateFileDisplay(side);
                
                // 隐藏提示
                if (side === 'left') {
                    leftHint.classList.add('hidden');
                } else {
                    rightHint.classList.add('hidden');
                }
                
                // 如果两个文件都已加载，自动对比
                if (state.left.content && state.right.content) {
                    setTimeout(compareTexts, 300);
                }
            };
            
            reader.readAsText(file);
        }
        
        // 更新文件显示
        function updateFileDisplay(side) {
            const fileInfo = state[side];
            
            // 更新文件名
            if (side === 'left') {
                leftFileName.textContent = fileInfo.fileName;
            } else {
                rightFileName.textContent = fileInfo.fileName;
            }
            
            // 更新行号和内容
            updateTextDisplay(side);
        }
        
        // 更新文本显示
        function updateTextDisplay(side) {
            const fileInfo = state[side];
            const lines = fileInfo.lines;
            
            // 生成行号
            let lineNumbersHTML = '';
            let textContentHTML = '';
            
            for (let i = 0; i < lines.length; i++) {
                lineNumbersHTML += `<span class="line-number" data-line="${i+1}">${i+1}</span>`;
                textContentHTML += `<span class="text-line" data-line="${i+1}">${escapeHtml(lines[i])}</span>`;
            }
            
            if (side === 'left') {
                leftLineNumbers.innerHTML = lineNumbersHTML;
                leftTextContent.innerHTML = textContentHTML;
            } else {
                rightLineNumbers.innerHTML = lineNumbersHTML;
                rightTextContent.innerHTML = textContentHTML;
            }
        }
        
        // 对比文本
        function compareTexts() {
            if (!state.left.content || !state.right.content) {
                alert('请先选择两个要对比的文本文件');
                return;
            }
            
            // 执行对比
            const diffResult = diffLines(state.left.lines, state.right.lines);
            state.diffResult = diffResult;
            
            // 显示对比结果
            displayDiffResult(diffResult);
            
            // 更新差异行号显示
            updateDiffLinesDisplay(diffResult);
        }
        
        // 文本对比算法
        function diffLines(leftLines, rightLines) {
            const m = leftLines.length;
            const n = rightLines.length;
            
            // 创建DP表
            const dp = Array(m + 1).fill().map(() => Array(n + 1).fill(0));
            
            // 填充DP表
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (leftLines[i - 1] === rightLines[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }
            
            // 回溯获取差异
            const result = {
                left: [],
                right: [],
                leftDiffLines: [], // 存储左侧差异行号
                rightDiffLines: [] // 存储右侧差异行号
            };
            
            let i = m, j = n;
            
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && leftLines[i - 1] === rightLines[j - 1]) {
                    // 行相同
                    result.left.unshift({ text: leftLines[i - 1], type: 'same', originalLine: i });
                    result.right.unshift({ text: rightLines[j - 1], type: 'same', originalLine: j });
                    i--;
                    j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    // 右侧新增行
                    result.left.unshift({ text: '', type: 'empty', originalLine: null });
                    result.right.unshift({ text: rightLines[j - 1], type: 'added', originalLine: j });
                    result.rightDiffLines.push({ line: j, type: 'added' });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                    // 左侧删除行
                    result.left.unshift({ text: leftLines[i - 1], type: 'removed', originalLine: i });
                    result.right.unshift({ text: '', type: 'empty', originalLine: null });
                    result.leftDiffLines.push({ line: i, type: 'removed' });
                    i--;
                } else {
                    // 行不同（修改）
                    result.left.unshift({ text: leftLines[i - 1], type: 'changed', originalLine: i });
                    result.right.unshift({ text: rightLines[j - 1], type: 'changed', originalLine: j });
                    result.leftDiffLines.push({ line: i, type: 'changed' });
                    result.rightDiffLines.push({ line: j, type: 'changed' });
                    i--;
                    j--;
                }
            }
            
            // 对差异行号进行排序
            result.leftDiffLines.sort((a, b) => a.line - b.line);
            result.rightDiffLines.sort((a, b) => a.line - b.line);
            
            return result;
        }
        
        // 显示对比结果
        function displayDiffResult(diffResult) {
            // 显示左侧对比结果
            let leftHTML = '';
            let rightHTML = '';
            let leftLineNumbersHTML = '';
            let rightLineNumbersHTML = '';
            
            diffResult.left.forEach((item, index) => {
                const lineNum = index + 1;
                const className = item.type === 'same' ? '' : `diff-${item.type}`;
                leftHTML += `<span class="text-line ${className}" data-line="${lineNum}">${escapeHtml(item.text)}</span>`;
                leftLineNumbersHTML += `<span class="line-number" data-line="${lineNum}">${lineNum}</span>`;
            });
            
            diffResult.right.forEach((item, index) => {
                const lineNum = index + 1;
                const className = item.type === 'same' ? '' : `diff-${item.type}`;
                rightHTML += `<span class="text-line ${className}" data-line="${lineNum}">${escapeHtml(item.text)}</span>`;
                rightLineNumbersHTML += `<span class="line-number" data-line="${lineNum}">${lineNum}</span>`;
            });
            
            leftTextContent.innerHTML = leftHTML;
            rightTextContent.innerHTML = rightHTML;
            leftLineNumbers.innerHTML = leftLineNumbersHTML;
            rightLineNumbers.innerHTML = rightLineNumbersHTML;
        }
        
        // 更新差异行号显示
        function updateDiffLinesDisplay(diffResult) {
            // 显示左侧差异行号
            if (diffResult.leftDiffLines.length > 0) {
                let leftHTML = '';
                diffResult.leftDiffLines.forEach(item => {
                    leftHTML += `<span class="line-number-item ${item.type}">${item.line}</span>`;
                });
                leftDiffLines.innerHTML = leftHTML;
            } else {
                leftDiffLines.innerHTML = '<span class="no-differences">无差异行</span>';
            }
            
            // 显示右侧差异行号
            if (diffResult.rightDiffLines.length > 0) {
                let rightHTML = '';
                diffResult.rightDiffLines.forEach(item => {
                    rightHTML += `<span class="line-number-item ${item.type}">${item.line}</span>`;
                });
                rightDiffLines.innerHTML = rightHTML;
            } else {
                rightDiffLines.innerHTML = '<span class="no-differences">无差异行</span>';
            }
        }
        
        // 加载示例
        function loadExample() {
            // 示例文本1
            const example1 = `# 用户配置文件
# 版本: 1.0

[数据库]
host = localhost
port = 3306
username = admin
password = secret123

[应用设置]
debug_mode = true
log_level = info
max_connections = 100

[功能开关]
feature_a = enabled
feature_b = disabled
feature_c = enabled

# 缓存设置
cache_size = 1024
cache_ttl = 3600`;

            // 示例文本2
            const example2 = `# 用户配置文件
# 版本: 1.1

[数据库]
host = db.example.com
port = 3306
username = admin
password = new_secret_456

[应用设置]
debug_mode = false
log_level = debug
max_connections = 200
timeout = 30

[功能开关]
feature_a = enabled
feature_b = enabled
feature_c = disabled
feature_d = enabled

# 缓存设置
cache_size = 2048
cache_ttl = 7200
cache_type = redis`;

            // 更新状态
            state.left.content = example1;
            state.right.content = example2;
            state.left.fileName = 'config_v1.0.ini';
            state.right.fileName = 'config_v1.1.ini';
            state.left.lines = example1.split('\n');
            state.right.lines = example2.split('\n');

            // 更新UI
            updateFileDisplay('left');
            updateFileDisplay('right');
            
            // 隐藏提示
            leftHint.classList.add('hidden');
            rightHint.classList.add('hidden');
            
            // 对比文本
            setTimeout(compareTexts, 300);
        }
        
        // 重置所有
        function resetAll() {
            // 重置状态
            state.left = { content: '', fileName: '', lines: [] };
            state.right = { content: '', fileName: '', lines: [] };
            state.diffResult = null;
            
            // 重置UI
            leftFileName.textContent = '未选择文件';
            rightFileName.textContent = '未选择文件';
            leftLineNumbers.innerHTML = '';
            rightLineNumbers.innerHTML = '';
            leftTextContent.innerHTML = '';
            rightTextContent.innerHTML = '';
            
            // 重置差异行号显示
            leftDiffLines.innerHTML = '<span class="no-differences">无差异</span>';
            rightDiffLines.innerHTML = '<span class="no-differences">无差异</span>';
            
            // 重置文件输入
            leftFileInput.value = '';
            rightFileInput.value = '';
            
            // 显示提示
            leftHint.classList.remove('hidden');
            rightHint.classList.remove('hidden');
        }
        
        // 设置同步滚动
        function setupSyncScroll() {
            const leftContainer = document.getElementById('leftTextContainer');
            const rightContainer = document.getElementById('rightTextContainer');
            
            let isScrolling = false;
            
            leftContainer.addEventListener('scroll', function() {
                if (isScrolling) return;
                isScrolling = true;
                rightContainer.scrollTop = leftContainer.scrollTop;
                rightContainer.scrollLeft = leftContainer.scrollLeft;
                setTimeout(() => { isScrolling = false; }, 10);
            });
            
            rightContainer.addEventListener('scroll', function() {
                if (isScrolling) return;
                isScrolling = true;
                leftContainer.scrollTop = rightContainer.scrollTop;
                leftContainer.scrollLeft = rightContainer.scrollLeft;
                setTimeout(() => { isScrolling = false; }, 10);
            });
        }
        
        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
